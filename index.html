<blockquote>Exam focus: recursive (decidable) vs recursively enumerable; the Halting Problem is undecidable; P vs NP definitions; SAT is NP-complete (Cook-Levin).</blockquote>
`,
"se-proc": `
<h2>Software process</h2>
<p><b>Software engineering</b> applies systematic, disciplined methods to building software. A <b>process model</b> defines the order of activities — specify, design, build, validate, evolve.</p>

<h2>Process models</h2>
<table>
<tr><th>Model</th><th>Idea</th><th>Best for</th></tr>
<tr><td>Waterfall</td><td>linear, phase-by-phase</td><td>stable, well-understood requirements</td></tr>
<tr><td>Incremental</td><td>deliver in increments</td><td>partial early delivery</td></tr>
<tr><td>Spiral</td><td>iterative + risk analysis per loop</td><td>large, risky projects</td></tr>
<tr><td>Prototyping</td><td>build a throwaway/evolutionary model</td><td>unclear requirements</td></tr>
<tr><td>Agile / Scrum</td><td>short iterations, working software, change-friendly</td><td>evolving requirements</td></tr>
</table>

<h2>Requirements engineering</h2>
<p>Discover, analyse, document and validate what the system must do.</p>
<ul>
<li><b>Functional requirements</b> — what the system does.</li>
<li><b>Non-functional</b> — quality constraints (performance, security, usability).</li>
<li><b>Elicitation</b> — interviews, observation, prototyping, use cases.</li>
<li>Documented in the <b>SRS</b> (Software Requirements Specification) — should be complete, consistent, verifiable, unambiguous.</li>
</ul>
<blockquote>Exam focus: pick the right model for a scenario (waterfall = stable, spiral = risk-driven, agile = changing); functional vs non-functional requirement; what an SRS is.</blockquote>
`,
"se-design": `
<h2>Software design</h2>
<p>Translates requirements into a blueprint for construction. Levels: <b>architectural</b> (high-level structure), <b>high-level</b> (modules/interfaces), and <b>detailed</b> (algorithms, data structures).</p>

<h2>Design principles</h2>
<ul>
<li><b>Abstraction</b> — hide detail behind interfaces.</li>
<li><b>Modularity</b> — decompose into independent modules.</li>
<li><b>Coupling</b> — inter-module dependence; aim <b>low</b>.</li>
<li><b>Cohesion</b> — how focused a module is; aim <b>high</b>.</li>
<li><b>Information hiding</b> — expose only what's needed.</li>
</ul>
<blockquote>The design goal in one line: <b>high cohesion, low coupling</b>.</blockquote>

<h2>Architectural styles</h2>
<p>Layered, client-server, pipe-and-filter, microservices, repository, MVC. The choice shapes scalability and maintainability.</p>

<h2>Design notations</h2>
<ul>
<li><b>Structured</b> — data flow diagrams (DFD), structure charts, data dictionary.</li>
<li><b>Object-oriented</b> — UML diagrams (covered in the OO topics).</li>
</ul>
<p><b>Design patterns</b> are reusable solutions to recurring problems, grouped as <b>creational</b> (Factory, Singleton), <b>structural</b> (Adapter, Decorator), and <b>behavioural</b> (Observer, Strategy).</p>
<blockquote>Exam focus: low coupling + high cohesion is the design ideal; classify a named pattern; distinguish architectural vs detailed design.</blockquote>
`,
"se-test": `
<h2>Software testing</h2>
<p>Testing finds defects by running software against expected behaviour. It cannot prove correctness, only reveal faults.</p>
<table>
<tr><th>Level</th><th>Scope</th></tr>
<tr><td>Unit</td><td>individual module/function</td></tr>
<tr><td>Integration</td><td>interactions between modules</td></tr>
<tr><td>System</td><td>the whole system vs requirements</td></tr>
<tr><td>Acceptance</td><td>by the user/customer (alpha, beta)</td></tr>
</table>
<ul>
<li><b>Black-box</b> — test from specification (equivalence partitioning, boundary-value analysis).</li>
<li><b>White-box</b> — test internal logic (statement, branch, path coverage).</li>
<li><b>Regression</b> — re-run tests after changes.</li>
</ul>

<h2>Cost estimation</h2>
<p><b>COCOMO</b> estimates effort from size (KLOC): $E = a&#92;,(&#92;text{KLOC})^{b}$. <b>Function Point Analysis</b> sizes by functionality rather than lines. Other techniques: expert judgement, analogy, Delphi.</p>

<h2>Quality &amp; configuration management</h2>
<ul>
<li><b>SQA</b> — process and standards to assure quality; metrics; reviews/inspections.</li>
<li><b>Maturity</b> — the <b>CMM</b> levels: Initial → Repeatable → Defined → Managed → Optimising.</li>
<li><b>SCM</b> — version control, change control, baselines, and release management of all artefacts.</li>
</ul>
<blockquote>Exam focus: order the testing levels; black-box vs white-box; what COCOMO estimates and from what; the five CMM levels in order.</blockquote>
`,
"se-ooa": `
<h2>Object-oriented fundamentals</h2>
<p>OO analysis models a system as collaborating <b>objects</b> from the problem domain. Core ideas (recap from Programming): class/object, encapsulation, inheritance, polymorphism, and <b>association/aggregation/composition</b> relationships.</p>

<h2>UML overview</h2>
<p>The <b>Unified Modeling Language</b> is the standard notation. Diagrams split into:</p>
<ul>
<li><b>Structural</b> — class, object, component, deployment.</li>
<li><b>Behavioural</b> — use case, sequence, activity, state machine.</li>
</ul>

<h2>Use-case modelling</h2>
<p>Captures functional requirements as interactions between <b>actors</b> (users/external systems) and the system. A <b>use case</b> is a goal-oriented sequence; relationships include <b>include</b> (mandatory sub-behaviour), <b>extend</b> (optional), and generalisation.</p>

<h2>Conceptual / domain model</h2>
<p>A <b>class diagram</b> of the problem domain: identify candidate classes (often the nouns in requirements), their attributes, and associations with multiplicities (1, 0..*, 1..*). This is analysis — <i>what</i> exists — before design decides <i>how</i>.</p>
<blockquote>Exam focus: classify a UML diagram as structural or behavioural; include vs extend in use cases; the noun-identification heuristic for finding classes; read multiplicities on associations.</blockquote>
`,
"se-ood": `
<h2>From analysis to design</h2>
<p>OO design refines the domain model into a software solution: assign responsibilities to classes, define interfaces, and detail collaborations. Guided by <b>GRASP</b> and <b>SOLID</b> principles (e.g. single responsibility, open-closed).</p>

<h2>Collaboration &amp; sequence diagrams</h2>
<p>Show how objects interact to fulfil a use case by exchanging messages.</p>
<ul>
<li><b>Sequence diagram</b> — messages along a timeline (lifelines, activation bars) — emphasises <i>order</i>.</li>
<li><b>Communication (collaboration) diagram</b> — objects and links with numbered messages — emphasises <i>structure</i>.</li>
</ul>

<h2>Design class diagram</h2>
<p>The analysis class diagram is enriched with visibility (+ public, − private, # protected), method signatures, navigability, and design-level classes (controllers, interfaces).</p>

<h2>Applying patterns</h2>
<p>Design patterns recur here as named solutions: <b>Observer</b> for event notification, <b>Strategy</b> for interchangeable algorithms, <b>Factory</b> for object creation, <b>Singleton</b> for a single instance. They improve flexibility and reuse but should not be over-applied.</p>
<blockquote>Exam focus: sequence (time-ordered) vs communication (structure) diagram; read visibility symbols; match a pattern to the problem it solves.</blockquote>
`,
"se-impl": `
<h2>Design to code</h2>
<p>Implementation maps the design onto a programming language: each class → a class/file, associations → references/collections, inheritance → language inheritance, interfaces → abstract classes/interfaces.</p>
<ul>
<li><b>1:1 association</b> → an object reference field.</li>
<li><b>1:many</b> → a collection (list/map).</li>
<li><b>Composition</b> → owned object created/destroyed with its container.</li>
</ul>

<h2>Coding standards &amp; quality</h2>
<p>Consistent naming, formatting, comments and documentation make code maintainable. Practices: code reviews, pair programming, refactoring (improve structure without changing behaviour), and unit tests alongside the code.</p>

<h2>Error and exception handling</h2>
<p>Robust code anticipates failure. Use the language's <b>exception</b> mechanism (try/catch/finally) to separate normal flow from error handling; validate inputs at boundaries; fail fast with clear messages; release resources in finally/destructors (recap from C++ exceptions).</p>
<ul>
<li><b>Defensive programming</b> — check pre/post-conditions.</li>
<li><b>Logging</b> — record errors for diagnosis.</li>
<li><b>Graceful degradation</b> — keep partial service on failure.</li>
</ul>
<blockquote>Exam focus: map association multiplicities to code (reference vs collection); what refactoring is; the role of try/catch/finally and defensive programming.</blockquote>
`,
"ai-agent": `
<h2>What AI is</h2>
<p><b>Artificial Intelligence</b> studies how to make machines act intelligently — perceive, reason, learn, and act. Approaches: acting/thinking humanly vs rationally; the <b>Turing test</b> is the classic behavioural benchmark.</p>

<h2>Intelligent agents</h2>
<p>An <b>agent</b> perceives its environment through sensors and acts through actuators. A <b>rational agent</b> chooses actions expected to maximise its performance measure.</p>
<h3>PEAS framework</h3>
<p>Specify an agent by its <b>P</b>erformance measure, <b>E</b>nvironment, <b>A</b>ctuators, and <b>S</b>ensors — e.g. a self-driving taxi: safety/speed; roads/traffic; steering/brake; cameras/GPS.</p>

<h2>Environment types</h2>
<table>
<tr><th>Dimension</th><th>Contrast</th></tr>
<tr><td>Observability</td><td>fully vs partially observable</td></tr>
<tr><td>Determinism</td><td>deterministic vs stochastic</td></tr>
<tr><td>Dynamics</td><td>static vs dynamic</td></tr>
<tr><td>Discreteness</td><td>discrete vs continuous</td></tr>
<tr><td>Agents</td><td>single vs multi-agent</td></tr>
</table>

<h2>Agent architectures</h2>
<p>Simple reflex, model-based reflex, goal-based, utility-based, and <b>learning</b> agents — increasing sophistication. A learning agent improves its behaviour from experience.</p>
<blockquote>Exam focus: expand PEAS; classify an environment along the dimensions; rank the agent types by capability; define a rational agent.</blockquote>
`,
"ai-search": `
<h2>Problem solving as search</h2>
<p>Many AI tasks are framed as searching a state space: initial state, actions, goal test, path cost. The solution is a sequence of actions (a path) to a goal.</p>

<h2>Uninformed (blind) search</h2>
<table>
<tr><th>Strategy</th><th>Complete?</th><th>Optimal?</th><th>Note</th></tr>
<tr><td>BFS</td><td>yes</td><td>yes (unit cost)</td><td>uses a queue; high memory</td></tr>
<tr><td>DFS</td><td>no</td><td>no</td><td>low memory; can loop</td></tr>
<tr><td>Uniform-cost</td><td>yes</td><td>yes</td><td>expands lowest path cost</td></tr>
<tr><td>Iterative deepening</td><td>yes</td><td>yes</td><td>DFS memory + BFS completeness</td></tr>
</table>

<h2>Informed (heuristic) search</h2>
<p>A <b>heuristic</b> $h(n)$ estimates cost to the goal.</p>
<ul>
<li><b>Greedy best-first</b> — expand the node with smallest $h(n)$; fast but not optimal.</li>
<li><b>A*</b> — expand smallest $f(n) = g(n) + h(n)$; <b>optimal</b> if h is <b>admissible</b> (never overestimates).</li>
</ul>

<h2>Adversarial search (games)</h2>
<p><b>Minimax</b> assumes an optimal opponent: maximise your minimum outcome over the game tree. <b>Alpha-beta pruning</b> skips branches that cannot affect the result, often roughly halving the effective depth cost.</p>
<blockquote>Exam focus: BFS vs DFS completeness/optimality; A* is optimal with an admissible heuristic; minimax + alpha-beta pruning purpose.</blockquote>
`,
"ai-kr": `
<h2>Knowledge representation</h2>
<p>To reason, an agent needs to <b>represent</b> what it knows in a form it can manipulate. Trade-off: expressiveness vs efficiency of inference.</p>

<h2>Logic</h2>
<ul>
<li><b>Propositional logic</b> — facts as true/false symbols combined with $&#92;land, &#92;lor, &#92;lnot, &#92;rightarrow$. Limited expressiveness.</li>
<li><b>First-order (predicate) logic</b> — adds objects, predicates, and quantifiers $&#92;forall, &#92;exists$ — far more expressive.</li>
<li><b>Inference</b> — modus ponens, resolution; an agent derives new facts from known ones.</li>
</ul>

<h2>Structured representations</h2>
<table>
<tr><th>Scheme</th><th>Idea</th></tr>
<tr><td>Semantic network</td><td>nodes = concepts, edges = relations (is-a, has-a)</td></tr>
<tr><td>Frames</td><td>objects with slots and values (like records)</td></tr>
<tr><td>Scripts</td><td>stereotyped event sequences</td></tr>
<tr><td>Ontology</td><td>formal vocabulary of a domain</td></tr>
</table>

<h2>Reasoning under uncertainty</h2>
<p>Real knowledge is uncertain. <b>Probabilistic reasoning</b> uses Bayes' rule $P(H|E) = &#92;dfrac{P(E|H)P(H)}{P(E)}$; a <b>Bayesian network</b> is a directed graph encoding conditional dependencies compactly. <b>Fuzzy logic</b> handles degrees of truth in $[0,1]$.</p>
<blockquote>Exam focus: propositional vs first-order logic (quantifiers); state Bayes' rule; what a semantic network / Bayesian network represents.</blockquote>
`,
"ai-es": `
<h2>Expert systems</h2>
<p>An <b>expert system</b> captures a human specialist's knowledge to solve domain problems (diagnosis, configuration). Classic examples: MYCIN (medical), DENDRAL (chemistry).</p>
<h3>Architecture</h3>
<ul>
<li><b>Knowledge base</b> — domain rules and facts (often IF-THEN rules).</li>
<li><b>Inference engine</b> — applies rules: <b>forward chaining</b> (data-driven) or <b>backward chaining</b> (goal-driven).</li>
<li><b>Explanation facility</b>, <b>knowledge-acquisition</b> module, and <b>user interface</b>.</li>
</ul>

<h2>Natural Language Processing</h2>
<p>Enables machines to understand/generate human language. Pipeline: morphological → syntactic (parsing) → semantic → pragmatic analysis. Modern NLP uses statistical and neural (transformer) models. Tasks: translation, sentiment, question answering, summarisation.</p>

<h2>Computer vision &amp; robotics</h2>
<ul>
<li><b>Vision</b> — image acquisition, pre-processing, segmentation, feature extraction, recognition.</li>
<li><b>Robotics</b> — perception, planning, and control of physical agents; combines sensing, KR, and search/learning.</li>
</ul>
<p><b>Current trends</b> (KU explicitly tests these): large language models and generative AI, deep learning, reinforcement learning, and ethical/safety concerns around AI deployment.</p>
<blockquote>Exam focus: name the three core expert-system components; forward vs backward chaining; the NLP analysis levels; be aware of current AI trends (LLMs, generative AI).</blockquote>
`,
"ai-ml": `
<h2>Machine learning</h2>
<p>Systems that <b>learn from data</b> rather than being explicitly programmed. Three paradigms:</p>
<table>
<tr><th>Type</th><th>Data</th><th>Goal</th></tr>
<tr><td>Supervised</td><td>labelled</td><td>classification / regression</td></tr>
<tr><td>Unsupervised</td><td>unlabelled</td><td>clustering / dimensionality reduction</td></tr>
<tr><td>Reinforcement</td><td>rewards from environment</td><td>learn a policy by trial and error</td></tr>
</table>

<h2>Key algorithms</h2>
<ul>
<li><b>Decision tree</b> — splits on the most informative attribute (information gain / Gini); readable rules; risk of overfitting (pruned to fix).</li>
<li><b>k-NN, Naive Bayes, SVM</b> — common classifiers.</li>
<li><b>k-means</b> — clustering into k groups.</li>
</ul>

<h2>Genetic algorithms</h2>
<p>An evolutionary optimisation method: a <b>population</b> of candidate solutions evolves via <b>selection</b> (fitness-based), <b>crossover</b> (recombine), and <b>mutation</b> (random change) over generations toward better solutions.</p>

<h2>Fuzzy logic</h2>
<p>Replaces crisp 0/1 with <b>membership degrees</b> in $[0,1]$ and linguistic terms (cold/warm/hot). A fuzzy system: fuzzification → rule evaluation → defuzzification — used in control (e.g. appliances).</p>

<h2>Evaluation</h2>
<p>Split into train/test; watch <b>overfitting</b> (memorising) vs <b>underfitting</b>; metrics: accuracy, precision, recall, F1.</p>
<blockquote>Exam focus: supervised vs unsupervised vs RL; decision-tree split criterion; the three genetic-algorithm operators; what fuzzy membership means.</blockquote>
`,
"ai-nn": `
<h2>Neural networks</h2>
<p>Inspired by biological neurons: units (<b>neurons</b>) with weighted inputs, a bias, and an <b>activation function</b>. A neuron computes $y = f&#92;left(&#92;sum_i w_i x_i + b&#92;right)$.</p>

<h2>The perceptron</h2>
<p>A single-layer linear classifier; it learns weights by the perceptron rule. <b>Limitation:</b> it can only separate <b>linearly separable</b> data — famously it cannot learn XOR. Multi-layer networks overcome this.</p>

<h2>Activation functions</h2>
<table>
<tr><th>Function</th><th>Range</th></tr>
<tr><td>Step / sign</td><td>{0,1} or {−1,1}</td></tr>
<tr><td>Sigmoid</td><td>(0, 1)</td></tr>
<tr><td>tanh</td><td>(−1, 1)</td></tr>
<tr><td>ReLU</td><td>$&#92;max(0, x)$</td></tr>
</table>

<h2>Training: gradient descent &amp; backpropagation</h2>
<p>Training minimises a <b>loss</b> by adjusting weights along the negative gradient: $w &#92;leftarrow w - &#92;eta &#92;,&#92;nabla L$, where $&#92;eta$ is the learning rate. <b>Backpropagation</b> applies the chain rule to compute these gradients efficiently layer by layer, from output back to input.</p>

<h2>Network types</h2>
<ul>
<li><b>Feedforward / MLP</b> — signal flows one way.</li>
<li><b>Hopfield network</b> — recurrent, symmetric weights; an associative memory that settles into stored patterns by minimising an energy function.</li>
<li><b>CNN</b> (images), <b>RNN</b> (sequences) — the basis of deep learning.</li>
</ul>
<blockquote>Exam focus: a perceptron only separates linearly separable data (XOR fails); the role of activation functions; gradient descent + backprop train weights; a Hopfield net is an associative memory.</blockquote>
`,
"ns-types": `
<h2>Security goals — the CIA triad</h2>
<table>
<tr><th>Goal</th><th>Meaning</th></tr>
<tr><td>Confidentiality</td><td>only authorised parties read data</td></tr>
<tr><td>Integrity</td><td>data is not altered undetected</td></tr>
<tr><td>Availability</td><td>service is accessible when needed</td></tr>
</table>
<p>Also: authentication (verify identity), authorisation, and non-repudiation (cannot deny an action).</p>

<h2>Types of attack</h2>
<ul>
<li><b>Passive</b> — eavesdropping, traffic analysis (hard to detect, prevented by encryption).</li>
<li><b>Active</b> — modification, masquerade, replay, <b>denial of service (DoS/DDoS)</b>.</li>
<li><b>Interruption / interception / modification / fabrication</b> — the four threat categories.</li>
</ul>

<h2>Common threats</h2>
<p>Malware (virus, worm, trojan, ransomware), phishing/social engineering, man-in-the-middle, SQL injection, cross-site scripting, and password attacks (brute force, dictionary).</p>

<h2>Defence in depth</h2>
<p>Security is layered: physical, network, host, application, and data controls — no single mechanism suffices. Risk = threat × vulnerability × impact.</p>
<blockquote>Exam focus: expand the CIA triad; passive vs active attacks (with examples); classify an attack into interruption/interception/modification/fabrication.</blockquote>
`,
"ns-crypto": `
<h2>Cryptography basics</h2>
<p><b>Encryption</b> transforms plaintext into ciphertext with a key; <b>decryption</b> reverses it. Goal: confidentiality (and, with extra mechanisms, integrity and authenticity).</p>

<h2>Symmetric vs asymmetric</h2>
<table>
<tr><th></th><th>Symmetric</th><th>Asymmetric</th></tr>
<tr><td>Keys</td><td>one shared secret key</td><td>public + private key pair</td></tr>
<tr><td>Speed</td><td>fast</td><td>slow</td></tr>
<tr><td>Problem</td><td>key distribution</td><td>computationally heavy</td></tr>
<tr><td>Examples</td><td>DES, AES</td><td>RSA, ECC, Diffie-Hellman</td></tr>
</table>
<p>Practice combines both: asymmetric crypto exchanges a symmetric session key, then symmetric crypto encrypts the bulk data.</p>

<h2>RSA</h2>
<p>A public-key cipher based on the difficulty of <b>factoring large numbers</b>. Choose primes $p, q$; $n = pq$; pick $e$ coprime to $&#92;phi(n)$; find $d$ with $ed &#92;equiv 1 &#92;pmod{&#92;phi(n)}$. Encrypt $c = m^e &#92;bmod n$; decrypt $m = c^d &#92;bmod n$. Public key $(e, n)$, private key $(d, n)$.</p>

<h2>Hashing &amp; digital signatures</h2>
<p>A <b>hash function</b> (MD5, SHA) maps data to a fixed-size digest — one-way, collision-resistant — used for integrity. A <b>digital signature</b> encrypts a message's hash with the sender's <b>private</b> key; anyone verifies it with the sender's <b>public</b> key — providing authentication, integrity and non-repudiation.</p>
<blockquote>Exam focus: symmetric vs asymmetric trade-offs; RSA rests on factoring; a signature uses the sender's private key, verified with the public key; hashes give integrity.</blockquote>
`,
"ns-proto": `
<h2>Security protocols by layer</h2>
<p>Security is added at different layers — examiners often ask which layer a protocol secures.</p>
<table>
<tr><th>Protocol</th><th>Layer</th><th>Secures</th></tr>
<tr><td>PGP, S/MIME</td><td>application</td><td>email</td></tr>
<tr><td>SSL / TLS, HTTPS</td><td>transport</td><td>web sessions</td></tr>
<tr><td>IPsec</td><td>network</td><td>VPN / IP packets</td></tr>
<tr><td>WPA2/WPA3 (WEP legacy)</td><td>data link</td><td>Wi-Fi</td></tr>
</table>

<h2>PGP &amp; SSL/TLS</h2>
<p><b>PGP</b> secures email using hybrid crypto (session key + RSA) plus signatures. <b>SSL/TLS</b> sets up a secure channel via a handshake: authenticate with certificates, agree a cipher suite, exchange a session key, then encrypt traffic — the basis of HTTPS.</p>

<h2>IPsec &amp; VPN</h2>
<p><b>IPsec</b> protects IP packets with two modes (transport, tunnel) and two protocols: <b>AH</b> (authentication/integrity) and <b>ESP</b> (encryption + authentication). A <b>VPN</b> tunnels private traffic securely over a public network, commonly using IPsec or TLS.</p>

<h2>Firewalls &amp; WEP</h2>
<ul>
<li><b>Firewall</b> — filters traffic by rules: packet-filter, stateful inspection, application/proxy. A <b>DMZ</b> isolates public-facing servers.</li>
<li><b>WEP</b> — early Wi-Fi security, now broken (weak RC4 key use); replaced by WPA2/WPA3.</li>
</ul>
<blockquote>Exam focus: match protocol to layer (TLS = transport, IPsec = network); IPsec AH vs ESP; what a VPN provides; firewall types; WEP is insecure.</blockquote>
`,
"cg-intro": `
<h2>Computer graphics overview</h2>
<p><b>Computer graphics</b> creates and manipulates images with a computer. Applications: CAD, GUIs, games, visualisation, simulation, animation.</p>

<h2>Display hardware</h2>
<table>
<tr><th>Type</th><th>How it draws</th></tr>
<tr><td>Raster</td><td>grid of <b>pixels</b> in a frame buffer; scan-line refresh</td></tr>
<tr><td>Random / vector</td><td>draws lines directly between endpoints</td></tr>
</table>
<p>Key terms: <b>pixel</b>, <b>resolution</b>, <b>aspect ratio</b>, <b>frame buffer</b> (memory holding the image), <b>refresh rate</b>, and <b>colour depth</b> (bits per pixel).</p>

<h2>Scan conversion (rasterization)</h2>
<p>Turning geometric primitives into pixels:</p>
<ul>
<li><b>Lines</b> — DDA and the integer-only <b>Bresenham's line algorithm</b> (no floating point, efficient).</li>
<li><b>Circles</b> — the midpoint circle algorithm exploiting 8-way symmetry.</li>
<li><b>Aliasing</b> — jagged "staircase" edges; reduced by <b>anti-aliasing</b>.</li>
</ul>
<blockquote>Exam focus: raster (pixel grid) vs vector display; what the frame buffer holds; Bresenham is preferred because it uses only integer arithmetic; define aliasing.</blockquote>
`,
"cg-2d": `
<h2>2D transformations</h2>
<p>Geometric operations on objects, applied to each vertex. Basic transforms:</p>
<ul>
<li><b>Translation</b> — move by $(t_x, t_y)$.</li>
<li><b>Scaling</b> — multiply coordinates by $(s_x, s_y)$.</li>
<li><b>Rotation</b> — by angle $&#92;theta$ about the origin.</li>
<li><b>Reflection</b> and <b>shear</b>.</li>
</ul>

<h2>Homogeneous coordinates</h2>
<p>A point $(x, y)$ is written $(x, y, 1)$ so that <b>all</b> transforms — including translation — become matrix multiplications and can be <b>composed</b> by multiplying matrices.</p>
$$&#92;begin{bmatrix} x' &#92;&#92; y' &#92;&#92; 1 &#92;end{bmatrix} = &#92;begin{bmatrix} 1 &amp; 0 &amp; t_x &#92;&#92; 0 &amp; 1 &amp; t_y &#92;&#92; 0 &amp; 0 &amp; 1 &#92;end{bmatrix} &#92;begin{bmatrix} x &#92;&#92; y &#92;&#92; 1 &#92;end{bmatrix}$$
<p>Rotation matrix: $&#92;begin{bmatrix} &#92;cos&#92;theta &amp; -&#92;sin&#92;theta &#92;&#92; &#92;sin&#92;theta &amp; &#92;cos&#92;theta &#92;end{bmatrix}$.</p>

<h2>Viewing pipeline &amp; clipping</h2>
<p>World coordinates → <b>window</b> (region of interest) → <b>viewport</b> (screen area), via the window-to-viewport transform. <b>Clipping</b> discards parts outside the window:</p>
<ul>
<li><b>Cohen-Sutherland</b> — line clipping using 4-bit region outcodes.</li>
<li><b>Sutherland-Hodgman</b> — polygon clipping against each window edge.</li>
</ul>
<blockquote>Exam focus: why homogeneous coordinates (translation as matrix multiply, composition); write the rotation matrix; window vs viewport; name a line- and a polygon-clipping algorithm.</blockquote>
`,
"cg-3d": `
<h2>3D transformations</h2>
<p>Extend 2D transforms to three dimensions using $4 &#92;times 4$ homogeneous matrices. Translation and scaling generalise directly; rotation is specified about the x, y, or z axis (each a distinct matrix). Composite transforms multiply these matrices.</p>

<h2>Projections</h2>
<p>Map 3D points onto a 2D view plane.</p>
<table>
<tr><th>Type</th><th>Property</th></tr>
<tr><td><b>Parallel</b></td><td>projectors parallel; preserves true size (orthographic, oblique). Used in engineering drawings.</td></tr>
<tr><td><b>Perspective</b></td><td>projectors meet at a centre; distant objects shrink (vanishing points). Realistic.</td></tr>
</table>
<p>Perspective gives <b>foreshortening</b>; parallel projection keeps parallel lines parallel and is measurable.</p>

<h2>Hidden-surface removal &amp; rendering</h2>
<ul>
<li><b>Z-buffer (depth buffer)</b> — keep the nearest pixel per screen position; simple and standard.</li>
<li><b>Back-face culling</b>, painter's algorithm — other visibility methods.</li>
<li><b>Shading</b> — flat, Gouraud (vertex interpolation), Phong (normal interpolation) for smooth surfaces; illumination via ambient + diffuse + specular terms.</li>
</ul>
<blockquote>Exam focus: parallel vs perspective projection (size preservation vs foreshortening); 3D transforms use 4x4 matrices; the z-buffer resolves hidden surfaces; Gouraud vs Phong shading.</blockquote>
`,
};

/* ============================================================ STATE ============================================================ */
const tierColorVar = {t1:'--t1',t2:'--t2',t3:'--t3',t4:'--t4'};
let progress = {};
let current = null;

function save(){ try{ localStorage.setItem('nec_progress', JSON.stringify(progress)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem('nec_progress'); if(r) progress=JSON.parse(r); }catch(e){} }
function saveTheme(t){ try{ localStorage.setItem('nec_theme', t); }catch(e){} }
function loadTheme(){ try{ return localStorage.getItem('nec_theme'); }catch(e){ return null; } }

const FLAT = [];
CURRICULUM.forEach(t=>t.chapters.forEach(c=>c.topics.forEach(tp=>{ FLAT.push({...tp, tier:t, chapter:c}); })));

function statusOf(id){ return progress[id]||'todo'; }
function pct(topics){
  if(!topics.length) return 0;
  let s=0; topics.forEach(tp=>{ const st=statusOf(tp.id); s += st==='done'?1:st==='wip'?0.5:0; });
  return Math.round(s/topics.length*100);
}
function tierTopics(t){ return t.chapters.flatMap(c=>c.topics); }

/* ============================================================ TREE ============================================================ */
function buildTree(){
  const tree=document.getElementById('tree');
  tree.innerHTML = CURRICULUM.map(t=>{
    const p = pct(tierTopics(t));
    const cv = tierColorVar[t.id];
    const chapters = t.chapters.map(c=>{
      const topics = c.topics.map(tp=>`
        <div class="topic" data-id="${tp.id}" data-status="${statusOf(tp.id)}" data-search="${(tp.n+' '+c.n+' '+t.n).toLowerCase()}">
          <span class="status"></span><span class="topic-name">${tp.n}</span>
        </div>`).join('');
      return `<div class="chapter collapsed" data-chap="${c.id}">
        <div class="chapter-head" data-chaptoggle="${c.id}">
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
          <span class="chapter-name">${c.n}</span>
          ${c.exams?`<span class="code">${c.exams.join('·')}</span>`:''}
        </div>
        <div class="chapter-body">${topics}</div>
      </div>`;
    }).join('');
    return `<div class="tier collapsed" data-tier="${t.id}">
      <div class="tier-head" data-tiertoggle="${t.id}">
        <span class="tier-bar" style="background:var(${cv})"></span>
        <span class="tier-titles"><b>${t.n}</b><em>${t.sub}</em></span>
        <span class="tier-pct" data-tierpct="${t.id}">${p}%</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="tier-body">${chapters}</div>
    </div>`;
  }).join('');

  tree.querySelectorAll('[data-tiertoggle]').forEach(el=>el.addEventListener('click',()=>{
    el.closest('.tier').classList.toggle('collapsed'); }));
  tree.querySelectorAll('[data-chaptoggle]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation(); el.closest('.chapter').classList.toggle('collapsed'); }));
  tree.querySelectorAll('.topic').forEach(el=>el.addEventListener('click',()=>{
    openTopic(el.dataset.id); if(window.innerWidth<=880) toggleSidebar(false); }));
}

function refreshProgressUI(){
  CURRICULUM.forEach(t=>{ const el=document.querySelector(`[data-tierpct="${t.id}"]`); if(el) el.textContent = pct(tierTopics(t))+'%'; });
  const overall = pct(FLAT);
  document.getElementById('overallPct').textContent = overall+'%';
  document.getElementById('overallBar').style.width = overall+'%';
  document.querySelectorAll('.topic').forEach(el=>{ el.dataset.status = statusOf(el.dataset.id); });
}

/* ============================================================ DASHBOARD ============================================================ */
function renderWelcome(){
  current=null;
  document.querySelectorAll('.topic.active').forEach(e=>e.classList.remove('active'));
  document.getElementById('crumbs').innerHTML='Dashboard';
  const cards = CURRICULUM.map(t=>{
    const tp=tierTopics(t); const p=pct(tp); const cv=tierColorVar[t.id];
    const label = t.n.split('—')[0].trim().replace('Tier ','');
    return `<div class="tcard" data-opentier="${t.id}">
      <div class="badge" style="background:var(${cv})">${label}</div>
      <div class="tcard-main">
        <h3>${t.n.split('—')[1].trim()}</h3>
        <p>${t.sub}</p>
        <div class="exam-tags">${t.exams.map(e=>`<span class="exam-tag">${e}</span>`).join('')}</div>
        <div class="mini-meter"><span style="width:${p}%;background:var(${cv})"></span></div>
      </div>
      <div class="tcard-pct"><b>${p}%</b><small>${tp.length} topics</small></div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <h1>Your engineering entrance, in one place.</h1>
      <p class="lede">One CS core studied once, then thin top-up layers per exam. Pick a tier to start filling it in — your progress saves automatically in this browser.</p>
      <div class="tier-cards">${cards}</div>
    </div>`;
  document.querySelectorAll('[data-opentier]').forEach(el=>el.addEventListener('click',()=>{
    const tid=el.dataset.opentier;
    document.querySelector(`[data-tier="${tid}"]`).classList.remove('collapsed');
    const t=CURRICULUM.find(x=>x.id===tid);
    document.querySelector(`[data-chap="${t.chapters[0].id}"]`).classList.remove('collapsed');
    openTopic(t.chapters[0].topics[0].id);
  }));
}

/* ============================================================ TOPIC VIEW ============================================================ */
function openTopic(id){
  const idx = FLAT.findIndex(x=>x.id===id);
  if(idx<0) return;
  const item = FLAT[idx];
  current=id;
  const cv = tierColorVar[item.tier.id];

  document.querySelectorAll('.topic.active').forEach(e=>e.classList.remove('active'));
  const tEl=document.querySelector(`.topic[data-id="${id}"]`);
  if(tEl){
    tEl.classList.add('active');
    tEl.closest('.tier').classList.remove('collapsed');
    tEl.closest('.chapter').classList.remove('collapsed');
    tEl.scrollIntoView({block:'nearest'});
  }

  document.getElementById('crumbs').innerHTML =
    `${item.tier.n.split('—')[0].trim()} · ${item.chapter.n} · <b>${item.n.split(':')[0].split('(')[0].trim()}</b>`;

  const prev = idx>0 ? FLAT[idx-1] : null;
  const next = idx<FLAT.length-1 ? FLAT[idx+1] : null;
  const st = statusOf(id);

  const html = CONTENT[id];
  const body = html && html.trim()
    ? `<div class="reading">${html}</div>`
    : `<div class="placeholder">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h11l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/><path d="M14 4v5h5"/><path d="M8 13h8M8 17h5"/></svg>
         <b>Content coming</b>
         <span>This topic is part of the skeleton — notes, derivations and worked examples land here.</span>
         <div class="how">Fill it in the CONTENT map near the top of the script: <b>CONTENT["${id}"]</b> = a string of HTML.</div>
       </div>`;

  document.getElementById('content').innerHTML = `
    <div class="topic-view">
      <div class="eyebrow">
        <span class="pill" style="background:var(${cv})">${item.tier.n.split('—')[0].trim()}</span>
        <span>${item.chapter.n}</span>
        ${item.chapter.exams?item.chapter.exams.map(e=>`<span class="ex-pill">${e}</span>`).join(''):''}
      </div>
      <h1>${item.n}</h1>
      <div class="status-row">
        <span class="lbl">Status</span>
        <div class="seg" id="seg">
          <button data-s="todo" class="${st==='todo'?'on':''}">To do</button>
          <button data-s="wip"  class="${st==='wip'?'on':''}">In progress</button>
          <button data-s="done" class="${st==='done'?'on':''}">Done</button>
        </div>
      </div>
      ${body}
      <div class="pager">
        ${prev?`<a href="#" class="prev" data-go="${prev.id}"><small>← Previous</small><b>${prev.n.split(':')[0].split('(')[0].trim()}</b></a>`:`<a class="prev disabled"><small>← Previous</small><b>—</b></a>`}
        ${next?`<a href="#" class="next" data-go="${next.id}"><small>Next →</small><b>${next.n.split(':')[0].split('(')[0].trim()}</b></a>`:`<a class="next disabled"><small>Next →</small><b>—</b></a>`}
      </div>
    </div>`;

  document.querySelectorAll('#seg button').forEach(b=>b.addEventListener('click',()=>{
    progress[id]=b.dataset.s; save();
    document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); refreshProgressUI();
  }));
  document.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault(); openTopic(a.dataset.go);
    document.getElementById('content').scrollIntoView({behavior:'smooth',block:'start'});
  }));

  if(window.renderMathInElement){
    renderMathInElement(document.getElementById('content'),{
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError:false
    });
  }
}

/* ============================================================ SEARCH ============================================================ */
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.topic').forEach(el=>{
    el.style.display = (!q||el.dataset.search.includes(q))?'flex':'none'; });
  document.querySelectorAll('.chapter').forEach(ch=>{
    const anyHit=[...ch.querySelectorAll('.topic')].some(t=>t.style.display!=='none');
    if(q){ ch.classList.toggle('collapsed',!anyHit); ch.style.display = anyHit?'block':'none'; }
    else { ch.style.display='block'; } });
  document.querySelectorAll('.tier').forEach(ti=>{
    const anyHit=[...ti.querySelectorAll('.topic')].some(t=>t.style.display!=='none');
    if(q){ ti.classList.toggle('collapsed',!anyHit); ti.style.display=anyHit?'block':'none'; }
    else { ti.style.display='block'; } });
});

/* ============================================================ THEME + MOBILE ============================================================ */
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  const night = t==='night';
  document.getElementById('themeLabel').textContent = night?'Day':'Night';
  document.getElementById('themeIcon').innerHTML = night
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  saveTheme(t);
}
document.getElementById('themeBtn').addEventListener('click',()=>{
  applyTheme(document.documentElement.dataset.theme==='night'?'paper':'night'); });

function toggleSidebar(show){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('overlay');
  const willShow = show===undefined ? sb.classList.contains('hidden') : show;
  sb.classList.toggle('hidden',!willShow);
  ov.classList.toggle('show',willShow);
}
document.getElementById('menuBtn').addEventListener('click',()=>toggleSidebar());
document.getElementById('overlay').addEventListener('click',()=>toggleSidebar(false));

document.addEventListener('keydown',e=>{
  if(!current || ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const idx=FLAT.findIndex(x=>x.id===current);
  if(e.key==='ArrowRight' && idx<FLAT.length-1) openTopic(FLAT[idx+1].id);
  if(e.key==='ArrowLeft'  && idx>0) openTopic(FLAT[idx-1].id);
});

/* ============================================================ INIT ============================================================ */
load();
applyTheme(loadTheme()||'paper');
if(window.innerWidth<=880) document.getElementById('sidebar').classList.add('hidden');
buildTree();
refreshProgressUI();
renderWelcome();
</script>
</body>
</html>
