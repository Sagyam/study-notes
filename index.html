<p>CSMA/CD requires frame time ≥ 2 × propagation (hence Ethernet's 64-byte minimum frame). Channelisation alternatives: FDMA, TDMA, CDMA (orthogonal codes).</p>

<h2>Ethernet, switching, ARP</h2>
<ul>
<li>Ethernet frame: preamble, dest MAC (6 B), src MAC (6 B), type, payload 46-1500 B, CRC-32. <b>MAC address</b> = 48 bits, first 3 bytes the vendor OUI; FF:FF:FF:FF:FF:FF = broadcast.</li>
<li>A <b>switch</b> learns source MACs per port (backward learning), forwards/filters/floods; full-duplex switched Ethernet has no collisions. <b>VLANs</b> partition broadcast domains; spanning tree (STP) kills loops.</li>
<li><b>ARP</b> — broadcast "who has IP x?" → unicast reply with MAC; cached. <b>RARP/BOOTP/DHCP</b> assign IPs; <b>gratuitous ARP</b> announces/detects duplicates.</li>
</ul>
<blockquote>Exam traps: CRC detects, Hamming corrects; $2^r &#92;ge m+r+1$; Go-Back-N window $2^k-1$ vs Selective Repeat $2^{k-1}$; slotted ALOHA doubles pure ALOHA to 36.8%; Ethernet min frame 64 B comes from CSMA/CD timing; ARP maps IP→MAC (not the reverse).</blockquote>`,

"net-ip": `<h2>IPv4 — addressing</h2>
<p>32-bit addresses, network ‖ host split. Classful legacy:</p>
<table>
<tr><th>Class</th><th>First octet</th><th>Default mask</th><th>Networks × hosts</th></tr>
<tr><td>A</td><td>1-126</td><td>/8</td><td>126 × 16.7 M</td></tr>
<tr><td>B</td><td>128-191</td><td>/16</td><td>16 K × 65 534</td></tr>
<tr><td>C</td><td>192-223</td><td>/24</td><td>2 M × 254</td></tr>
<tr><td>D</td><td>224-239</td><td colspan="2">multicast</td></tr>
<tr><td>E</td><td>240-255</td><td colspan="2">experimental</td></tr>
</table>
<p>Special: 127.0.0.1 loopback; host bits all-0 = network address, all-1 = broadcast; 169.254/16 link-local (APIPA); private (RFC 1918): 10/8, 172.16/12, 192.168/16 — translated to public addresses by <b>NAT/PAT</b> (port-multiplexed), which conserved IPv4 but breaks end-to-end transparency.</p>

<h2>Subnetting — worked examples</h2>
<p>Hosts per subnet $= 2^{32-p} - 2$; subnets from borrowing b bits $= 2^b$.</p>
<ul>
<li><b>Given 192.168.10.0/24, need 4 subnets:</b> borrow 2 bits → /26 (mask 255.255.255.192), block size 64. Subnets: .0, .64, .128, .192; each has 62 usable hosts; e.g. subnet .64: range .65-.126, broadcast .127.</li>
<li><b>Which subnet holds 172.16.77.10/20?</b> /20 → third-octet block 16: subnets 172.16.0.0, 16.0, 32.0, 48.0, 64.0, <b>80.0</b>… 77 falls in 64-79 → network 172.16.64.0/20, broadcast 172.16.79.255.</li>
<li><b>VLSM:</b> assign /26 (62 hosts), /27 (30), /30 (point-to-point links: 2 usable) from one /24 without overlap — design from largest to smallest.</li>
<li><b>CIDR aggregation:</b> 200.1.0.0/24 … 200.1.3.0/24 summarise as 200.1.0.0/22 — shrinks routing tables.</li>
</ul>

<h2>IPv4 datagram &amp; companions</h2>
<p>Header (20-60 B): version, IHL, ToS/DSCP, total length, identification + flags + fragment offset (<b>fragmentation</b> when packet &gt; MTU; offset in 8-byte units; reassembly at destination), <b>TTL</b> (hop-decremented, kills loops), protocol (6 = TCP, 17 = UDP), header checksum, source/dest IP.</p>
<ul>
<li><b>ICMP</b> — error/diagnostic messages: echo request/reply (ping), destination unreachable, time exceeded (traceroute exploits TTL).</li>
<li><b>DHCP</b> — DORA: Discover, Offer, Request, Ack — leases an IP + mask, gateway, DNS.</li>
</ul>

<h2>Routing</h2>
<p>Forwarding = per-packet table lookup (<b>longest-prefix match</b>); routing = building the table. Static vs dynamic; interior (within an AS) vs exterior protocols.</p>
<table>
<tr><th></th><th>Distance vector (RIP)</th><th>Link state (OSPF)</th></tr>
<tr><td>Algorithm</td><td>Bellman-Ford</td><td>Dijkstra</td></tr>
<tr><td>Shares</td><td>its table, with neighbours</td><td>link states, flooded to all</td></tr>
<tr><td>Metric</td><td>hop count (max 15; 16 = ∞)</td><td>cost (bandwidth-based)</td></tr>
<tr><td>Issue</td><td>count-to-infinity (split horizon, poison reverse)</td><td>more CPU/memory; areas for scale</td></tr>
<tr><td>Convergence</td><td>slow</td><td>fast</td></tr>
</table>
<p><b>BGP</b> — path-vector protocol between autonomous systems; policy-driven, advertises AS-paths; the protocol that glues the Internet together.</p>

<h2>IPv6</h2>
<p>128-bit, eight hex hextets ("2001:db8::1" — :: compresses one run of zeros). Fixed 40-B header (no checksum, no router fragmentation — source does path-MTU); extension headers; <b>no broadcast</b> (multicast + anycast); SLAAC auto-configuration; NDP replaces ARP; IPsec native. Transition: dual stack, tunnelling (6to4), translation (NAT64).</p>
<blockquote>Exam traps: usable hosts $2^{32-p}-2$; /30 gives 2 usable (point-to-point); block-size shortcut 256 − mask octet; longest-prefix match decides forwarding; RIP max 15 hops; TTL prevents loops; fragmentation offset counts 8-byte units; IPv6 routers never fragment.</blockquote>`,

"net-tcp": `<h2>Process-to-process delivery</h2>
<p>The transport layer multiplexes by <b>port</b> (16-bit): socket = (IP, port). Well-known 0-1023, registered 1024-49151, ephemeral above. A connection is identified by the 4-tuple (src IP, src port, dst IP, dst port).</p>

<h2>UDP</h2>
<p>8-byte header: src port, dst port, length, checksum. Connectionless, unordered, no congestion control — just demultiplexing + optional checksum. Ideal when latency beats reliability (DNS, VoIP, streaming, gaming, SNMP, DHCP) or the app does its own control (QUIC).</p>

<h2>TCP — reliable byte stream</h2>
<p>Header (20-60 B): ports, <b>sequence number</b> (byte-numbered stream), <b>acknowledgement number</b> (next byte expected — cumulative ACK), flags (SYN, ACK, FIN, RST, PSH, URG), <b>window</b> (receiver's free buffer), checksum, options (MSS, SACK, window scale, timestamps).</p>
<h3>Connection management</h3>
<pre><code>Open  (3-way):  SYN(seq=x)  →
                ←  SYN+ACK(seq=y, ack=x+1)
                ACK(ack=y+1) →
Close (4-way):  FIN → ACK ;  FIN → ACK   (each side closes independently)</code></pre>
<p>SYN consumes one sequence number; initial sequence numbers are randomised. The closer waits in <b>TIME_WAIT</b> (2×MSL) so stray segments die. <b>SYN flooding</b> attacks half-open connections (mitigated by SYN cookies).</p>
<h3>Reliability &amp; flow control</h3>
<ul>
<li>Lost segments detected by <b>retransmission timeout</b> (RTO from smoothed RTT: $SRTT = (1-&#92;alpha)SRTT + &#92;alpha&#92;,RTT_{sample}$) or by <b>3 duplicate ACKs → fast retransmit</b>.</li>
<li><b>Sliding window</b>: sender may have min(cwnd, rwnd) unACKed bytes; receiver advertises rwnd → a slow receiver throttles the sender (flow control). Window scale option lifts the 64 KB ceiling.</li>
<li>Nagle's algorithm batches tiny segments; delayed ACKs reduce ACK traffic.</li>
</ul>
<h3>Congestion control (protects the network)</h3>
<ul>
<li><b>Slow start</b> — cwnd starts ≈ 1 MSS, doubles per RTT (exponential) until <b>ssthresh</b>.</li>
<li><b>Congestion avoidance</b> — +1 MSS per RTT (linear / additive increase).</li>
<li><b>Loss reaction</b> — timeout: ssthresh = cwnd/2, cwnd = 1, slow-start again (Tahoe). Triple-dup-ACK: halve cwnd and continue linearly (Reno fast recovery). Net behaviour: <b>AIMD</b> sawtooth.</li>
</ul>
<p><i>Trace:</i> ssthresh = 16: cwnd 1→2→4→8→16 (slow start), 17, 18… at cwnd 24 a timeout → ssthresh = 12, cwnd = 1, repeat.</p>
<p><b>Throughput intuition:</b> ≈ window / RTT; bandwidth-delay product sizes the ideal window.</p>
<table>
<tr><th>Port</th><th>Service</th><th>Port</th><th>Service</th></tr>
<tr><td>20/21</td><td>FTP data/control</td><td>53</td><td>DNS</td></tr>
<tr><td>22</td><td>SSH</td><td>67/68</td><td>DHCP</td></tr>
<tr><td>23</td><td>Telnet</td><td>80 / 443</td><td>HTTP / HTTPS</td></tr>
<tr><td>25</td><td>SMTP</td><td>110 / 143</td><td>POP3 / IMAP</td></tr>
</table>
<blockquote>Exam traps: ACK number = next expected byte; flow control (receiver) vs congestion control (network) — different windows; slow start is <i>exponential</i> despite the name; 3 dup ACKs → fast retransmit (no slow start in Reno); UDP header is 8 bytes, TCP ≥ 20; TIME_WAIT purpose.</blockquote>`,

"net-app": `<h2>Application architectures</h2>
<p><b>Client-server</b> (web, email) vs <b>peer-to-peer</b> (BitTorrent) vs hybrid. Apps choose TCP (reliability) or UDP (latency); the API is the <b>socket</b>.</p>

<h2>DNS — the Internet's directory</h2>
<p>Hierarchical, distributed database mapping names → records. Resolution of www.example.com:</p>
<ol>
<li>Stub resolver asks the local/ISP <b>recursive resolver</b> (cache hit? done).</li>
<li>Recursive resolver asks a <b>root</b> server → referral to .com TLD servers.</li>
<li>Asks <b>TLD</b> server → referral to example.com's <b>authoritative</b> server.</li>
<li>Authoritative server returns the A record; answer cached per <b>TTL</b> at every hop.</li>
</ol>
<p>Iterative (referrals) vs recursive (do-it-for-me) queries. Records: <b>A</b> (IPv4), <b>AAAA</b> (IPv6), <b>MX</b> (mail, with preference), <b>CNAME</b> (alias), <b>NS</b>, <b>PTR</b> (reverse), SOA, TXT. DNS rides UDP 53 (TCP for zone transfers/large answers).</p>

<h2>HTTP</h2>
<pre><code>GET /index.html HTTP/1.1          HTTP/1.1 200 OK
Host: www.example.com             Content-Type: text/html
User-Agent: ...                   Content-Length: 1024
(blank line)                      (blank line)  &lt;html&gt;…</code></pre>
<ul>
<li>Methods: GET (fetch, idempotent), POST (submit), PUT, DELETE, HEAD.</li>
<li>Status classes: 1xx info, 2xx success (200), 3xx redirect (301, 304 Not Modified), 4xx client (403, 404), 5xx server (500, 503).</li>
<li>HTTP/1.0 non-persistent (one object per TCP connection) vs <b>HTTP/1.1 persistent + pipelining</b>; HTTP/2 multiplexes streams; HTTP/3 runs on QUIC/UDP.</li>
<li>Stateless → <b>cookies</b> + sessions add state; <b>caches/proxies</b> cut latency (conditional GET via If-Modified-Since); HTTPS = HTTP over TLS.</li>
</ul>

<h2>Email</h2>
<p>User agent → <b>SMTP</b> (push, port 25/587) → sender's mail server → SMTP → receiver's mail server; the recipient pulls via <b>POP3</b> (download-and-delete, simple) or <b>IMAP</b> (server-side folders, multi-device sync). <b>MIME</b> encodes attachments/non-ASCII into the 7-bit SMTP world. Webmail replaces the last hop with HTTP.</p>

<h2>FTP, Telnet/SSH &amp; management</h2>
<ul>
<li><b>FTP</b> — separate control (21) and data (20) connections; active vs passive mode; plaintext (use SFTP/FTPS today).</li>
<li><b>Telnet</b> (23) — plaintext remote terminal, obsolete; <b>SSH</b> (22) — encrypted shell + tunnelling + SFTP/SCP.</li>
<li><b>SNMP</b> — manager polls agents' MIB variables over UDP — network monitoring.</li>
</ul>

<h2>Socket programming &amp; analyzers</h2>
<pre><code>TCP server: socket() → bind() → listen() → accept() → recv/send → close()
TCP client: socket() → connect() → send/recv → close()
UDP:        socket() → bind() → sendto()/recvfrom()</code></pre>
<p><b>Protocol analyzers</b> (Wireshark, tcpdump) capture frames promiscuously, decode every layer, filter (e.g. tcp.port == 80) — for debugging, performance and security forensics.</p>
<blockquote>Exam traps: DNS is mostly UDP 53; MX records have preference values (lower = preferred); SMTP pushes, POP/IMAP pull; 304 = cached copy still valid; FTP's two-connection design; persistent connections distinguish HTTP/1.1; iterative vs recursive DNS queries.</blockquote>`,

"coa-fund": `<h2>Architecture vs organization</h2>
<p><b>Architecture</b> = the programmer-visible contract: instruction set, registers, data types, addressing modes, I/O mechanisms. <b>Organization</b> = the implementation: datapaths, control signals, memory technology, clock. Two CPUs can share an ISA (architecture) with different organizations — the whole x86 family.</p>

<h2>Von Neumann (stored-program) model</h2>
<ul>
<li>One memory holds <b>both instructions and data</b>; instructions are just bits, fetched sequentially via the PC.</li>
<li>Components: <b>ALU</b>, <b>control unit</b>, <b>registers</b>, memory, I/O, joined by the <b>system bus</b> — data bus (width = word transferred), address bus (width n → $2^n$ addressable locations), control bus (R/W, clock, interrupt lines).</li>
<li><b>Harvard architecture</b> — separate instruction/data memories and paths → simultaneous fetch + data access (DSPs, microcontrollers, modern L1 caches are split).</li>
<li>The shared CPU-memory path is the <b>Von Neumann bottleneck</b> — caches, prefetching and parallelism all exist to hide it.</li>
</ul>

<h2>Instruction cycle</h2>
<ol>
<li><b>Fetch</b> — MAR ← PC; read; MDR → IR; PC ← PC + 1.</li>
<li><b>Decode</b> — control unit interprets the opcode.</li>
<li><b>Execute</b> — operand fetch, ALU op, store result.</li>
<li>(<b>Interrupt check</b> — between instructions, service pending interrupts.)</li>
</ol>
<p>Key registers: PC, IR, MAR (address), MDR/MBR (data), AC (accumulator), flags/PSW.</p>

<h2>Performance — the iron law</h2>
$$&#92;text{CPU time} = &#92;text{Instruction count} &#92;times &#92;text{CPI} &#92;times T_{clock}$$
<p><i>Worked example:</i> program = $2 &#92;times 10^9$ instructions, CPI = 1.5, clock = 3 GHz → time = $2&#92;times10^9 &#92;times 1.5 / (3&#92;times10^9)$ = <b>1 s</b>. MIPS = clock / (CPI × 10⁶) — easily gamed across ISAs, so compare with care.</p>
<p><b>Amdahl's law</b> — overall speedup from improving a fraction f by factor s: $S = &#92;dfrac{1}{(1-f) + f/s}$. Making 40% of a program 10× faster: S = 1/(0.6 + 0.04) = 1.56× — the unimproved part dominates.</p>
<p>Moore's law (transistor doubling) historically fed performance; clock scaling ended with the power wall → multicore.</p>
<blockquote>Exam traps: architecture = what, organization = how; address bus n bits ⇒ $2^n$ locations; MAR/MDR roles in fetch; Amdahl's limit 1/(1−f) even as s→∞; Harvard = separate instruction/data memories.</blockquote>`,

"coa-dl": `<h2>Number systems &amp; conversion</h2>
<ul>
<li>Decimal→binary: repeated division by 2 (integer part), repeated multiplication (fraction). $(25)_{10}$: 25/2 = 12 r1, 12/2 = 6 r0, 6/2 = 3 r0, 3/2 = 1 r1, 1/2 = 0 r1 → $(11001)_2$.</li>
<li>Binary ↔ octal: group 3 bits; binary ↔ hex: group 4 bits. $(11011110)_2 = (DE)_{16} = (336)_8$.</li>
<li>BCD encodes each decimal digit in 4 bits (invalid above 1001); Gray code changes one bit between neighbours: binary→Gray: $g_i = b_i &#92;oplus b_{i+1}$.</li>
</ul>
<h3>Signed numbers &amp; two's complement</h3>
<p>Sign-magnitude and one's complement both have two zeros; <b>two's complement</b> (invert + 1) has one zero and range $-2^{n-1}$ to $2^{n-1}-1$ (8-bit: −128 to +127). Subtraction = add the two's complement; discard final carry. <b>Overflow</b> (signed): carry into MSB ≠ carry out of MSB — or: adding same-sign numbers yields the opposite sign. <i>Example:</i> 5 − 7 in 4 bits: 0101 + 1001 = 1110 = −2. ✓</p>

<h2>Boolean algebra</h2>
<table>
<tr><th>Law</th><th>OR form</th><th>AND form</th></tr>
<tr><td>Identity</td><td>A + 0 = A</td><td>A · 1 = A</td></tr>
<tr><td>Null</td><td>A + 1 = 1</td><td>A · 0 = 0</td></tr>
<tr><td>Idempotent</td><td>A + A = A</td><td>A · A = A</td></tr>
<tr><td>Complement</td><td>A + A' = 1</td><td>A · A' = 0</td></tr>
<tr><td>Absorption</td><td>A + AB = A</td><td>A(A + B) = A</td></tr>
<tr><td>De Morgan</td><td>(A+B)' = A'B'</td><td>(AB)' = A' + B'</td></tr>
</table>
<p>Duality: swap + ↔ ·, 0 ↔ 1. <i>Simplify:</i> AB + AB' = A(B + B') = A. Consensus: AB + A'C + BC = AB + A'C.</p>

<h2>Gates &amp; universality</h2>
<p>AND, OR, NOT, NAND, NOR, XOR ($A &#92;oplus B = A'B + AB'$), XNOR. <b>NAND and NOR are universal</b>: NOT(A) = NAND(A, A); AND = NAND + NOT; OR via De Morgan. XOR facts: parity, controlled inverter, A ⊕ A = 0.</p>

<h2>Canonical forms &amp; K-maps</h2>
<p><b>SOP</b> = Σ of minterms; <b>POS</b> = Π of maxterms. A K-map arranges cells in Gray-code order so adjacent cells differ in one variable; group 1s in powers of two (wrapping allowed); each group drops the changing variables. <b>Don't-cares (X)</b> may join groups freely.</p>
<p><i>Worked 4-variable example:</i> F = Σm(0, 2, 5, 7, 8, 10, 13, 15):</p>
<ul>
<li>m5, 7, 13, 15 form a quad → BD.</li>
<li>m0, 2, 8, 10 form a corner quad → B'D'.</li>
</ul>
<p>F = BD + B'D' (= (B ⊕ D)' — an XNOR). Larger functions use Quine-McCluskey tabulation.</p>
<blockquote>Exam traps: 8-bit two's-complement range is −128..+127 (asymmetric); overflow rule (carry-in ≠ carry-out of MSB); NAND/NOR universality constructions; K-map groups must be power-of-two sized and may wrap edges/corners; Gray code single-bit change.</blockquote>`,

"coa-comb": `<h2>Combinational design flow</h2>
<p>Truth table → Boolean expression → simplify (K-map) → gates. Output is a pure function of present inputs — no clock, no memory.</p>

<h2>Adders &amp; subtractors</h2>
<table>
<tr><th>A B Cin</th><th>Sum</th><th>Cout</th></tr>
<tr><td>0 0 0</td><td>0</td><td>0</td></tr>
<tr><td>0 1 0 / 1 0 0</td><td>1</td><td>0</td></tr>
<tr><td>1 1 0</td><td>0</td><td>1</td></tr>
<tr><td>1 1 1</td><td>1</td><td>1</td></tr>
</table>
<ul>
<li><b>Half adder</b>: $S = A &#92;oplus B$, $C = AB$ — no carry-in.</li>
<li><b>Full adder</b>: $S = A &#92;oplus B &#92;oplus C_{in}$, $C_{out} = AB + C_{in}(A &#92;oplus B)$. Built from 2 half adders + OR.</li>
<li><b>Ripple-carry adder</b> — n full adders chained; delay grows O(n) as carries ripple.</li>
<li><b>Carry look-ahead</b> — generate $G_i = A_iB_i$, propagate $P_i = A_i &#92;oplus B_i$; $C_{i+1} = G_i + P_iC_i$ expanded in parallel → O(log n)-ish delay.</li>
<li><b>Adder-subtractor</b> — XOR each B bit with a mode line M and feed M as $C_0$: M = 1 adds the two's complement → subtraction.</li>
<li><b>BCD adder</b> — binary add; if sum &gt; 9 or carry, add 6 (0110) to correct.</li>
</ul>

<h2>MUX, demux, encoder, decoder</h2>
<ul>
<li><b>MUX $2^n$:1</b> — n select lines pick one input: $Y = S'I_0 + SI_1$ (2:1). Build big from small (two 4:1 + one 2:1 = 8:1).</li>
<li><b>Function realisation:</b> any n-variable function fits a $2^{n}$:1 MUX directly (minterms to inputs) or a $2^{n-1}$:1 MUX (one variable + its complement as data) — implement F = Σm(1, 2, 6, 7) on a 4:1 MUX with A, B as selects: inputs become C, C, 0, 1... a standard exam construction.</li>
<li><b>Decoder n:$2^n$</b> — asserts exactly one output = the input minterm; decoder + OR gates implements any function; enables build address decoding.</li>
<li><b>Encoder</b> — reverse; a <b>priority encoder</b> outputs the highest-numbered active input + valid bit.</li>
<li><b>Demux</b> — routes one input to a selected output (a decoder with enable as data).</li>
<li><b>Comparator</b> — 1-bit: equal = XNOR; cascade for n bits (74LS85).</li>
</ul>

<h2>Multipliers &amp; ALU</h2>
<p>Array multiplier: AND gates make partial products, adders sum them ($n^2$ ANDs). An <b>ALU</b> slice combines add/sub/logic ops selected by function-select lines (e.g. 74181).</p>
<p><b>Hazards:</b> unequal path delays can glitch outputs momentarily (static-1 hazard) — fixed by adding the consensus term; matters when outputs feed asynchronous inputs.</p>
<blockquote>Exam traps: full-adder equations; carry look-ahead exists to beat ripple delay; a $2^n$:1 MUX needs n select lines; decoder outputs = minterms; priority encoder vs plain encoder; BCD adder's +6 correction.</blockquote>`,

"coa-seq": `<h2>Latches vs flip-flops</h2>
<p>Sequential output depends on inputs <b>and stored state</b>. A <b>latch</b> is level-sensitive (transparent while enabled); a <b>flip-flop</b> samples only on a clock <b>edge</b> — the building block of synchronous design. Edge triggering is built from master-slave latch pairs.</p>
<h3>The four flip-flops</h3>
<table>
<tr><th>FF</th><th>Characteristic equation</th><th>Notes</th></tr>
<tr><td>SR</td><td>$Q^+ = S + R'Q$</td><td>S=R=1 invalid</td></tr>
<tr><td>D</td><td>$Q^+ = D$</td><td>data/delay — registers</td></tr>
<tr><td>JK</td><td>$Q^+ = JQ' + K'Q$</td><td>J=K=1 → toggle</td></tr>
<tr><td>T</td><td>$Q^+ = T &#92;oplus Q$</td><td>T=1 toggles — counters</td></tr>
</table>
<p><b>Excitation tables</b> (design direction: given Q→Q⁺, what inputs?) — e.g. JK: 0→0 needs J=0, K=X; 0→1 J=1, K=X; 1→0 J=X, K=1; 1→1 J=X, K=0. Asynchronous preset/clear override the clock. Timing: setup time (D stable before edge), hold time (after edge); violations cause metastability. <b>Race-around</b> in level-triggered JK when J=K=1 — cured by master-slave/edge triggering.</p>

<h2>Registers</h2>
<p>n D flip-flops sharing a clock = an n-bit register. <b>Shift registers</b> by I/O style: SISO, SIPO (serial receive), PISO (serial transmit), PIPO; <b>universal</b> (74194) does all + bidirectional. Applications: serial↔parallel conversion, delay lines, <b>ring counter</b> (circulating 1 — n states from n FFs) and <b>Johnson counter</b> (inverted feedback — 2n states).</p>

<h2>Counters</h2>
<ul>
<li><b>Asynchronous (ripple)</b> — each FF clocks the next; simple but delays accumulate and outputs glitch. Mod-N from n FFs ($2^n &#92;ge N$) by NAND-decoding state N to clear — e.g. decade counter resets at 1010.</li>
<li><b>Synchronous</b> — common clock; logic computes each FF's inputs → fast, glitch-free.</li>
</ul>
<h3>Worked design — synchronous mod-8 up counter (T flip-flops)</h3>
<p>State table 000→001→…→111→000. Toggle pattern: $T_0 = 1$; $T_1 = Q_0$; $T_2 = Q_1Q_0$ — each bit toggles when all lower bits are 1. (For arbitrary sequences: state table → excitation table → K-maps per input → circuit.)</p>

<h2>Finite-state machines</h2>
<p><b>Moore</b> — output is a function of state only (stable, one cycle delayed). <b>Mealy</b> — output depends on state + input (reacts faster, may need fewer states). Design: state diagram → state table → state assignment → excitation maps → logic. Sequence detectors (e.g. detect 1011) are the canonical exam problem; this machinery is the hardware face of the finite automata in Theory of Computation.</p>
<blockquote>Exam traps: characteristic vs excitation tables (analysis vs design); JK toggle at J=K=1; n flip-flops give mod-$2^n$ max (ripple) — mod-10 needs decode-and-clear; ring n states vs Johnson 2n; Mealy outputs can glitch with inputs, Moore can't.</blockquote>`,

"coa-mp": `<h2>8085 — the reference microprocessor</h2>
<p>8-bit data bus, <b>16-bit address bus → 64 KB</b>; +5 V, ~3 MHz. The low address byte is <b>multiplexed</b> with data on AD0-AD7 — demultiplexed by latching with the <b>ALE</b> signal.</p>
<ul>
<li><b>Registers</b>: accumulator A (all ALU results), flags, B-C, D-E, H-L (pairable for 16-bit addresses; <b>M</b> = memory at HL), 16-bit SP and PC.</li>
<li><b>Flags</b> (PSW): S sign, Z zero, AC auxiliary carry (BCD), P parity, CY carry.</li>
<li>Control signals: RD', WR', IO/M' (memory vs I/O cycle), ALE, READY (slow-memory wait states), HOLD/HLDA (DMA).</li>
</ul>

<h2>Instruction set by group</h2>
<table>
<tr><th>Group</th><th>Examples</th></tr>
<tr><td>Data transfer</td><td>MOV r1,r2 · MVI r,data · LDA/STA addr · LXI rp,16-bit · LDAX/STAX · XCHG</td></tr>
<tr><td>Arithmetic</td><td>ADD r · ADI data · SUB r · INR/DCR r · INX/DCX rp · DAA (BCD adjust)</td></tr>
<tr><td>Logical</td><td>ANA, ORA, XRA r · CMP r (compare via subtract, sets flags) · RLC/RRC/RAL/RAR · CMA</td></tr>
<tr><td>Branch</td><td>JMP · conditional JZ/JNZ/JC/JNC · CALL/RET (+conditional) · PCHL · RST n</td></tr>
<tr><td>Stack / machine</td><td>PUSH/POP rp · IN/OUT port · EI/DI · NOP · HLT</td></tr>
</table>
<p>Instructions are 1-3 bytes. <b>Addressing modes</b>: immediate (MVI A, 32H), register (MOV A, B), direct (LDA 2050H), register indirect (MOV A, M), implied (CMA).</p>

<h2>Timing</h2>
<p>Instruction cycle = machine cycles (opcode fetch, memory read/write, I/O) = <b>T-states</b> (clock periods). Opcode fetch takes 4 T; e.g. MOV A, B = 4 T; MVI A, d = 7 T; LDA addr = 13 T. Delay loops are timed by summing T-states × clock period — a standard numerical.</p>

<h2>Worked programs</h2>
<pre><code>; 8-bit addition with carry flag captured in B
LDA 2050H      ; first number
MOV B, A
LDA 2051H
ADD B          ; A = A + B, CY set on overflow
STA 2052H
HLT

; loop: add ten numbers stored from 2100H
LXI H, 2100H   ; pointer
MVI C, 0AH     ; count = 10
XRA A          ; clear A and CY
L1: ADD M
    INX H
    DCR C      ; DCR sets Z (not CY)
    JNZ L1
STA 2200H
HLT</code></pre>
<p>The <b>stack</b> grows downward from SP; PUSH stores a register pair, CALL pushes the return address, RET pops it — nesting and interrupts both live on the stack.</p>
<blockquote>Exam traps: 16-bit address ⇒ 64 KB; ALE demultiplexes AD0-AD7; DCR affects Z but not CY; CMP subtracts without storing (flags only); A is implicit in arithmetic; T-state counting questions; M means memory pointed to by HL.</blockquote>`,

"coa-mpsys": `<h2>Building a system around the CPU</h2>
<p>CPU + ROM (boot code) + RAM + I/O ports + decoding logic on a shared bus. The CPU distinguishes cycles with IO/M', RD', WR'.</p>

<h2>Address decoding — worked example</h2>
<p>Map a 4 KB ROM at 0000H and 4 KB RAM at 2000H on a 16-bit bus. 4 KB needs 12 address lines (A0-A11); the top four (A12-A15) drive the decoder:</p>
<ul>
<li>ROM select: A15 A14 A13 A12 = 0000 → range 0000H-0FFFH.</li>
<li>RAM select: 0010 → 2000H-2FFFH. A 74LS138 3:8 decoder generates eight such 4 KB chip-selects cleanly.</li>
</ul>
<p><b>Full decoding</b> uses every address line → unique ranges. <b>Partial decoding</b> ignores some lines → cheaper but creates <i>fold-back</i> (mirror) images of the device at multiple addresses. Question pattern: "what range does this chip occupy / how many address lines does a 8 KB chip need (13)?"</p>

<h2>Memory technologies</h2>
<table>
<tr><th>Type</th><th>Property</th></tr>
<tr><td>SRAM</td><td>flip-flop cell, fast, no refresh, expensive → caches</td></tr>
<tr><td>DRAM</td><td>capacitor cell, dense, needs refresh → main memory</td></tr>
<tr><td>ROM/PROM/EPROM/EEPROM/Flash</td><td>non-volatile spectrum → firmware, storage</td></tr>
</table>

<h2>I/O interfacing</h2>
<table>
<tr><th>Memory-mapped I/O</th><th>I/O-mapped (isolated)</th></tr>
<tr><td>devices share the memory space</td><td>separate 256-port I/O space</td></tr>
<tr><td>any memory instruction works</td><td>only IN/OUT</td></tr>
<tr><td>eats memory addresses; 16-bit decode</td><td>8-bit decode; IO/M' = 1 cycles</td></tr>
</table>
<p>Support chips: <b>8255 PPI</b> — three 8-bit ports (A, B, C) configured by a control word; Mode 0 simple I/O, Mode 1 strobed (handshake), Mode 2 bidirectional, plus BSR bit-set/reset on port C. Also 8253/54 timer, 8251 USART (serial).</p>

<h2>Data-transfer techniques</h2>
<ul>
<li><b>Programmed I/O (polling)</b> — CPU loops on a status flag: simple, wastes CPU.</li>
<li><b>Interrupt-driven</b> — device requests service when ready (next topic).</li>
<li><b>DMA</b> — the 8257/8237 controller takes the bus (HOLD → HLDA handshake) and moves blocks memory↔device directly. Modes: <b>burst</b> (whole block, CPU stalled), <b>cycle stealing</b> (one word per grab), transparent. Best for disk/video-scale transfers; CPU only sets up source, destination, count and handles the completion interrupt.</li>
</ul>
<blockquote>Exam traps: a $2^n$-byte chip needs n address lines (8 KB → 13); partial decoding causes mirrored images; memory-mapped vs isolated trade-offs; 8255 mode meanings; DMA handshake = HOLD/HLDA; cycle stealing vs burst.</blockquote>`,

"coa-int": `<h2>Why interrupts</h2>
<p>Polling burns CPU cycles checking ready bits; an <b>interrupt</b> lets the device interject only when it needs service — the CPU does useful work meanwhile. Interrupts also implement OS preemption (timer) and system calls (software interrupts).</p>

<h2>Classification</h2>
<ul>
<li><b>Hardware</b> (external pin) vs <b>software</b> (instruction: RST n, INT) vs <b>exceptions/traps</b> (divide-by-zero, page fault).</li>
<li><b>Maskable</b> — can be disabled (DI/EI, interrupt-enable flags) vs <b>non-maskable</b> — always taken (power failure class).</li>
<li><b>Vectored</b> — fixed service address vs <b>non-vectored</b> — device supplies the address/instruction.</li>
</ul>
<h3>8085 interrupt pins (priority high → low)</h3>
<table>
<tr><th>Pin</th><th>Type</th><th>Vector</th><th>Trigger</th></tr>
<tr><td>TRAP</td><td>non-maskable, vectored</td><td>0024H</td><td>edge + level</td></tr>
<tr><td>RST 7.5</td><td>maskable, vectored</td><td>003CH</td><td>edge (latched)</td></tr>
<tr><td>RST 6.5</td><td>maskable, vectored</td><td>0034H</td><td>level</td></tr>
<tr><td>RST 5.5</td><td>maskable, vectored</td><td>002CH</td><td>level</td></tr>
<tr><td>INTR</td><td>maskable, non-vectored</td><td>device supplies RST n</td><td>level</td></tr>
</table>
<p>Vector arithmetic: RST n jumps to n × 8 (RST 7.5 → 7.5 × 8 = 60 = 003CH). SIM/RIM instructions set/read the RST masks.</p>

<h2>Interrupt processing sequence</h2>
<ol>
<li>Device asserts the request; CPU finishes the <i>current instruction</i>.</li>
<li>CPU acknowledges (INTA'), disables further interrupts.</li>
<li><b>Context save</b> — return address (PC) pushed on the stack (ISR also pushes any registers it uses).</li>
<li>Vector → ISR executes; EI re-enables if nesting is wanted.</li>
<li>Restore registers, <b>RET</b> pops PC → interrupted program resumes unaware.</li>
</ol>
<p><b>Latency</b> = longest instruction + save overhead; matters in real-time systems.</p>

<h2>Multiple devices</h2>
<ul>
<li><b>Polled identification</b> — one line, ISR queries devices: slow, flexible priority.</li>
<li><b>Daisy chain</b> — acknowledge propagates through devices; electrically nearest wins — hardware priority.</li>
<li><b>Priority interrupt controller</b> — the 8259 PIC handles 8 (cascadable to 64) lines, resolves priority, supplies vectors.</li>
</ul>
<blockquote>Exam traps: TRAP = non-maskable, highest, vector 0024H; RST n vector = 8n; INTR is the only non-vectored 8085 interrupt; interrupts are checked at instruction <i>boundaries</i>; SIM/RIM for masks; daisy-chain priority = electrical position.</blockquote>`,

"coa-cpu": `<h2>Instruction set design</h2>
<p>An instruction = opcode + operands. By operand count (evaluate X = (A+B)×(C+D)):</p>
<table>
<tr><th>Format</th><th>Style</th><th>Example</th></tr>
<tr><td>3-address</td><td>R3 ← R1 op R2</td><td>ADD R1, A, B · ADD R2, C, D · MUL X, R1, R2</td></tr>
<tr><td>2-address</td><td>R1 ← R1 op R2</td><td>MOV R1,A · ADD R1,B · …</td></tr>
<tr><td>1-address</td><td>accumulator implicit</td><td>LOAD A · ADD B · STORE T …</td></tr>
<tr><td>0-address</td><td>stack machine</td><td>PUSH A · PUSH B · ADD · …</td></tr>
</table>
<h3>Addressing modes</h3>
<p>Immediate (operand in instruction), register, direct/absolute, register indirect, <b>indexed</b> (base + index — arrays), <b>base/displacement</b>, <b>relative</b> (PC + offset — position-independent branches), auto-increment/decrement (stack/loop idioms), implied. Effective-address computation questions are routine.</p>

<h2>RISC vs CISC</h2>
<table>
<tr><th>RISC (ARM, MIPS, RISC-V)</th><th>CISC (x86)</th></tr>
<tr><td>few, simple, fixed-length instructions</td><td>many, complex, variable-length</td></tr>
<tr><td><b>load/store</b>: only LD/ST touch memory</td><td>memory operands in ALU ops</td></tr>
<tr><td>large register file; compiler does the work</td><td>fewer registers; microcode does the work</td></tr>
<tr><td>hardwired control, 1 instruction/cycle goal, pipeline-friendly</td><td>microprogrammed control, denser code</td></tr>
</table>

<h2>Control unit</h2>
<ul>
<li><b>Hardwired</b> — combinational logic + sequencer generates control signals: fastest, hard to change → RISC.</li>
<li><b>Microprogrammed</b> — each machine instruction runs a sequence of <b>microinstructions</b> from control memory; horizontal (wide, one bit per signal, parallel) vs vertical (encoded, compact, slower). Easy to extend/fix → CISC.</li>
</ul>

<h2>Pipelining</h2>
<p>Classic 5 stages: <b>IF → ID → EX → MEM → WB</b>. k instructions on an n-stage pipeline: $T = (n + k - 1) &#92;times t_{stage}$; speedup → n as k grows.</p>
<p><i>Worked example:</i> 100 instructions, 5 stages, 2 ns/stage: pipelined = (5+99)×2 = 208 ns vs non-pipelined 100×10 = 1000 ns → speedup 4.8 (→5 asymptotically).</p>
<h3>Hazards</h3>
<ul>
<li><b>Structural</b> — two stages want one resource (single memory port) → stall or duplicate hardware (split I/D caches).</li>
<li><b>Data</b> — RAW dependence (ADD R1,… ; SUB …,R1): fixed by <b>forwarding/bypassing</b>, else bubble; load-use needs one stall even with forwarding. (WAR/WAW appear with out-of-order execution.)</li>
<li><b>Control</b> — branch outcome unknown: flush penalty; mitigated by <b>branch prediction</b>, delayed branch slots, early branch resolution.</li>
</ul>
<p>Beyond: superscalar (multiple issue), out-of-order execution, register renaming — same hazards, industrial-strength fixes.</p>
<blockquote>Exam traps: count instructions for each address format; relative addressing = PC + offset; load/store discipline defines RISC; pipeline time formula (n + k − 1); forwarding fixes most RAW but not load-use; horizontal vs vertical microcode trade-off.</blockquote>`,

"coa-mem": `<h2>Computer arithmetic</h2>
<ul>
<li><b>Multiplication</b> — shift-and-add; <b>Booth's algorithm</b> recodes runs of 1s (examines bit pairs $Q_0Q_{-1}$: 10 → subtract M, 01 → add M, else shift) — handles signed numbers and skips through runs. n-bit Booth: n add/sub-and-shift cycles.</li>
<li><b>Division</b> — restoring (subtract, restore if negative) vs non-restoring.</li>
<li><b>IEEE 754 floating point</b>: value $= (-1)^s &#92;times 1.f &#92;times 2^{e - bias}$.
<table>
<tr><th></th><th>Sign</th><th>Exponent</th><th>Fraction</th><th>Bias</th></tr>
<tr><td>Single (32-bit)</td><td>1</td><td>8</td><td>23</td><td>127</td></tr>
<tr><td>Double (64-bit)</td><td>1</td><td>11</td><td>52</td><td>1023</td></tr>
</table>
<i>Encode −6.25:</i> 6.25 = 110.01₂ = 1.1001 × 2²; s = 1, e = 2+127 = 129 = 10000001, f = 1001000… → 1 10000001 10010000000000000000000. Specials: e all-0 = denormal/zero, e all-1 = ∞/NaN.</li>
</ul>

<h2>Memory hierarchy</h2>
<p>Registers → L1/L2/L3 cache (SRAM) → main memory (DRAM) → SSD/disk → tape. Works because of <b>locality</b>: temporal (recently used → soon reused) and spatial (neighbours next). Design goal: speed of the top, capacity/cost of the bottom.</p>

<h2>Cache organisation</h2>
<p>Memory moves in <b>blocks/lines</b> (e.g. 64 B). Address splits into <b>tag | index | offset</b>.</p>
<table>
<tr><th>Mapping</th><th>Block goes to</th><th>Trade-off</th></tr>
<tr><td>Direct</td><td>exactly one line (index = block mod lines)</td><td>simple; conflict misses</td></tr>
<tr><td>Fully associative</td><td>any line</td><td>no conflicts; costly tag search</td></tr>
<tr><td>k-way set associative</td><td>any of k lines in one set</td><td>the practical middle</td></tr>
</table>
<p><i>Worked example:</i> 64 KB direct-mapped cache, 16 B blocks, 32-bit addresses → 4096 lines: offset = 4 bits, index = 12 bits, tag = 16 bits. For 4-way set-associative: 1024 sets → index 10 bits, tag 18.</p>
<ul>
<li><b>Miss types</b> — compulsory (first touch), capacity, conflict.</li>
<li><b>Replacement</b> — LRU, FIFO, random (within a set).</li>
<li><b>Writes</b> — write-through (+ write buffer) keeps memory current; <b>write-back</b> (dirty bit) writes on eviction — less traffic.</li>
</ul>
<h3>Average memory access time</h3>
$$AMAT = t_{hit} + miss&#92;,rate &#92;times miss&#92;,penalty$$
<p>E.g. hit 1 ns, miss rate 5%, penalty 100 ns → AMAT = 1 + 0.05×100 = <b>6 ns</b>. Two-level: AMAT = t1 + m1(t2 + m2 × penalty). Interleaved memory banks overlap accesses; DRAM refresh and virtual-memory interaction (TLB) round out the picture.</p>
<blockquote>Exam traps: bias 127/1023; tag-index-offset bit splitting; write-back needs a dirty bit; AMAT formula numericals; associativity reduces conflict (not compulsory) misses; Booth handles signed multiplication and skips 1-runs.</blockquote>`,

"coa-io": `<h2>I/O modules</h2>
<p>Peripherals differ wildly in speed/format, so an <b>I/O module</b> sits between: device control + status registers, data buffering, error detection, address recognition. CPU-visible techniques (recap): programmed I/O, interrupt-driven, DMA — know when each wins (rare slow transfers → polling acceptable; sporadic events → interrupts; bulk → DMA).</p>

<h2>Buses &amp; arbitration</h2>
<ul>
<li>Bus = data + address + control lines; <b>synchronous</b> (clocked, fast, short) vs <b>asynchronous</b> (handshake REQ/ACK, length-tolerant).</li>
<li>Multiple masters need <b>arbitration</b>: <b>daisy chain</b> (grant ripples through — simple, fixed priority, fairness problem), <b>polling</b> (controller asks in turn), <b>independent request</b> (per-master request/grant — fast, costly). Distributed arbitration puts the logic in the devices.</li>
<li>Hierarchies (system bus / PCIe point-to-point links) isolate fast and slow traffic.</li>
</ul>

<h2>Parallelism — Flynn's taxonomy</h2>
<table>
<tr><th>Class</th><th>Streams</th><th>Example</th></tr>
<tr><td>SISD</td><td>1 instruction, 1 data</td><td>classic uniprocessor</td></tr>
<tr><td>SIMD</td><td>1 instruction, many data</td><td>vector units, GPUs</td></tr>
<tr><td>MISD</td><td>many instructions, 1 data</td><td>rare (fault-tolerant pipelines)</td></tr>
<tr><td>MIMD</td><td>many, many</td><td>multicore, clusters</td></tr>
</table>

<h2>Multiprocessors</h2>
<ul>
<li><b>Shared memory (tightly coupled)</b> — UMA/SMP: equal access; NUMA: local faster than remote. Programmed with threads/locks.</li>
<li><b>Distributed memory (loosely coupled)</b> — clusters communicating by messages (MPI); scales further.</li>
<li><b>Cache coherence</b> — copies of one block in several caches must agree. <b>Snooping</b> protocols broadcast on a shared bus; <b>MESI</b> states (Modified, Exclusive, Shared, Invalid) track ownership; write-invalidate vs write-update. Directory protocols scale beyond a bus.</li>
<li>Interconnects: shared bus, crossbar, multistage networks, mesh/hypercube.</li>
</ul>
<p>Performance ceiling: Amdahl again — the serial fraction caps multiprocessor speedup.</p>
<blockquote>Exam traps: Flynn classes with examples (GPU = SIMD); UMA vs NUMA; coherence ≠ consistency (coherence is per-location agreement); daisy-chain priority/fairness weakness; synchronous vs asynchronous bus trade-off.</blockquote>`,

"coa-emb": `<h2>Embedded systems</h2>
<p>A computer <b>dedicated</b> to one function inside a larger product — firmware-driven, resource-constrained, often real-time, designed for cost/power, not user-programmable. Examples: engine ECU, pacemaker, router, washing machine, drone flight controller.</p>
<h3>Characteristics &amp; design metrics</h3>
<ul>
<li>Single-function, tight constraints, reactive/real-time behaviour.</li>
<li>Metrics traded against each other: unit cost, NRE (one-time engineering) cost, size, <b>power</b> (battery life, heat), performance, flexibility, time-to-market, safety/reliability.</li>
</ul>

<h2>Microcontroller vs microprocessor</h2>
<table>
<tr><th>Microcontroller (MCU)</th><th>Microprocessor (MPU)</th></tr>
<tr><td>CPU + flash + SRAM + peripherals on chip</td><td>CPU only; external memory/peripherals</td></tr>
<tr><td>GPIO, timers, ADC, UART/SPI/I2C built in</td><td>rich OS, MMU, high clock</td></tr>
<tr><td>mW power, $1-class cost</td><td>W-class power, general purpose</td></tr>
<tr><td>8051, AVR, PIC, ARM Cortex-M</td><td>Cortex-A, x86</td></tr>
</table>
<p>On-chip peripherals worth knowing: timers/PWM (motor control), watchdog (auto-reset on hang), ADC/DAC (analog world), serial buses UART, SPI, I2C, CAN (automotive).</p>

<h2>HW/SW co-design</h2>
<p>Partition the function: hardware (ASIC/FPGA logic) is fast and power-efficient but fixed and high-NRE; software on a processor is flexible and cheap to change but slower. Co-design explores this split early, co-simulating both. Implementation spectrum:</p>
<table>
<tr><th>Option</th><th>Flexibility</th><th>Efficiency</th></tr>
<tr><td>General-purpose processor</td><td>highest</td><td>lowest</td></tr>
<tr><td><b>ASIP</b> (application-specific instruction-set processor — e.g. DSP)</td><td>programmable within a domain</td><td>middle — custom instructions for the domain's hot loops</td></tr>
<tr><td>ASIC / single-purpose hardware</td><td>none</td><td>highest</td></tr>
</table>
<p>FPGAs offer hardware-level performance with reprogrammability — popular for prototyping and mid-volume products.</p>
<blockquote>Exam traps: define an embedded system by <i>dedicated function</i>; MCU integrates memory + peripherals; NRE vs unit cost trade-off; ASIP sits between GPP and ASIC; watchdog timer purpose.</blockquote>`,

"coa-rtos": `<h2>Real-time = bounded response</h2>
<p>A real-time system's correctness includes <b>timeliness</b>: each task must meet its deadline. <b>Hard</b> RT — a miss is a system failure (airbag, flight control, pacemaker); <b>soft</b> RT — misses degrade quality (video, VoIP); firm RT — late results are useless but not catastrophic.</p>
<p>Task model: period T, worst-case computation C, deadline D (often = T); <b>CPU utilisation</b> $U = &#92;sum C_i / T_i$.</p>

<h2>Real-time scheduling</h2>
<ul>
<li><b>Rate-Monotonic (RMS)</b> — static priorities: shorter period = higher priority. Sufficient schedulability bound for n tasks: $U &#92;le n(2^{1/n} - 1)$ → 0.828 for n=2, →ln 2 ≈ 0.693 as n→∞.</li>
<li><b>Earliest-Deadline-First (EDF)</b> — dynamic: nearest absolute deadline runs. Optimal on one CPU: schedulable iff U ≤ 1.</li>
</ul>
<p><i>Worked example:</i> T1(C=1, T=4), T2(C=2, T=6), T3(C=1, T=8): U = 0.25 + 0.333 + 0.125 = 0.708. RMS bound for n=3 is 3(2^{1/3}−1) ≈ 0.780 → 0.708 ≤ 0.780, schedulable under RMS (and trivially under EDF).</p>

<h2>What makes an OS "real-time"</h2>
<ul>
<li><b>Determinism</b> — bounded, predictable worst-case latencies (interrupt latency, dispatch latency), preemptive priority scheduling, fast context switch.</li>
<li>Priority levels, periodic task support, high-resolution timers, small footprint. Examples: FreeRTOS, VxWorks, QNX, Zephyr.</li>
<li><b>Priority inversion</b> — low-priority task holds a lock a high-priority task needs while medium tasks run (the Mars Pathfinder incident). Fixes: <b>priority inheritance</b> (holder temporarily inherits the waiter's priority) or priority ceiling.</li>
</ul>

<h2>Embedded control systems</h2>
<p>Closed loop: sample sensor → compute control law → drive actuator, at a fixed period (jitter degrades control). The classic law is <b>PID</b>: output $= K_p e + K_i &#92;int e&#92;,dt + K_d &#92;,de/dt$ — proportional (present error), integral (accumulated error, kills offset), derivative (trend, damps overshoot). The RTOS guarantees the loop's period; this is where computer engineering meets control theory.</p>
<blockquote>Exam traps: RMS = static/period-based, EDF = dynamic/deadline-based and optimal to U = 1; the n(2^{1/n}−1) bound is <i>sufficient</i>, not necessary; priority inheritance solves inversion; hard vs soft examples; RTOS is about <i>bounded worst case</i>, not raw speed.</blockquote>`,

"coa-vhdl": `<h2>Describing hardware in text</h2>
<p>An <b>HDL</b> (VHDL, Verilog) describes concurrent hardware. Two uses: <b>simulation</b> (verify behaviour against a testbench) and <b>synthesis</b> (compile to gates/LUTs). Statements outside processes execute <i>concurrently</i> — order doesn't matter, unlike software.</p>

<h2>VHDL anatomy</h2>
<pre><code>library IEEE;  use IEEE.std_logic_1164.all;

entity FULL_ADDER is
  port( a, b, cin : in  std_logic;
        s, cout   : out std_logic );
end FULL_ADDER;

-- dataflow style
architecture DF of FULL_ADDER is
begin
  s    &lt;= a xor b xor cin;
  cout &lt;= (a and b) or (cin and (a xor b));
end DF;

-- behavioural style: a clocked process (D flip-flop)
process(clk)
begin
  if rising_edge(clk) then
    if rst = '1' then q &lt;= '0';
    else              q &lt;= d;
    end if;
  end if;
end process;</code></pre>
<ul>
<li><b>Entity</b> = interface (ports: in, out, inout); <b>architecture</b> = implementation; multiple architectures per entity allowed.</li>
<li><b>Styles</b>: dataflow (concurrent assignments), behavioural (processes, if/case), structural (instantiate and wire components — a netlist). Real designs mix all three.</li>
<li>Signals (&lt;=, scheduled) vs variables (:=, immediate, inside processes); std_logic's 9 values include 'Z' (tri-state) and 'X' (unknown).</li>
<li>A clocked process with rising_edge() infers flip-flops; an incomplete combinational if infers an unintended <b>latch</b> — the classic beginner bug.</li>
</ul>

<h2>Implementation technologies</h2>
<table>
<tr><th>Target</th><th>Nature</th><th>Use</th></tr>
<tr><td>PLA / PAL / GAL</td><td>programmable AND-OR planes</td><td>small glue logic</td></tr>
<tr><td>CPLD</td><td>several PAL-like blocks + interconnect</td><td>medium, instant-on</td></tr>
<tr><td><b>FPGA</b></td><td>sea of LUTs + flip-flops + block RAM + DSP slices, SRAM-configured</td><td>prototyping to production</td></tr>
<tr><td>ASIC</td><td>full-custom silicon</td><td>volume; lowest power/cost per unit, huge NRE</td></tr>
</table>
<p>Integration scale: SSI → MSI → LSI → VLSI. <b>Design flow</b>: HDL → testbench simulation → synthesis → place &amp; route → timing analysis (static timing closure) → bitstream (FPGA) or tape-out (ASIC).</p>
<blockquote>Exam traps: entity vs architecture roles; concurrent vs sequential (process) regions; signal vs variable assignment; incomplete if → inferred latch; FPGA = reprogrammable LUTs, ASIC = fixed; know the design-flow order.</blockquote>`,

"toc-fa": `<h2>Languages &amp; the Chomsky hierarchy</h2>
<p>An <b>alphabet</b> Σ is a finite symbol set; a <b>string</b> a finite sequence; a <b>language</b> a set of strings. Machines are language recognisers of increasing power:</p>
<table>
<tr><th>Type</th><th>Grammar rules</th><th>Language class</th><th>Machine</th></tr>
<tr><td>3</td><td>A → aB | a (right-linear)</td><td>Regular</td><td>Finite automaton</td></tr>
<tr><td>2</td><td>A → α</td><td>Context-free</td><td>Pushdown automaton</td></tr>
<tr><td>1</td><td>αAβ → αγβ (non-contracting)</td><td>Context-sensitive</td><td>Linear-bounded automaton</td></tr>
<tr><td>0</td><td>unrestricted</td><td>Recursively enumerable</td><td>Turing machine</td></tr>
</table>

<h2>Deterministic finite automata</h2>
<p>DFA $M = (Q, &#92;Sigma, &#92;delta, q_0, F)$ with $&#92;delta : Q &#92;times &#92;Sigma &#92;to Q$ — exactly one move per (state, symbol). Accept if the run ends in F.</p>
<p><b>Worked design</b> — binary strings with an <i>even number of 0s</i>: states E (even, start, accepting) and O; 0 flips E↔O, 1 self-loops. Transition table:</p>
<table>
<tr><th>state</th><th>0</th><th>1</th></tr>
<tr><td>→ *E</td><td>O</td><td>E</td></tr>
<tr><td>O</td><td>E</td><td>O</td></tr>
</table>
<p>Other staples: strings ending in 01 (3 states); containing substring 101; binary numbers divisible by 3 (states = remainder 0, 1, 2 — on digit b, state r → (2r + b) mod 3).</p>

<h2>NFA &amp; equivalence</h2>
<p>An <b>NFA</b> allows zero/many moves per symbol plus ε-moves; it accepts if <i>some</i> computation path accepts. <b>Subset construction</b>: each DFA state = a set of NFA states (start = ε-closure of $q_0$) — proves NFA ≡ DFA in power, though the DFA may have up to $2^n$ states. Every DFA has a unique <b>minimal</b> form (merge indistinguishable states — Myhill-Nerode).</p>

<h2>Regular expressions</h2>
<p>Built from ∅, ε, symbols with union (+ or |), concatenation, and Kleene star; precedence: star &gt; concat &gt; union. <b>Kleene's theorem</b>: regex ≡ NFA ≡ DFA. Examples over {0,1}: strings ending in 01 → (0+1)*01; even number of 1s → 0*(10*10*)*; no two consecutive 1s → (0 + 10)*(1 + ε).</p>
<p><b>Closure properties</b>: regular languages are closed under union, concatenation, star, complement (swap accept states of a DFA), intersection (product construction), reversal.</p>

<h2>Pumping lemma (for regular languages)</h2>
<p>If L is regular, ∃ pumping length p: every $w &#92;in L$, $|w| &#92;ge p$, splits $w = xyz$ with $|xy| &#92;le p$, $|y| &#92;ge 1$, and $xy^iz &#92;in L$ for all $i &#92;ge 0$.</p>
<p><b>Proof that $L = &#123;a^nb^n&#125;$ is not regular:</b> assume regular with length p; take $w = a^pb^p$. Since $|xy| &#92;le p$, y is all a's, $y = a^k$, k ≥ 1. Pump i = 2: $a^{p+k}b^p &#92;notin L$. Contradiction. ∎ Same technique kills $&#123;ww&#125;$, palindromes, $&#123;a^{n^2}&#125;$. Intuition: finite states cannot count unboundedly.</p>
<blockquote>Exam traps: DFA needs a move for <i>every</i> (state, symbol); NFA→DFA may blow up to $2^n$ states but adds no power; divisibility DFAs use remainder states; pumping lemma proves <i>non</i>-regularity only; complementing an NFA directly is invalid — determinise first.</blockquote>`,

"toc-cfg": `<h2>Context-free grammars</h2>
<p>G = (V, T, P, S); productions A → α with a single variable on the left. L(G) = strings of terminals derivable from S. CFLs power programming-language syntax and parsers.</p>
<p><b>Classic grammars:</b></p>
<pre><code>a^n b^n        : S → aSb | ε
palindromes    : S → aSa | bSb | a | b | ε
balanced ()    : S → (S)S | ε
arithmetic     : E → E + T | T
                 T → T * F | F
                 F → (E) | id</code></pre>
<p>The E/T/F grammar builds in precedence (* binds tighter) and left-associativity — understand <i>why</i> it's stratified.</p>

<h2>Derivations, parse trees, ambiguity</h2>
<p><b>Leftmost</b>/<b>rightmost</b> derivations expand the leftmost/rightmost variable each step; both correspond to the same <b>parse tree</b> (interior nodes = variables, leaves = terminals).</p>
<p>A grammar is <b>ambiguous</b> if some string has two parse trees. <i>Example:</i> E → E + E | E × E | id makes id + id × id ambiguous — (id+id)×id vs id+(id×id); the stratified E/T/F grammar fixes it. The <b>dangling else</b> is the classic real-world case. Some CFLs are <i>inherently ambiguous</i> (no unambiguous grammar exists). Ambiguity of a CFG is undecidable in general.</p>

<h2>Simplification &amp; normal forms</h2>
<p>Clean a grammar by removing <b>ε-productions</b> (A → ε), <b>unit productions</b> (A → B), and <b>useless symbols</b> (non-generating or unreachable) — in that order. Then convert:</p>
<ul>
<li><b>CNF (Chomsky)</b> — only A → BC or A → a. Every CFG (minus ε) converts; basis of the <b>CYK</b> $O(n^3)$ membership algorithm; parse trees become binary. <i>Conversion sketch:</i> replace terminals in long bodies by new variables ($X_a$ → a), then break bodies of length &gt; 2 pairwise.</li>
<li><b>GNF (Greibach)</b> — only A → aα (terminal first): each derivation step consumes one input symbol → direct PDA construction.</li>
<li><b>BNF / EBNF</b> — the engineering notation: &lt;expr&gt; ::= &lt;expr&gt; "+" &lt;term&gt; | &lt;term&gt;.</li>
</ul>

<h2>Pushdown automata</h2>
<p>PDA = NFA + a <b>stack</b>: $(Q, &#92;Sigma, &#92;Gamma, &#92;delta, q_0, Z_0, F)$; moves read input (or ε), pop, and push. Acceptance by final state ≡ by empty stack. <b>NPDA ≡ CFG</b> (they define exactly the CFLs); <i>deterministic</i> PDAs are strictly weaker — DCFLs (what LR parsers handle) exclude e.g. even palindromes.</p>
<p><i>PDA for $a^nb^n$:</i> push A per a; on b's, pop one A per b; accept on $Z_0$ with input exhausted.</p>
<p><b>Closure:</b> CFLs are closed under union, concatenation, star — <b>not</b> under intersection or complement (but CFL ∩ regular is a CFL). A pumping lemma for CFLs (split uvxyz, pump v and y together) shows $&#123;a^nb^nc^n&#125;$ is not context-free.</p>
<blockquote>Exam traps: ambiguity = two parse trees (not two derivations of the same tree); removal order ε → unit → useless; CNF body length ≤ 2; deterministic PDA &lt; NPDA (unlike FA); CFLs not closed under ∩ / complement; $a^nb^nc^n$ needs context-sensitivity.</blockquote>`,

"toc-tm": `<h2>Turing machines</h2>
<p>$TM = (Q, &#92;Sigma, &#92;Gamma, &#92;delta, q_0, B, F)$; an infinite tape, a head that reads/writes and moves L/R: $&#92;delta(q, X) = (p, Y, D)$. Far more powerful than a PDA — the tape is unbounded read-write memory.</p>
<p><i>Example:</i> TM for $&#123;a^nb^nc^n&#125;$ — repeatedly mark one a → X, one b → Y, one c → Z, sweep back; accept when all marked. (Not context-free, fine for a TM.)</p>
<p><b>Variants add no power:</b> multi-tape (quadratic simulation), nondeterministic (exponential simulation), two-way infinite tape, multi-head — all ≡ basic TM. A <b>universal TM</b> simulates any encoded TM on any input — the theoretical seed of the stored-program computer. The <b>Church-Turing thesis</b>: every effective procedure is TM-computable.</p>

<h2>Decidable vs recognisable</h2>
<table>
<tr><th>Class</th><th>Definition</th></tr>
<tr><td>Recursive (decidable)</td><td>some TM halts with accept/reject on <i>every</i> input</td></tr>
<tr><td>Recursively enumerable (recognisable)</td><td>some TM accepts members; may loop on non-members</td></tr>
</table>
<p>Facts: L decidable ⇔ both L and L' are RE; decidable languages are closed under complement, RE languages are not. Decidable examples: $A_{DFA}$ (does a DFA accept w?), emptiness of a DFA/CFG, membership in a CFL (CYK).</p>

<h2>Undecidability</h2>
<p><b>Halting problem</b> $H = &#123;(M, w) : M$ halts on $w&#125;$ is undecidable. <i>Proof sketch (diagonalisation):</i> assume decider H exists; build D(M) = "if H says M halts on ⟨M⟩, loop; else halt". Run D(⟨D⟩): D halts ⇔ D loops — contradiction. ∎</p>
<ul>
<li>Undecidable by <b>reduction</b> from H: $A_{TM}$ (acceptance), emptiness of a TM's language, TM equivalence, CFG ambiguity, Post Correspondence Problem.</li>
<li><b>Rice's theorem</b> — <i>every</i> nontrivial property of the language a TM recognises is undecidable ("does this program ever output 0?" — undecidable).</li>
<li>Reduction direction matters: to prove P undecidable, reduce a known-undecidable problem <i>to</i> P.</li>
</ul>

<h2>Complexity &amp; intractability</h2>
<ul>
<li><b>P</b> — decidable in polynomial time (tractable).</li>
<li><b>NP</b> — verifiable in polynomial time given a certificate (≡ solvable by a poly-time NTM). P ⊆ NP; equality is the open P vs NP question.</li>
<li><b>NP-complete</b> — in NP and every NP problem reduces to it in poly time. <b>Cook-Levin:</b> SAT is NP-complete; by reduction chains so are 3-SAT, CLIQUE, VERTEX-COVER, HAMILTONIAN-CYCLE, TSP (decision), SUBSET-SUM, graph colouring.</li>
<li><b>NP-hard</b> — at least as hard as NP, not necessarily in NP (e.g. optimisation TSP, halting).</li>
<li>One poly-time algorithm for any NP-complete problem ⇒ P = NP. Practical fallback: approximation and heuristics.</li>
</ul>
<blockquote>Exam traps: decidable ⇔ L and L' both RE; halting is undecidable but RE; Rice = nontrivial <i>semantic</i> properties; NP = poly <i>verifiable</i> (not "non-polynomial"); NP-hard ⊉ NP membership; reduce FROM the known-hard problem.</blockquote>`,

"se-proc": `<h2>Software engineering &amp; process</h2>
<p>Engineering discipline applied to software: systematic, measurable, maintainable. Software is intangible, doesn't wear out but <i>deteriorates</i> through change, and is mostly custom-built — hence process matters. Generic activities: <b>specification → development → validation → evolution</b>. Attributes of good software: maintainability, dependability, efficiency, acceptability.</p>

<h2>Process models in depth</h2>
<ul>
<li><b>Waterfall</b> — requirements → design → implementation → testing → maintenance, each phase signed off. Strengths: discipline, documentation; weakness: late feedback, change-hostile. Use when requirements are stable and understood.</li>
<li><b>V-model</b> — waterfall bent into a V: each development phase pairs with a test phase (requirements ↔ acceptance test, design ↔ integration test) — test planning starts early.</li>
<li><b>Incremental</b> — build and deliver in slices; core first. Early value, but architecture can erode.</li>
<li><b>Prototyping</b> — throwaway (explore requirements, then discard) vs evolutionary (grow into the product). Risk: the prototype ships.</li>
<li><b>Spiral (Boehm)</b> — each loop: set objectives → <b>assess risks</b> → develop &amp; validate → plan next loop. Risk-driven; suits large, novel projects.</li>
<li><b>RUP</b> — phases inception, elaboration, construction, transition; use-case-driven, architecture-centric, iterative.</li>
<li><b>Agile</b> — the manifesto values: individuals &amp; interactions, working software, customer collaboration, responding to change. <b>Scrum</b>: product backlog → sprint backlog → 2-4-week sprint → potentially shippable increment; roles product owner / scrum master / team; daily stand-up, sprint review, retrospective. <b>XP</b>: pair programming, TDD, continuous integration, refactoring, small releases.</li>
</ul>
<table>
<tr><th>Situation</th><th>Pick</th></tr>
<tr><td>fixed, well-understood requirements; regulated domain</td><td>waterfall / V</td></tr>
<tr><td>unclear requirements</td><td>prototyping / agile</td></tr>
<tr><td>large, high-risk, novel</td><td>spiral</td></tr>
<tr><td>fast-changing market</td><td>agile / incremental</td></tr>
</table>

<h2>Requirements engineering</h2>
<ol>
<li><b>Elicitation</b> — interviews, questionnaires, observation/ethnography, workshops, document analysis, prototyping. Hard because stakeholders conflict, omit "obvious" knowledge, and change their minds.</li>
<li><b>Analysis &amp; negotiation</b> — resolve conflicts, prioritise (MoSCoW: must/should/could/won't).</li>
<li><b>Specification</b> — the <b>SRS</b>: functional requirements (system behaviours), <b>non-functional</b> (performance, security, usability, reliability — often the architecture drivers), domain constraints. Quality criteria: correct, unambiguous, complete, consistent, verifiable, traceable, modifiable.</li>
<li><b>Validation</b> — reviews, prototyping, test-case generation against requirements.</li>
<li><b>Management</b> — change control and traceability through the project.</li>
</ol>
<p>Requirement statements should be <i>testable</i>: "response within 2 s for 95% of queries", not "fast".</p>
<blockquote>Exam traps: spiral's distinguishing feature is explicit <i>risk analysis</i>; V-model pairs each phase with a test level; functional vs non-functional classification questions; Scrum artefacts/roles/ceremonies; SRS quality adjectives; throwaway vs evolutionary prototypes.</blockquote>`,

"se-design": `<h2>Design process</h2>
<p>Requirements (what) → design (how): architectural design → interface design → component/detailed design → data structure &amp; algorithm design. Good design is correct, understandable, adaptable — measured chiefly by <b>coupling and cohesion</b>.</p>

<h2>Coupling (between modules — minimise)</h2>
<p>From best to worst:</p>
<table>
<tr><th>Level</th><th>Modules share…</th></tr>
<tr><td>Data</td><td>only simple parameters — ideal</td></tr>
<tr><td>Stamp</td><td>whole structures when parts are needed</td></tr>
<tr><td>Control</td><td>flags that direct the other's logic</td></tr>
<tr><td>Common</td><td>global data</td></tr>
<tr><td>Content</td><td>one reaches into the other's internals — worst</td></tr>
</table>

<h2>Cohesion (within a module — maximise)</h2>
<p>From best to worst: <b>functional</b> (one well-defined task) → sequential (output feeds next step) → communicational (same data) → procedural (same control sequence) → temporal (same time, e.g. init()) → logical (same category, switch-dispatched) → <b>coincidental</b> (unrelated grab-bag).</p>
<p>Supporting principles: abstraction, information hiding, modularity, separation of concerns, stepwise refinement, anticipate change. <b>Fan-in</b> high (reuse) good; fan-out very high suggests missing abstraction.</p>

<h2>Architectural styles</h2>
<ul>
<li><b>Layered</b> — each layer serves the one above (OS, network stacks); easy substitution, possible performance cost.</li>
<li><b>Client-server</b> / multi-tier — presentation / logic / data.</li>
<li><b>Pipe-and-filter</b> — transformations chained (compilers, Unix pipes).</li>
<li><b>Repository</b> — shared central data store + independent tools (IDEs).</li>
<li><b>MVC</b> — model (state), view (render), controller (input) — decouples UI from logic.</li>
<li><b>Event-driven, microservices</b> — loosely coupled services, independent deployment.</li>
</ul>

<h2>Notations</h2>
<ul>
<li><b>DFD</b> — processes (circles), data stores, external entities, flows; level 0 = context diagram, then decompose level by level; no control flow in a DFD.</li>
<li><b>Structure chart</b> — module hierarchy with call arrows and data couples.</li>
<li><b>ERD</b> for data; UML for OO (later topics).</li>
</ul>

<h2>Design patterns (Gang of Four)</h2>
<table>
<tr><th>Category</th><th>Patterns</th><th>One-line purpose</th></tr>
<tr><td>Creational</td><td>Singleton · Factory Method · Abstract Factory · Builder · Prototype</td><td>control object creation</td></tr>
<tr><td>Structural</td><td>Adapter · Decorator · Facade · Composite · Proxy · Bridge</td><td>compose classes/objects</td></tr>
<tr><td>Behavioural</td><td>Observer · Strategy · Command · Iterator · State · Template Method</td><td>distribute responsibility</td></tr>
</table>
<p>Know the headline ones: <b>Singleton</b> (one instance, global access), <b>Factory</b> (defer instantiation to subclasses), <b>Adapter</b> (convert an interface), <b>Decorator</b> (add behaviour without subclassing), <b>Observer</b> (publish-subscribe), <b>Strategy</b> (swap algorithms at runtime), <b>Facade</b> (simple front over a subsystem).</p>
<blockquote>Exam traps: order the coupling/cohesion ladders; functional cohesion best, content coupling worst; context diagram = level-0 DFD; DFDs show data flow, not control; classify a named pattern into its GoF category.</blockquote>`,

"se-test": `<h2>Verification vs validation</h2>
<p><b>Verification</b> — building the product right (matches spec): reviews, inspections, walkthroughs (static) + tests. <b>Validation</b> — building the right product (meets user needs). Testing shows the <i>presence</i> of defects, never their absence (Dijkstra). Error → fault (defect in code) → failure (wrong behaviour at runtime).</p>

<h2>Test levels</h2>
<table>
<tr><th>Level</th><th>Tests</th><th>Done by</th></tr>
<tr><td>Unit</td><td>single module (drivers/stubs as scaffolding)</td><td>developer</td></tr>
<tr><td>Integration</td><td>module interactions — big-bang vs incremental: <b>top-down</b> (stubs), <b>bottom-up</b> (drivers), sandwich</td><td>dev/test team</td></tr>
<tr><td>System</td><td>whole system vs requirements: functional + performance, load, stress, security, usability, recovery</td><td>independent testers</td></tr>
<tr><td>Acceptance</td><td>user's environment — <b>alpha</b> (developer site) / <b>beta</b> (user site)</td><td>customer</td></tr>
<tr><td>Regression</td><td>re-run suites after any change</td><td>automated, ideally</td></tr>
</table>

<h2>Test-case design</h2>
<ul>
<li><b>Black-box</b> (specification-based): <b>equivalence partitioning</b> — one case per input class; <b>boundary value analysis</b> — test at, just below, just above each boundary. <i>Worked example:</i> valid input 1-100 → partitions {&lt;1}, {1-100}, {&gt;100}; BVA cases 0, 1, 2, 99, 100, 101. Plus decision tables, state-transition testing.</li>
<li><b>White-box</b> (structure-based): statement coverage ⊂ branch/decision coverage ⊂ path coverage. <b>Cyclomatic complexity</b> $V(G) = E - N + 2$ (or decisions + 1) = number of independent paths = basis-path test count. A function with 3 ifs → V(G) = 4.</li>
</ul>

<h2>Cost estimation</h2>
<ul>
<li><b>LOC-based — COCOMO (basic)</b>: $E = a&#92;,(KLOC)^b$ person-months; $T = c&#92;,E^d$ months.
<table>
<tr><th>Mode</th><th>a</th><th>b</th><th>Project type</th></tr>
<tr><td>Organic</td><td>2.4</td><td>1.05</td><td>small, familiar</td></tr>
<tr><td>Semi-detached</td><td>3.0</td><td>1.12</td><td>medium</td></tr>
<tr><td>Embedded</td><td>3.6</td><td>1.20</td><td>tight constraints</td></tr>
</table>
<i>Worked:</i> 32 KLOC organic → E = 2.4 × 32^1.05 ≈ 91 PM; T = 2.5 × 91^0.38 ≈ 14 months; staff ≈ 91/14 ≈ 7. Intermediate COCOMO multiplies by 15 cost drivers.</li>
<li><b>Function points</b> — count inputs, outputs, inquiries, files, interfaces × weights × complexity adjustment; size before code exists; convertible to LOC per language.</li>
<li>Also: expert judgement, analogy, Delphi (anonymous iterated estimates), Putnam/SLIM.</li>
</ul>

<h2>Quality assurance &amp; configuration management</h2>
<ul>
<li><b>SQA</b> — standards (ISO 9001, ISO/IEC 25010 quality model), audits, metrics, formal technical reviews/inspections (cheapest defect removal).</li>
<li><b>CMM/CMMI levels</b>: 1 Initial (ad hoc) → 2 Repeatable/Managed (project tracking) → 3 Defined (organisation-wide process) → 4 Quantitatively Managed (metrics) → 5 Optimising (continuous improvement).</li>
<li><b>SCM</b> — identify configuration items, version control (branch/merge), change control board, baselines, build &amp; release management, status accounting. Maintenance categories: corrective, adaptive, perfective, preventive — maintenance dominates lifecycle cost.</li>
</ul>
<blockquote>Exam traps: verification vs validation one-liners; top-down needs stubs, bottom-up needs drivers; BVA tests boundaries ±1; V(G) = E − N + 2 numericals; COCOMO modes and exponents; CMM level order; perfective maintenance is the biggest share.</blockquote>`,

"se-ooa": `<h2>OO analysis</h2>
<p>Model the problem domain as objects before deciding implementation. Pipeline: requirements → <b>use-case model</b> → <b>domain (conceptual) model</b> → behaviour models. OO basics in play: class/object, attribute, operation, association, <b>aggregation</b> (has-a, hollow diamond, parts survive) vs <b>composition</b> (owns-a, filled diamond, parts die with the whole), generalisation (is-a), dependency.</p>

<h2>UML — the diagram toolbox</h2>
<table>
<tr><th>Structural</th><th>Behavioural</th></tr>
<tr><td>Class · Object · Component · Deployment · Package · Composite structure</td><td>Use case · Sequence · Communication · Activity · State machine · Timing · Interaction overview</td></tr>
</table>

<h2>Use-case modelling</h2>
<ul>
<li><b>Actor</b> — a role outside the system (user, external system, time). <b>Use case</b> — a goal-delivering interaction, named verb-noun ("Withdraw Cash").</li>
<li><b>&lt;&lt;include&gt;&gt;</b> — mandatory shared sub-behaviour (Withdraw Cash includes Authenticate). <b>&lt;&lt;extend&gt;&gt;</b> — optional/conditional addition (Print Receipt extends Withdraw). Actor and use-case generalisation also allowed.</li>
<li>A use-case <b>description</b>: preconditions, main success scenario (numbered steps), alternative/exception flows, postconditions — exam favourite to write for an ATM or library system.</li>
</ul>

<h2>Domain / conceptual model</h2>
<p>A class diagram of real-world concepts — <i>no</i> software classes yet.</p>
<ol>
<li>Find candidate classes: <b>noun analysis</b> of requirements (filter out attributes and synonyms).</li>
<li>Add attributes (data the concept owns) — not IDs invented for the database.</li>
<li>Draw associations with <b>multiplicities</b>: 1, 0..1, *, 1..* (a Library Member borrows 0..* Books; a Loan links exactly 1 Member and 1 Book).</li>
<li>Add aggregation/composition and generalisation where the domain has them.</li>
</ol>
<p>Class box notation: name / attributes / operations; visibility marks + public, − private, # protected, ~ package; underline = static; italics = abstract.</p>

<h2>Behavioural views at analysis level</h2>
<ul>
<li><b>Activity diagram</b> — workflow with decisions, forks/joins, swimlanes per responsible party.</li>
<li><b>State machine</b> — lifecycle of one object: states, events [guards] / actions (an Order: Created → Paid → Shipped → Delivered).</li>
<li><b>System sequence diagram</b> — actor ↔ system events for one use-case scenario.</li>
</ul>
<blockquote>Exam traps: include = always, extend = sometimes (arrow points <i>at</i> the base for extend, <i>from</i> the base for include); aggregation vs composition lifetimes; multiplicity reading direction; noun-analysis technique; state diagrams model <i>one object's</i> lifecycle.</blockquote>`,

"se-ood": `<h2>Analysis → design</h2>
<p>Design assigns <b>responsibilities</b> to classes and chooses collaborations. Inputs: domain model, use cases; outputs: interaction diagrams + design class diagram. Two principle families guide it:</p>
<h3>GRASP (responsibility assignment)</h3>
<ul>
<li><b>Information Expert</b> — give the job to the class that has the data.</li>
<li><b>Creator</b> — A creates B if A contains/aggregates/records B.</li>
<li><b>Controller</b> — a use-case or facade object receives system events (not the UI).</li>
<li><b>Low Coupling / High Cohesion</b> — the constant evaluation criteria.</li>
<li><b>Polymorphism</b> — vary behaviour by type, not if/else chains; <b>Indirection</b>, <b>Pure Fabrication</b> (invent a helper class, e.g. a Persistence service), <b>Protected Variations</b> (stable interfaces around change points).</li>
</ul>
<h3>SOLID</h3>
<ul>
<li><b>S</b>ingle responsibility — one reason to change.</li>
<li><b>O</b>pen-closed — open to extension, closed to modification.</li>
<li><b>L</b>iskov substitution — subtypes must be usable wherever the base is.</li>
<li><b>I</b>nterface segregation — many small interfaces beat one fat one.</li>
<li><b>D</b>ependency inversion — depend on abstractions, not concretions.</li>
</ul>

<h2>Interaction diagrams</h2>
<ul>
<li><b>Sequence diagram</b> — lifelines, activation bars, messages in time order; synchronous (filled arrow) vs asynchronous (open); return dashed; create/destroy; combined fragments alt / opt / loop. Best for reading message <i>order</i>.</li>
<li><b>Communication diagram</b> — objects + links with numbered messages (1, 1.1, 1.2…); same information, emphasises <i>structure</i>; convertible to/from sequence form.</li>
</ul>

<h2>Design class diagram</h2>
<p>The domain model hardened for code: visibility on every member, full operation signatures, attribute types, <b>navigability arrows</b>, dependency arrows, interfaces (lollipop or &lt;&lt;interface&gt;&gt;), and design-only classes (controllers, DAOs, views). Associations become attributes; method names finalise the collaborations discovered in interaction diagrams.</p>

<h2>Patterns at design time</h2>
<p>Apply GoF deliberately: Observer for model→view updates, Strategy for pluggable algorithms, Factory for decoupled creation, Facade as the Controller, Adapter for legacy/library mismatch, State for mode-dependent behaviour. Anti-warning: pattern overuse adds indirection without need — justify each by a force in the problem.</p>
<blockquote>Exam traps: GRASP names with one-line meanings; expand SOLID; sequence vs communication equivalence; message numbering in communication diagrams; navigability arrow direction; Liskov violations (Square extending Rectangle) are a favourite discussion question.</blockquote>`,

"se-impl": `<h2>Mapping design to code</h2>
<p>Mechanical translations every exam expects:</p>
<pre><code>class Order {                       // class box → class
private:
    Date placed;                    // attribute → field
    vector&lt;LineItem&gt; items;        // composition 1..* → owned collection
    Customer* customer;             // association 1 → reference/pointer
public:
    double total() const;           // operation → method
};

class ExpressOrder : public Order { … };   // generalisation → inheritance
class Printable { public: virtual void print() = 0; };  // interface → abstract class</code></pre>
<ul>
<li>1:1 association → reference; 1:* → collection; *:* → collections both sides or an association class.</li>
<li><b>Composition</b> → owner constructs/destroys parts (value member / unique ownership); <b>aggregation</b> → non-owning reference.</li>
<li>Navigability decides which class holds the reference; bidirectional links need consistency discipline.</li>
<li>Visibility maps directly (+ public, − private, # protected); statics underline → static members.</li>
</ul>

<h2>Code quality practices</h2>
<ul>
<li><b>Coding standards</b> — naming conventions, layout, comment discipline, file organisation; enforced by linters and reviews.</li>
<li><b>Code review / inspection</b> — the cheapest defect-removal technique known; pair programming as continuous review.</li>
<li><b>Refactoring</b> — behaviour-preserving structural improvement: rename, extract method/class, replace conditional with polymorphism, remove duplication — backed by a regression test suite.</li>
<li><b>Unit testing &amp; TDD</b> — red (failing test) → green (make it pass) → refactor; tests document intent.</li>
<li>Version control workflow (feature branches, reviews, CI) ties implementation to SCM.</li>
</ul>

<h2>Error and exception handling</h2>
<ul>
<li>Detect at boundaries: <b>validate inputs</b>; fail fast with informative diagnostics.</li>
<li><b>Exceptions vs return codes</b> — exceptions separate the error path, can't be silently ignored, and unwind to a competent handler; catch specific types, throw by value/catch by reference (C++), clean up via destructors/<b>RAII</b> or finally.</li>
<li><b>Defensive programming</b> — preconditions, assertions for "impossible" states, design-by-contract mindset.</li>
<li><b>Robustness strategies</b> — graceful degradation, retries with backoff for transient faults, transactions for atomic state changes, logging with enough context to diagnose.</li>
<li>Don't swallow exceptions; don't use exceptions for ordinary control flow.</li>
</ul>
<blockquote>Exam traps: association-to-code mappings (1, 1..*, *..*); composition implies ownership/lifetime in code; refactoring changes structure <i>not</i> behaviour; TDD cycle order; RAII/finally guarantee cleanup; reviews beat testing on cost-per-defect.</blockquote>`,

"ai-agent": `<h2>What AI is</h2>
<p>Four classic definitions cross two axes — thinking vs acting, humanly vs rationally: thinking humanly (cognitive modelling), acting humanly (<b>Turing test</b>: NLP, knowledge representation, reasoning, learning to pass), thinking rationally (logic), <b>acting rationally</b> (the rational-agent view — the textbook's chosen frame). Foundations draw on philosophy, mathematics, economics, neuroscience, psychology, linguistics, control theory.</p>

<h2>Agents</h2>
<p>An <b>agent</b> perceives its environment through <b>sensors</b> and acts through <b>actuators</b>; behaviour is the agent function (percept sequence → action), implemented by an agent program on an architecture. A <b>rational agent</b> selects actions expected to maximise its <b>performance measure</b>, given the percept history and built-in knowledge — rational ≠ omniscient (rationality maximises <i>expected</i>, not actual, outcome).</p>
<h3>PEAS — worked specifications</h3>
<table>
<tr><th>Agent</th><th>Performance</th><th>Environment</th><th>Actuators</th><th>Sensors</th></tr>
<tr><td>Self-driving taxi</td><td>safety, speed, legality, comfort, profit</td><td>roads, traffic, pedestrians, weather</td><td>steering, brake, accelerator, horn</td><td>cameras, lidar, GPS, speedometer</td></tr>
<tr><td>Medical diagnosis system</td><td>patient health, cost, lawsuits avoided</td><td>patients, hospital, staff</td><td>display of diagnoses/tests/referrals</td><td>symptom entries, test results</td></tr>
<tr><td>Spam filter</td><td>precision/recall of classification</td><td>mail stream</td><td>label, move, delete</td><td>incoming message text/headers</td></tr>
</table>
<h3>Environment properties (classify — favourite MCQ)</h3>
<ul>
<li><b>Fully vs partially observable</b> — chess vs poker/driving.</li>
<li><b>Deterministic vs stochastic</b> — next state fixed by state+action or not.</li>
<li><b>Episodic vs sequential</b> — independent episodes (image classification) vs actions with long consequences (chess).</li>
<li><b>Static vs dynamic</b> — world changes while deliberating? (crossword vs driving; semi-dynamic: clock chess).</li>
<li><b>Discrete vs continuous</b>; <b>single vs multi-agent</b> (competitive/cooperative).</li>
</ul>
<p>Hardest combination: partially observable, stochastic, sequential, dynamic, continuous, multi-agent — i.e. taxi driving.</p>

<h2>Agent architectures</h2>
<ol>
<li><b>Simple reflex</b> — condition-action rules on the current percept only; fails under partial observability.</li>
<li><b>Model-based reflex</b> — keeps internal state updated by a world model.</li>
<li><b>Goal-based</b> — chooses actions that lead toward explicit goals (search/planning).</li>
<li><b>Utility-based</b> — ranks states by a utility function; handles conflicting goals and uncertainty.</li>
<li><b>Learning agent</b> — adds a learning element, critic, and problem generator around any of the above.</li>
</ol>
<blockquote>Exam traps: rational ≠ omniscient; PEAS for a named agent is a standard write-up; environment-classification pairs (chess = fully observable, deterministic, sequential, semi-dynamic? — clock makes it semi-dynamic); reflex agents fail where memory of past percepts is needed.</blockquote>`,

"ai-search": `<h2>Problem formulation</h2>
<p>A search problem = initial state, <b>actions</b>, transition model, <b>goal test</b>, path cost. Abstraction strips irrelevant detail. Examples: 8-puzzle (states = tile configurations, 9!/2 reachable), 8-queens, route finding, missionaries-and-cannibals. Evaluate algorithms on <b>completeness, optimality, time, space</b> with branching factor b and solution depth d.</p>

<h2>Uninformed search</h2>
<table>
<tr><th>Strategy</th><th>Complete</th><th>Optimal</th><th>Time</th><th>Space</th></tr>
<tr><td>BFS (queue)</td><td>yes (finite b)</td><td>yes, unit costs</td><td>$O(b^d)$</td><td>$O(b^d)$ — the killer</td></tr>
<tr><td>Uniform-cost</td><td>yes</td><td>yes</td><td>$O(b^{1+C^*/&#92;epsilon})$</td><td>same</td></tr>
<tr><td>DFS (stack)</td><td>no (infinite paths)</td><td>no</td><td>$O(b^m)$</td><td>$O(bm)$ — linear!</td></tr>
<tr><td>Depth-limited (l)</td><td>no if l &lt; d</td><td>no</td><td>$O(b^l)$</td><td>O(bl)</td></tr>
<tr><td>Iterative deepening</td><td>yes</td><td>yes, unit costs</td><td>$O(b^d)$</td><td>O(bd) — best of both</td></tr>
<tr><td>Bidirectional</td><td>yes</td><td>yes</td><td>$O(b^{d/2})$</td><td>$O(b^{d/2})$</td></tr>
</table>

<h2>Informed (heuristic) search</h2>
<p>A heuristic h(n) estimates cost-to-goal. <b>Greedy best-first</b> expands lowest h — fast, incomplete-ish, suboptimal. <b>A*</b> expands lowest $f(n) = g(n) + h(n)$ (cost so far + estimate).</p>
<ul>
<li><b>Admissible</b> h never overestimates → A* (tree search) is optimal. <b>Consistent</b> (h(n) ≤ c(n, n') + h(n')) → optimal for graph search too.</li>
<li>8-puzzle heuristics: misplaced tiles $h_1$, <b>Manhattan distance</b> $h_2$; $h_2 &#92;ge h_1$ → $h_2$ <b>dominates</b> → expands fewer nodes. Straight-line distance is admissible for routes.</li>
<li><i>Mini-trace:</i> start f = 0 + h; repeatedly pop the open node with least f, push successors with updated g — exam questions ask the expansion order on a small weighted graph.</li>
</ul>

<h2>Local search</h2>
<ul>
<li><b>Hill climbing</b> — move to the best neighbour; gets stuck on <b>local maxima, plateaux, ridges</b>; fixes: random restarts, sideways moves, stochastic variants.</li>
<li><b>Simulated annealing</b> — accept worse moves with probability $e^{&#92;Delta E / T}$, cooling T over time — escapes local optima.</li>
<li><b>Genetic algorithms</b> — population, fitness, selection, crossover, mutation.</li>
<li>Suited to problems where the path doesn't matter (8-queens, scheduling); memory O(1).</li>
</ul>

<h2>Constraint satisfaction &amp; adversarial search</h2>
<ul>
