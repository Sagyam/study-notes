<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Entrance · Study Hub</title>

<!-- KaTeX for math/electronics equations -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<!-- HK Grotesque requested; Hanken Grotesk is its freely-loadable open sibling (same designer) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..800;1,400..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME — warm "paper" light mode (default, easy on eyes for
   long reading) + soft warm "night" mode.
   ============================================================ */
:root{
  --font-body:'HK Grotesque','Hanken Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;

  --bg:#f3efe6;
  --bg-tint:#ece7da;
  --surface:#fbf9f3;
  --surface-2:#f6f2e8;
  --sidebar:#efeadf;
  --text:#2c2a25;
  --text-2:#6c675c;
  --text-3:#928c7e;
  --border:#e0d9c8;
  --border-soft:#e9e3d5;
  --shadow:0 1px 2px rgba(60,50,30,.06),0 8px 24px rgba(60,50,30,.05);
  --shadow-sm:0 1px 2px rgba(60,50,30,.07);

  --t1:#2f7d72;  --t1-soft:#dceae6;
  --t2:#4a6a9c;  --t2-soft:#dde4ef;
  --t3:#b06a3a;  --t3-soft:#f1e2d3;
  --t4:#6e7d4a;  --t4-soft:#e6ebd6;

  --done:#3f8e63;
  --wip:#c4912f;

  --radius:12px;
  --radius-sm:8px;
  --measure:68ch;
}
html[data-theme="night"]{
  --bg:#1a1815;
  --bg-tint:#211e1a;
  --surface:#211e1a;
  --surface-2:#26231e;
  --sidebar:#1e1b17;
  --text:#e8e3d6;
  --text-2:#a39c8b;
  --text-3:#7c7666;
  --border:#332f28;
  --border-soft:#2c2922;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.25);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);

  --t1:#5cb3a5;  --t1-soft:#1f322e;
  --t2:#7e9ed4;  --t2-soft:#222a36;
  --t3:#d99560;  --t3-soft:#352519;
  --t4:#a3b771;  --t4-soft:#272d1b;

  --done:#5fb585;
  --wip:#d9ad55;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  font-size:17px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  display:flex;
  min-height:100vh;
}
::selection{background:var(--t1-soft);color:var(--text)}

::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ============================================================ SIDEBAR ============================================================ */
#sidebar{
  width:340px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;transition:margin-left .28s ease;
}
.sb-head{padding:1.4rem 1.4rem 1rem;border-bottom:1px solid var(--border-soft)}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:800;letter-spacing:-.02em;font-size:1.05rem}
.brand .dot{width:11px;height:11px;border-radius:50%;
  background:conic-gradient(from 180deg,var(--t1),var(--t2),var(--t3),var(--t4),var(--t1));flex-shrink:0}
.brand small{display:block;font-weight:500;color:var(--text-2);font-size:.72rem;
  letter-spacing:.04em;text-transform:uppercase;margin-top:.15rem}
.search-wrap{position:relative;margin-top:1rem}
#search{width:100%;padding:.55rem .8rem .55rem 2.1rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);
  font-family:var(--font-body);font-size:.86rem;transition:border-color .15s,box-shadow .15s}
#search:focus{outline:none;border-color:var(--t1);box-shadow:0 0 0 3px var(--t1-soft)}
#search::placeholder{color:var(--text-3)}
.search-wrap svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-3);pointer-events:none}
.overall{margin-top:.95rem;font-size:.74rem;color:var(--text-2);
  display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.meter{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.meter span{display:block;height:100%;width:0;background:var(--t1);border-radius:6px;transition:width .4s ease}

.tree{flex:1;overflow-y:auto;padding:.6rem .6rem 3rem}
.tier{margin-bottom:.35rem;border-radius:var(--radius-sm);overflow:hidden}
.tier-head{display:flex;align-items:center;gap:.55rem;padding:.62rem .7rem;cursor:pointer;
  border-radius:var(--radius-sm);transition:background .12s;user-select:none}
.tier-head:hover{background:var(--surface-2)}
.tier-bar{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.tier-titles{flex:1;min-width:0}
.tier-titles b{font-size:.83rem;font-weight:700;letter-spacing:-.01em;display:block}
.tier-titles em{font-style:normal;font-size:.7rem;color:var(--text-2);display:block;margin-top:.05rem}
.tier-pct{font-size:.7rem;font-weight:600;color:var(--text-2);font-family:var(--font-mono)}
.chev{width:14px;height:14px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
.collapsed .chev{transform:rotate(-90deg)}
.tier-body{padding:.15rem .2rem .4rem .35rem}
.collapsed .tier-body{display:none}

.chapter{margin:.1rem 0}
.chapter-head{display:flex;align-items:center;gap:.45rem;padding:.4rem .55rem;cursor:pointer;
  border-radius:6px;font-size:.8rem;color:var(--text);transition:background .12s;user-select:none}
.chapter-head:hover{background:var(--surface-2)}
.chapter-head .code{font-family:var(--font-mono);font-size:.58rem;color:var(--text-3);
  margin-left:auto;flex-shrink:0;letter-spacing:.02em}
.chapter-head .chev{width:12px;height:12px}
.chapter-name{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chapter-body{padding-left:.55rem;margin-left:.35rem;border-left:1px solid var(--border-soft)}
.chapter.collapsed .chapter-body{display:none}

.topic{display:flex;align-items:center;gap:.5rem;padding:.34rem .55rem;margin:.05rem 0;cursor:pointer;
  border-radius:6px;font-size:.78rem;color:var(--text-2);transition:background .12s,color .12s;line-height:1.35}
.topic:hover{background:var(--surface-2);color:var(--text)}
.topic.active{background:var(--t1-soft);color:var(--text);font-weight:600}
.topic .status{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--text-3);background:transparent}
.topic[data-status="wip"] .status{background:var(--wip);border-color:var(--wip)}
.topic[data-status="done"] .status{background:var(--done);border-color:var(--done)}
.topic-name{flex:1;min-width:0}

/* ============================================================ MAIN ============================================================ */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:1rem;padding:.85rem 1.6rem;
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-soft)}
.menu-btn{display:none}
.crumbs{font-size:.78rem;color:var(--text-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crumbs b{color:var(--text);font-weight:600}
.topbar-actions{display:flex;gap:.5rem;align-items:center}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .7rem;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-family:var(--font-body);
  font-size:.76rem;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn:hover{color:var(--text);border-color:var(--text-3)}
.btn svg{width:14px;height:14px}

.content{flex:1;padding:2.6rem 2.2rem 6rem;max-width:calc(var(--measure) + 4.4rem);margin:0 auto;width:100%}

.welcome h1{font-size:2.1rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
.welcome .lede{color:var(--text-2);font-size:1.02rem;max-width:60ch;margin-bottom:2.2rem}
.tier-cards{display:grid;gap:.9rem}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;
  box-shadow:var(--shadow-sm);display:flex;gap:1rem;align-items:flex-start;cursor:pointer;
  transition:transform .14s,box-shadow .14s,border-color .14s}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--text-3)}
.tcard .badge{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:1.05rem;color:#fff}
.tcard-main{flex:1;min-width:0}
.tcard-main h3{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
.tcard-main p{font-size:.82rem;color:var(--text-2);margin:.2rem 0 .55rem}
.exam-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.exam-tag{font-size:.66rem;font-weight:600;padding:.12rem .45rem;border-radius:20px;background:var(--surface-2);
  color:var(--text-2);border:1px solid var(--border-soft)}
.tcard-pct{text-align:right;flex-shrink:0;min-width:54px}
.tcard-pct b{font-family:var(--font-mono);font-size:1.05rem;font-weight:500;display:block}
.tcard-pct small{font-size:.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.tcard .mini-meter{height:4px;background:var(--border);border-radius:4px;margin-top:.6rem;overflow:hidden}
.tcard .mini-meter span{display:block;height:100%;border-radius:4px;transition:width .4s}

.topic-view .eyebrow{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;font-size:.74rem;color:var(--text-2);margin-bottom:.7rem}
.pill{font-size:.66rem;font-weight:700;padding:.16rem .55rem;border-radius:20px;color:#fff;letter-spacing:.02em}
.ex-pill{font-family:var(--font-mono);font-size:.6rem;font-weight:500;color:var(--text-2);
  border:1px solid var(--border);padding:.08rem .4rem;border-radius:5px;letter-spacing:.03em}
.topic-view h1{font-size:1.85rem;font-weight:800;letter-spacing:-.025em;line-height:1.15;margin-bottom:1.2rem}
.status-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;padding:.7rem 0 1.4rem;margin-bottom:1.6rem;
  border-bottom:1px solid var(--border-soft)}
.status-row .lbl{font-size:.74rem;color:var(--text-2);margin-right:.2rem}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg button{border:none;background:var(--surface);color:var(--text-2);padding:.4rem .75rem;font-family:var(--font-body);
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .12s;border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button:hover{background:var(--surface-2);color:var(--text)}
.seg button.on[data-s="todo"]{background:var(--text-3);color:#fff}
.seg button.on[data-s="wip"]{background:var(--wip);color:#fff}
.seg button.on[data-s="done"]{background:var(--done);color:#fff}

.reading{font-size:1.04rem;line-height:1.78;color:var(--text)}
.reading > *{margin-bottom:1.1rem}
.reading h2{font-size:1.3rem;font-weight:700;letter-spacing:-.01em;margin:2rem 0 .8rem}
.reading h3{font-size:1.08rem;font-weight:700;margin:1.5rem 0 .6rem}
.reading p{max-width:var(--measure)}
.reading ul,.reading ol{padding-left:1.4rem;max-width:var(--measure)}
.reading li{margin-bottom:.4rem}
.reading code{font-family:var(--font-mono);font-size:.86em;background:var(--surface-2);padding:.1rem .35rem;
  border-radius:5px;border:1px solid var(--border-soft)}
.reading pre{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:1rem 1.1rem;overflow-x:auto;font-family:var(--font-mono);font-size:.84rem;line-height:1.6}
.reading pre code{background:none;border:none;padding:0}
.reading blockquote{border-left:3px solid var(--t1);padding:.3rem 0 .3rem 1rem;color:var(--text-2)}
.reading table{border-collapse:collapse;font-size:.9rem;width:100%}
.reading th,.reading td{border:1px solid var(--border);padding:.45rem .7rem;text-align:left}
.reading th{background:var(--surface-2);font-weight:700}

/* inline SVG diagrams */
.reading figure{margin:1.6rem auto;text-align:center;max-width:var(--measure)}
.reading figure svg{max-width:100%;height:auto;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9rem}
.reading figure svg text{font-family:var(--font-body)}
.reading figcaption{font-size:.8rem;color:var(--text-2);margin-top:.55rem;font-style:italic}
.reading .diagram-wire{stroke:var(--text);stroke-width:1.6;fill:none;stroke-linecap:round}
.reading .diagram-fill{fill:var(--t3-soft)}
.reading .diagram-accent{stroke:var(--t3);stroke-width:2;fill:none}
.reading .diagram-label{fill:var(--text);font-size:12px}
.reading .diagram-muted{fill:var(--text-2);font-size:11px}

.placeholder{border:1.5px dashed var(--border);border-radius:var(--radius);padding:2.4rem 1.6rem;text-align:center;
  color:var(--text-3);background:repeating-linear-gradient(45deg,transparent,transparent 12px,var(--surface-2) 12px,var(--surface-2) 13px)}
.placeholder svg{width:34px;height:34px;margin-bottom:.7rem;color:var(--text-3)}
.placeholder b{display:block;color:var(--text-2);font-size:.95rem;margin-bottom:.3rem}
.placeholder span{font-size:.82rem}
.placeholder .how{margin-top:1.2rem;font-family:var(--font-mono);font-size:.72rem;color:var(--text-2);
  background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;display:inline-block;text-align:left}

.pager{display:flex;justify-content:space-between;gap:1rem;margin-top:3rem;padding-top:1.6rem;border-top:1px solid var(--border-soft)}
.pager a{flex:1;text-decoration:none;color:var(--text);border:1px solid var(--border);border-radius:var(--radius);
  padding:.8rem 1rem;transition:border-color .14s,transform .14s;background:var(--surface);display:block;min-width:0}
.pager a:hover{border-color:var(--text-3);transform:translateY(-1px)}
.pager a.next{text-align:right}
.pager small{font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;display:block}
.pager b{font-size:.86rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.pager a.disabled{opacity:.4;pointer-events:none}

.overlay{display:none}
@media (max-width:880px){
  #sidebar{position:fixed;z-index:50;box-shadow:var(--shadow)}
  #sidebar.hidden{margin-left:-340px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
  .overlay.show{display:block}
  .menu-btn{display:inline-flex}
  .content{padding:1.8rem 1.2rem 5rem}
  body{font-size:16px}
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-head">
    <div class="brand">
      <span class="dot"></span>
      <div>Study Hub<small>NEC · IOE · CSIT · KU</small></div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search topics…" autocomplete="off">
    </div>
    <div class="overall"><span>Overall progress</span>
      <span id="overallPct" style="font-family:var(--font-mono);font-weight:600;color:var(--text)">0%</span></div>
    <div class="meter"><span id="overallBar"></span></div>
  </div>
  <nav class="tree" id="tree"></nav>
</aside>
<div class="overlay" id="overlay"></div>

<div id="main">
  <div class="topbar">
    <button class="btn menu-btn" id="menuBtn" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="crumbs" id="crumbs">Welcome</div>
    <div class="topbar-actions">
      <button class="btn" id="themeBtn">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span id="themeLabel">Night</span>
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ============================================================
   CURRICULUM DATA   —   TIER -> CHAPTER -> TOPIC
   Each topic has an empty `c` (content) = skeleton.
   `exams` on each chapter lists which exams it serves.

   TO FILL CONTENT LATER, put HTML into a topic's `c`:
       c: `<h2>Heading</h2><p>Body, inline math $E=mc^2$.</p>
           $$\int_0^\infty e^{-x}\,dx = 1$$`
   HTML works directly · math via $...$ and $$...$$ (KaTeX)
   · code via <pre><code>...</code></pre>. Leave c:"" for placeholder.
   ============================================================ */

const CURRICULUM = [
  /* ---------------- TIER 1 ---------------- */
  {
    id:"t1", n:"Tier 1 — CS Core", sub:"The shared core · most chapters span multiple exams",
    color:"var(--t1)", soft:"var(--t1-soft)", exams:["NEC","IOE","CSIT","KU"],
    chapters:[
      { id:"prog", n:"Programming (C / C++ & OOP)", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"prog-c",   n:"Intro to C: tokens, operators, I/O, control, loops, functions, recursion, arrays, strings", c:""},
        {id:"prog-ptr", n:"Pointers, structures & data files in C", c:""},
        {id:"prog-cpp", n:"C++ constructs: classes, objects, access specifiers, constructors/destructors", c:""},
        {id:"prog-enc", n:"OOP concepts: encapsulation & abstraction", c:""},
        {id:"prog-oop", n:"Operator overloading, inheritance & polymorphism", c:""},
        {id:"prog-vfh", n:"Virtual functions & file handling", c:""},
        {id:"prog-gen", n:"Templates, STL & exception handling", c:""},
      ]},
      { id:"dsa", n:"Data Structures & Algorithms", exams:["NEC","CSIT","KU"], topics:[
        {id:"dsa-list", n:"Data structures, lists, linked lists & trees", c:""},
        {id:"dsa-sort", n:"Sorting, searching & graphs", c:""},
        {id:"dsa-cx",   n:"Complexity (Big-O / Ω / Θ), recursion", c:""},
        {id:"dsa-para", n:"Greedy · divide-and-conquer · dynamic programming (conceptual)", c:""},
      ]},
      { id:"db", n:"DBMS", exams:["NEC","CSIT","KU"], topics:[
        {id:"db-model", n:"Data models, ER, normalization (1NF–BCNF) & SQL", c:""},
        {id:"db-tx",    n:"Transactions, ACID, concurrency control & crash recovery", c:""},
      ]},
      { id:"os", n:"Operating Systems", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"os-proc", n:"OS intro & process management (processes, threads, scheduling, synchronization)", c:""},
        {id:"os-mem",  n:"Memory management, virtual memory, file systems & administration", c:""},
        {id:"os-app",  n:"OS & application program concepts; computer applications", c:""},
      ]},
      { id:"net", n:"Computer Networks", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"net-phy",  n:"Intro & physical layer (OSI vs TCP/IP, devices, media)", c:""},
        {id:"net-dll",  n:"Data link layer (error/flow control, MAC, Ethernet, ARP)", c:""},
        {id:"net-ip",   n:"Network layer (IP addressing, subnetting, routing, IPv6)", c:""},
        {id:"net-tcp",  n:"Transport layer (TCP/UDP, ports, congestion control)", c:""},
        {id:"net-app",  n:"Application layer (HTTP, DNS, FTP, email, sockets, analyzers)", c:""},
      ]},
      { id:"coa", n:"Computer Org & Digital Logic", exams:["NEC","IOE","CSIT"], topics:[
        {id:"coa-fund", n:"Fundamentals of computer architecture & organization", c:""},
        {id:"coa-dl",   n:"Digital logic: number systems, Boolean algebra, gates, K-map", c:""},
        {id:"coa-comb", n:"Combinational & arithmetic circuits (MUX, decoder, adders)", c:""},
        {id:"coa-seq",  n:"Sequential logic: flip-flops, registers, counters", c:""},
        {id:"coa-mp",   n:"Microprocessor: architecture & assembly programming", c:""},
        {id:"coa-mpsys",n:"Microprocessor system: memory, I/O interface, DMA", c:""},
        {id:"coa-int",  n:"Interrupt operations (ISR, interrupt processing)", c:""},
        {id:"coa-cpu",  n:"Control & CPU: instruction set, addressing, RISC/CISC, pipelining", c:""},
        {id:"coa-mem",  n:"Computer arithmetic & memory system (cache, hierarchy)", c:""},
        {id:"coa-io",   n:"I/O organization & multiprocessor", c:""},
        {id:"coa-emb",  n:"Embedded systems: HW/SW design issues, ASIP", c:""},
        {id:"coa-rtos", n:"Real-time OS & control systems", c:""},

"prog-c": `
<h2>What C is</h2>
<p>C is a general-purpose, procedural, compiled language. A program is a set of <b>functions</b>; execution begins at <code>main()</code>. Source is compiled to an object file and linked into an executable.</p>
<pre><code>#include &lt;stdio.h&gt;
int main(void) {
    printf("Hello, NEC");   // statement
    return 0;               // exit status
}</code></pre>

<h2>Tokens</h2>
<p>The smallest units the compiler reads — six kinds:</p>
<ul>
<li><b>Keywords</b> — reserved words (<code>int</code>, <code>if</code>, <code>return</code>, <code>while</code>…); 32 in standard C.</li>
<li><b>Identifiers</b> — names for variables/functions; start with a letter or <code>_</code>, case-sensitive.</li>
<li><b>Constants</b> — fixed values (<code>10</code>, <code>3.14</code>, <code>'A'</code>).</li>
<li><b>String literals</b> — <code>"text"</code>, stored with a terminating null character.</li>
<li><b>Operators</b> — <code>+ - * / %</code>, etc.</li>
<li><b>Special symbols</b> — <code>{ } [ ] ( ) ; ,</code></li>
</ul>

<h2>Data types &amp; operators</h2>
<table>
<tr><th>Type</th><th>Typical size</th><th>Use</th></tr>
<tr><td>char</td><td>1 byte</td><td>single character / small int</td></tr>
<tr><td>int</td><td>2–4 bytes</td><td>whole numbers</td></tr>
<tr><td>float / double</td><td>4 / 8 bytes</td><td>real numbers</td></tr>
</table>
<p>Operator families: arithmetic, relational (<code>&lt; &gt; ==</code>), logical (<code>&amp;&amp; || !</code>), bitwise (<code>&amp; | ^ &gt;&gt; &lt;&lt;</code>), assignment, and the ternary <code>?:</code>.</p>

<h2>Formatted I/O</h2>
<p><code>printf</code> and <code>scanf</code> use format specifiers: <code>%d</code> int, <code>%f</code> float, <code>%c</code> char, <code>%s</code> string. <code>scanf</code> needs the address operator for scalars:</p>
<pre><code>int age;
scanf("%d", &amp;age);
printf("Age is %d", age);</code></pre>
<p>Unformatted I/O: <code>getchar/putchar</code>, <code>fgets/puts</code>.</p>

<h2>Control &amp; loops</h2>
<p>Decisions: <code>if / else if / else</code> and <code>switch</code>. Loops: <code>for</code> (count known), <code>while</code> (entry-controlled), <code>do…while</code> (runs at least once). <code>break</code> exits a loop; <code>continue</code> skips to the next iteration.</p>

<h2>Functions &amp; recursion</h2>
<p>A function has a return type, name, parameters and body. C passes arguments <b>by value</b> (a copy). A <b>recursive</b> function calls itself and must have a base case to terminate.</p>
<pre><code>int fact(int n) {
    if (n &lt;= 1) return 1;     // base case
    return n * fact(n - 1);   // recursive step
}</code></pre>

<h2>Arrays &amp; strings</h2>
<p>An array is a contiguous block of same-type elements, indexed from 0: <code>int a[5];</code>, 2-D as <code>int m[3][4];</code>. A <b>string</b> is a <code>char</code> array ending in the null character; <code>&lt;string.h&gt;</code> provides <code>strlen, strcpy, strcmp, strcat</code>.</p>

<blockquote>Exam focus: identify token types, trace loop/recursion output, and remember arrays decay to pointers when passed to functions (next topic).</blockquote>`,

"prog-ptr": `
<h2>Pointers</h2>
<p>A pointer holds the <b>address</b> of another variable. <code>&amp;</code> gives an address; <code>*</code> dereferences (reads the value at an address).</p>
<pre><code>int x = 10;
int *p = &amp;x;     // p points to x
printf("%d", *p); // prints 10</code></pre>

<h2>Pointer arithmetic</h2>
<p>Adding 1 to a pointer advances it by <code>sizeof(type)</code> bytes, not one byte — which is why pointers and arrays are tightly linked. For an array <code>a</code>, the name <code>a</code> is the address of <code>a[0]</code>, and <code>*(a+i)</code> equals <code>a[i]</code>.</p>

<h2>Passing pointers to functions</h2>
<p>Because C is pass-by-value, to let a function modify a caller's variable you pass its address (simulated pass-by-reference). This is also how arrays are passed efficiently.</p>
<pre><code>void inc(int *n) { (*n)++; }
// inc(&amp;x) increments x in the caller</code></pre>

<h2>Structures vs unions</h2>
<table>
<tr><th></th><th>struct</th><th>union</th></tr>
<tr><td>Memory</td><td>sum of all members</td><td>size of largest member (shared)</td></tr>
<tr><td>Members active</td><td>all at once</td><td>one at a time</td></tr>
</table>
<pre><code>struct Point { int x, y; };
struct Point p = {3, 4};
p.x = 5;            // dot for a variable
struct Point *pp = &amp;p;
pp-&gt;y = 6;          // arrow for a pointer</code></pre>
<p>Common patterns: <b>array of structures</b> (a table of records), <b>passing a structure to a function</b> (by value copies it; by pointer is cheaper), and combining <b>structure + pointer</b> for linked structures.</p>

<h2>File handling</h2>
<p>Open with <code>fopen("file","mode")</code> returning a <code>FILE*</code>; always <code>fclose</code>. Modes: <code>r w a</code> (with <code>+</code> for read/write, <code>b</code> for binary).</p>
<ul>
<li>Text I/O: <code>fprintf / fscanf</code>, <code>fgets / fputs</code>.</li>
<li>Binary I/O: <code>fread / fwrite</code>.</li>
</ul>
<h3>Sequential vs random access</h3>
<p><b>Sequential</b> reads/writes front to back. <b>Random</b> access jumps anywhere with <code>fseek(fp, offset, origin)</code>; <code>ftell</code> reports the current position and <code>rewind</code> returns to the start.</p>`,

"prog-cpp": `
<h2>From C to C++</h2>
<p>C++ adds classes, namespaces, references and stronger typing on top of C. A <b>namespace</b> groups names to avoid clashes; <code>std</code> is the standard-library namespace.</p>

<h2>Classes &amp; objects</h2>
<p>A <b>class</b> bundles data (members) and functions (methods) into a type; an <b>object</b> is an instance of it. <b>Access specifiers</b> control visibility:</p>
<ul>
<li><b>private</b> — accessible only inside the class (default for <code>class</code>).</li>
<li><b>public</b> — accessible everywhere.</li>
<li><b>protected</b> — like private, but also visible to derived classes.</li>
</ul>
<pre><code>class Circle {
    double r;                              // private
public:
    Circle(double radius) { r = radius; }  // constructor
    double area() { return 3.14159 * r * r; }
};
Circle c(2.0);
c.area();</code></pre>

<h2>Constructors &amp; destructor</h2>
<p>A <b>constructor</b> runs automatically when an object is created; types: default, parameterized and <b>copy constructor</b> (initialises from another object). A <b>destructor</b> <code>~Class()</code> runs when the object is destroyed — used to release resources.</p>

<h2>Dynamic memory</h2>
<p><code>new</code> allocates on the heap and calls the constructor; <code>delete</code> frees it and calls the destructor. For arrays use <code>new[]</code> / <code>delete[]</code>.</p>
<pre><code>Circle *c = new Circle(1.0);
delete c;</code></pre>

<h2>Other members</h2>
<ul>
<li><b>this pointer</b> — implicit pointer to the current object.</li>
<li><b>static members</b> — one copy shared by all objects; a static function accesses only static data.</li>
<li><b>const member functions</b> — promise not to modify the object; callable on const objects.</li>
<li><b>friend</b> functions/classes — granted access to private members despite being outside the class.</li>
</ul>

<h2>Convenience features</h2>
<p><b>Function overloading</b> (same name, different parameter lists), <b>inline</b> functions (avoid call overhead), <b>default arguments</b>, and <b>pass/return by reference</b> using <code>&amp;</code> to avoid copies.</p>`,

"prog-enc": `
<h2>The four pillars</h2>
<p>Object-oriented programming rests on <b>encapsulation</b>, <b>abstraction</b>, <b>inheritance</b> and <b>polymorphism</b>. This topic covers the first two; the next covers the other two.</p>

<h2>Encapsulation</h2>
<p>Bundling data and the methods that operate on it inside one unit (the class), and restricting direct access to the data. Implemented by making members <b>private</b> and exposing controlled <b>public</b> getters/setters.</p>
<pre><code>class Account {
    double balance;          // hidden
public:
    void deposit(double a) { if (a &gt; 0) balance += a; }
    double getBalance() { return balance; }
};</code></pre>
<p>Benefit: the class enforces its own invariants — outside code cannot set an invalid balance directly.</p>

<h2>Abstraction</h2>
<p>Exposing <b>what</b> an object does while hiding <b>how</b> it does it. A caller of <code>deposit()</code> need not know how the balance is stored. Abstraction is achieved through public interfaces and, more strongly, through abstract classes / pure virtual functions (covered later).</p>

<h2>Encapsulation vs abstraction</h2>
<table>
<tr><th>Encapsulation</th><th>Abstraction</th></tr>
<tr><td>Hides <i>data</i></td><td>Hides <i>implementation / complexity</i></td></tr>
<tr><td>Solved at implementation level</td><td>Solved at design level</td></tr>
<tr><td>Access specifiers</td><td>Interfaces / abstract classes</td></tr>
</table>
<blockquote>Exam tip: the one-line distinction is commonly asked — encapsulation wraps and protects data; abstraction hides unnecessary detail behind a simple interface.</blockquote>`,

"prog-oop": `
<h2>Operator overloading</h2>
<p>Giving operators a meaning for user-defined types, via a member or friend function named <code>operator&lt;symbol&gt;</code>.</p>
<ul>

<p><b>Data conversion</b> between types uses conversion constructors and conversion operators.</p>

<h2>Inheritance</h2>
<p>A <b>derived</b> class reuses and extends a <b>base</b> class. Forms:</p>
<ul>
<li><b>Single</b> — one base.</li>
<li><b>Multiple</b> — several bases.</li>
<li><b>Multilevel</b> — a chain (A → B → C).</li>
<li><b>Hierarchical</b> — many derived from one base.</li>
<li><b>Hybrid / multipath</b> — combinations; the <i>diamond problem</i> (inheriting the same base twice) is solved with <b>virtual</b> inheritance.</li>
</ul>
<p>On construction the <b>base constructor runs first</b>, then the derived; destructors run in reverse order.</p>

<h2>Polymorphism</h2>
<p>"Many forms" — one interface, many behaviours.</p>
<table>
<tr><th>Compile-time (static)</th><th>Run-time (dynamic)</th></tr>
<tr><td>Function &amp; operator overloading</td><td>Virtual functions</td></tr>
<tr><td>Resolved at compile time</td><td>Resolved at run time via vtable</td></tr>
</table>
<p>Run-time polymorphism — virtual functions and dynamic binding — is the next topic.</p>`,

"prog-vfh": `
<h2>Virtual functions &amp; dynamic binding</h2>
<p>A <b>virtual</b> function lets a base-class pointer call the <i>derived</i> version of a method, decided at run time. This is <b>dynamic (late) binding</b>, implemented through a per-class table of function pointers (the <b>vtable</b>).</p>
<pre><code>class Shape { public: virtual double area(){ return 0; } };
class Square : public Shape {
    double s;
public:
    Square(double x){ s = x; }
    double area() override { return s*s; }
};
Shape *p = new Square(3);
p-&gt;area();   // calls Square::area() -&gt; 9</code></pre>

<h2>Pure virtual &amp; abstract classes</h2>
<p>A <b>pure virtual</b> function <code>virtual double area() = 0;</code> has no body. A class with at least one of these is <b>abstract</b> and cannot be instantiated — it defines an interface for derived classes.</p>

<h2>C++ file handling</h2>
<p>The <code>&lt;fstream&gt;</code> library gives three stream classes: <b>ifstream</b> (read), <b>ofstream</b> (write), <b>fstream</b> (both).</p>
<pre><code>#include &lt;fstream&gt;

fout &lt;&lt; "score " &lt;&lt; 90;
fout.close();

fin &gt;&gt; word &gt;&gt; n;</code></pre>
<p>Open <b>modes</b>: <code>ios::in, ios::out, ios::app, ios::binary, ios::ate</code>. Text and binary differ in how newlines/numbers are stored.</p>

<h2>Formatting &amp; error handling</h2>
<p>Format with <b>ios member functions/flags</b> (<code>width, precision, setf</code>) or <b>manipulators</b> (<code>endl, setw, setprecision, fixed</code>). Check stream state with <code>eof()</code>, <code>fail()</code>, <code>bad()</code>, or by testing the stream itself in a condition.</p>`,

"prog-gen": `
<h2>Generic programming with templates</h2>
<p>Templates let you write code once that works for many types — the compiler generates a concrete version per type used.</p>
<h3>Function template</h3>
<pre><code>template &lt;typename T&gt;
T maxOf(T a, T b){ return (a &gt; b) ? a : b; }
maxOf(3, 7);        // int
maxOf(2.5, 1.0);    // double</code></pre>
<p>Function templates can themselves be <b>overloaded</b>.</p>
<h3>Class template</h3>
<pre><code>template &lt;typename T&gt;
class Stack {
    T data[100]; int top = 0;
public:
    void push(T x){ data[top++] = x; }
    T pop(){ return data[--top]; }
};
Stack&lt;int&gt; s;</code></pre>

<h2>Standard Template Library (STL)</h2>
<ul>
<li><b>Containers</b> — <code>vector, list, deque, stack, queue, map, set</code>.</li>
<li><b>Iterators</b> — generalised pointers used to traverse containers.</li>
<li><b>Algorithms</b> — <code>sort, find, count, accumulate</code>, operating through iterators.</li>
</ul>

<h2>Exception handling</h2>
<p>Separates error detection from handling using three keywords:</p>
<pre><code>try {
    if (b == 0) throw "divide by zero";
    result = a / b;
}
catch (const char* msg) {
    cout &lt;&lt; msg;
}</code></pre>
<ul>
<li><b>Multiple catch</b> blocks for different exception types; <b>catch-all</b> <code>catch(...)</code> handles anything.</li>
<li><b>Rethrowing</b> passes an exception to an outer handler.</li>
<li>Exceptions may carry <b>arguments</b> (often objects).</li>
<li>An uncaught exception calls <code>terminate()</code>.</li>
</ul>`,


"dsa-list": `<h2>What a data structure is</h2>
<p>A <b>data structure</b> organises data so the operations you need are efficient. <b>Linear</b> structures (array, list, stack, queue) hold elements in sequence; <b>non-linear</b> (tree, graph) hold hierarchies/networks. An <b>ADT</b> (abstract data type) specifies operations without fixing the implementation — e.g. a Stack ADT can be backed by an array or a linked list.</p>
<table>
<tr><th>Operation</th><th>Array</th><th>Singly linked list</th></tr>
<tr><td>Access i-th element</td><td>O(1)</td><td>O(n)</td></tr>
<tr><td>Insert/delete at front</td><td>O(n) (shift)</td><td>O(1)</td></tr>
<tr><td>Insert/delete at end</td><td>O(1) amortised</td><td>O(n) (O(1) with tail pointer)</td></tr>
<tr><td>Search (unsorted)</td><td>O(n)</td><td>O(n)</td></tr>
<tr><td>Memory</td><td>contiguous, compact</td><td>scattered, +1 pointer per node</td></tr>
</table>

<h2>Linked lists — the core operations</h2>
<pre><code>struct Node { int data; struct Node *next; };

/* insert at head — O(1) */
Node *n = malloc(sizeof(Node));
n-&gt;data = x;  n-&gt;next = head;  head = n;

/* delete node after p — O(1) */
Node *t = p-&gt;next;
p-&gt;next = t-&gt;next;
free(t);

/* traverse */
for (Node *c = head; c != NULL; c = c-&gt;next) visit(c);</code></pre>
<ul>
<li><b>Singly linked</b> — forward only; deleting a node needs its <i>predecessor</i>.</li>
<li><b>Doubly linked</b> — prev + next; O(1) delete given the node itself; costs an extra pointer.</li>
<li><b>Circular</b> — last node points to first; useful for round-robin queues.</li>
</ul>

<h2>Stacks &amp; queues</h2>
<p><b>Stack</b> (LIFO): push, pop, peek — all O(1). Uses: function calls (the call stack), expression evaluation, undo, DFS, balanced-parenthesis checking, infix→postfix conversion.</p>
<p><b>Infix → postfix example:</b> $A + B * C$ → $A&#92;,B&#92;,C&#92;,*&#92;,+$ (operators emitted by precedence using a stack). Postfix is then evaluated with a single operand stack.</p>
<p><b>Queue</b> (FIFO): enqueue at rear, dequeue at front. A <b>circular queue</b> wraps indices: <code>rear = (rear+1) % SIZE</code>; full when <code>(rear+1)%SIZE == front</code>. Variants: <b>deque</b> (both ends), <b>priority queue</b> (highest priority out first — usually a heap).</p>

<h2>Trees</h2>
<p>Terms: <b>root</b>, <b>leaf</b>, <b>degree</b> (children count), <b>depth</b> (root→node), <b>height</b> (node→deepest leaf). A binary tree of height h has at most $2^{h+1}-1$ nodes; a tree with n nodes has height at least $&#92;lfloor &#92;log_2 n &#92;rfloor$. A <b>complete</b> binary tree fills levels left-to-right (heaps); a <b>full</b> binary tree's nodes have 0 or 2 children.</p>
<h3>Binary Search Tree</h3>
<p>Invariant: left subtree &lt; node &lt; right subtree. Search/insert walk one root-to-leaf path → O(h): $O(&#92;log n)$ balanced, O(n) if the input was sorted (degenerates to a list). <b>Deletion</b> cases: leaf (just remove), one child (splice), two children (replace with inorder successor, then delete it).</p>
<h3>Traversals — worked example</h3>
<pre><code>        50
       /  &#92;*
     30    70          (read &#92;* as a plain backslash)
    /  &#92;  /  &#92;*
  20  40 60  80</code></pre>
<ul>
<li><b>Inorder</b> (L, N, R): 20 30 40 50 60 70 80 — <i>sorted</i>, the giveaway of a BST.</li>
<li><b>Preorder</b> (N, L, R): 50 30 20 40 70 60 80 — used to copy/serialise a tree.</li>
<li><b>Postorder</b> (L, R, N): 20 40 30 60 80 70 50 — used to delete a tree.</li>
<li><b>Level order</b>: 50 30 70 20 40 60 80 — BFS with a queue.</li>
</ul>
<p><b>Reconstruction:</b> inorder + preorder (or inorder + postorder) uniquely rebuild a binary tree — a frequent exam exercise.</p>
<h3>Balanced trees &amp; heaps</h3>
<ul>
<li><b>AVL</b> — for every node, |height(L) − height(R)| ≤ 1; restored after insert/delete by <b>rotations</b> (LL, RR single; LR, RL double). Guarantees $O(&#92;log n)$.</li>
<li><b>Red-Black</b> — looser balance, fewer rotations; used in C++ <code>map</code>.</li>
<li><b>Heap</b> — complete binary tree in an array: children of i at 2i+1, 2i+2. Max-heap: parent ≥ children. Insert = bubble-up $O(&#92;log n)$; delete-max = move last to root, sift-down $O(&#92;log n)$. Build-heap from n items is O(n).</li>
<li><b>B / B+ tree</b> — multi-way, shallow, disk-friendly; B+ keeps all data in linked leaves (range scans) — see DBMS indexing.</li>
</ul>
<h3>Expression trees</h3>
<p>Operators are internal nodes, operands leaves. Inorder traversal gives infix (needs parentheses), preorder gives prefix, postorder gives postfix.</p>
<blockquote>Exam traps: inorder of a BST is sorted; a BST built from sorted input is a degenerate O(n) list; heap children of index i sit at 2i+1 / 2i+2; AVL needs a <i>double</i> rotation for LR/RL imbalance; n-node binary tree has n+1 NULL links.</blockquote>`,

"dsa-sort": `<h2>Searching</h2>
<p><b>Linear search</b> — scan until found: O(n), works unsorted. <b>Binary search</b> — on a <i>sorted</i> array, compare with the middle and discard half:</p>
<pre><code>lo = 0; hi = n-1;
while (lo &lt;= hi) {
    mid = lo + (hi-lo)/2;          // avoids overflow
    if (a[mid] == key) return mid;
    else if (a[mid] &lt; key) lo = mid+1;
    else hi = mid-1;
}</code></pre>
<p>Cost $O(&#92;log n)$ — at most $&#92;lfloor&#92;log_2 n&#92;rfloor + 1$ probes (20 probes cover a million elements). <b>Trace:</b> find 23 in [4, 9, 16, 23, 38, 56, 72, 91]: mid=23 at index 3 — found in 1 probe; find 91: mids 23→56→72→91, 4 probes.</p>
<p><b>Hashing</b> reaches O(1) average: hash function maps key→bucket; <b>collisions</b> handled by chaining (linked lists) or open addressing (linear/quadratic probing, double hashing). Performance degrades as the <b>load factor</b> α = n/m grows; primary clustering plagues linear probing.</p>

<h2>Sorting — how each works</h2>
<ul>
<li><b>Bubble</b> — repeatedly swap adjacent out-of-order pairs; after pass k the k largest are in place. Early-exit if a pass makes no swaps → O(n) best.</li>
<li><b>Selection</b> — find the minimum of the unsorted part, swap into place; always $&#92;Theta(n^2)$ comparisons but only O(n) swaps.</li>
<li><b>Insertion</b> — take the next element, shift larger sorted elements right, drop it in. O(n) on nearly-sorted data — best simple sort in practice.</li>
<li><b>Merge</b> — split in half, sort each, merge in O(n). Needs O(n) extra array; stable; the standard for linked lists and external (on-disk) sorting.</li>
<li><b>Quick</b> — partition around a pivot (smaller left, larger right), recurse. In-place, cache-friendly, fastest on average. Worst case $O(n^2)$ when partitions are maximally unbalanced (sorted input + first/last pivot); mitigated by random or median-of-three pivot.</li>
<li><b>Heap</b> — build a max-heap O(n), then repeatedly swap root with last and sift down: $O(n&#92;log n)$ guaranteed, in place, not stable.</li>
<li><b>Counting / Radix</b> — non-comparison sorts: counting is O(n+k) for keys in range k; radix sorts digit-by-digit with a stable sort, O(d·(n+k)).</li>
</ul>
<table>
<tr><th>Algorithm</th><th>Best</th><th>Average</th><th>Worst</th><th>Space</th><th>Stable</th></tr>
<tr><td>Bubble</td><td>O(n)</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>O(1)</td><td>yes</td></tr>
<tr><td>Selection</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>O(1)</td><td>no</td></tr>
<tr><td>Insertion</td><td>O(n)</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>O(1)</td><td>yes</td></tr>
<tr><td>Merge</td><td>$O(n&#92;log n)$</td><td>$O(n&#92;log n)$</td><td>$O(n&#92;log n)$</td><td>O(n)</td><td>yes</td></tr>
<tr><td>Quick</td><td>$O(n&#92;log n)$</td><td>$O(n&#92;log n)$</td><td>$O(n^2)$</td><td>$O(&#92;log n)$</td><td>no</td></tr>
<tr><td>Heap</td><td>$O(n&#92;log n)$</td><td>$O(n&#92;log n)$</td><td>$O(n&#92;log n)$</td><td>O(1)</td><td>no</td></tr>
</table>
<p>Comparison-sort lower bound: a decision tree over n! permutations has height $&#92;ge &#92;log_2(n!) = &#92;Omega(n&#92;log n)$ — counting/radix evade this by not comparing.</p>
<p><b>Quicksort partition trace</b> (Lomuto, pivot = last = 40): [29, 10, 14, 37, 40] → smaller elements swap forward → [29, 10, 14, 37, <b>40</b>] pivot lands at index 4; recurse on [29,10,14,37].</p>

<h2>Graphs</h2>
<p>G = (V, E); directed (edges ordered) or undirected; weighted or not. Handshaking lemma: sum of degrees = 2|E|. A <b>path</b> repeats no vertex; a <b>cycle</b> returns to its start; a <b>connected</b> undirected graph with |V|−1 edges and no cycle is a <b>tree</b>.</p>
<table>
<tr><th></th><th>Adjacency matrix</th><th>Adjacency list</th></tr>
<tr><td>Space</td><td>$O(V^2)$</td><td>O(V+E)</td></tr>
<tr><td>Edge (u,v)?</td><td>O(1)</td><td>O(deg u)</td></tr>
<tr><td>Enumerate neighbours</td><td>O(V)</td><td>O(deg u)</td></tr>
<tr><td>Best for</td><td>dense graphs</td><td>sparse graphs</td></tr>
</table>
<h3>Traversal &amp; classic algorithms</h3>
<ul>
<li><b>BFS</b> — queue; visits in distance order → shortest paths in <i>unweighted</i> graphs; O(V+E).</li>
<li><b>DFS</b> — stack/recursion; yields <b>topological sort</b> (reverse postorder on a DAG) and cycle detection (back edge); O(V+E).</li>
<li><b>Dijkstra</b> — greedy single-source shortest paths, non-negative weights; with a binary heap $O((V+E)&#92;log V)$. Fails with negative edges → <b>Bellman-Ford</b> O(VE) handles them and detects negative cycles.</li>
<li><b>Floyd-Warshall</b> — all-pairs shortest paths by DP, $O(V^3)$.</li>
<li><b>MST</b> — <b>Prim</b> grows one tree (heap, like Dijkstra); <b>Kruskal</b> sorts edges and unions components (union-find), $O(E&#92;log E)$. Both rely on the cut property; MST is unique if all edge weights are distinct.</li>
</ul>
<blockquote>Exam traps: binary search needs sorted + random access (not linked lists); quicksort's worst case is sorted input; merge sort for linked lists / external sort; BFS (not DFS) gives unweighted shortest paths; Dijkstra breaks on negative weights; a connected graph with V−1 edges is a tree.</blockquote>`,

"dsa-cx": `<h2>Measuring algorithms</h2>
<p>We count basic operations as a function of input size n, on the worst case unless stated. Constants and machine speed are ignored — what matters is the <b>growth rate</b>.</p>

<h2>Asymptotic notation — definitions</h2>
<ul>
<li>$f(n) = O(g(n))$: ∃ c, $n_0$ &gt; 0 with $f(n) &#92;le c&#92;,g(n)$ for all $n &#92;ge n_0$ — upper bound.</li>
<li>$f(n) = &#92;Omega(g(n))$: $f(n) &#92;ge c&#92;,g(n)$ eventually — lower bound.</li>
<li>$f(n) = &#92;Theta(g(n))$: both hold — tight bound.</li>
<li>Little-o: strictly slower growth, $&#92;lim f/g = 0$.</li>
</ul>
<p><b>Worked proof:</b> show $3n^2 + 5n + 7 = O(n^2)$. For $n &#92;ge 1$: $3n^2+5n+7 &#92;le 3n^2+5n^2+7n^2 = 15n^2$, so c = 15, $n_0 = 1$. ∎</p>
<p>Growth order: $1 &#92;lt &#92;log n &#92;lt &#92;sqrt{n} &#92;lt n &#92;lt n&#92;log n &#92;lt n^2 &#92;lt n^3 &#92;lt 2^n &#92;lt n!$. Note $&#92;log_a n = &#92;Theta(&#92;log_b n)$ — log base never matters in Big-O.</p>

<h2>Analysing code — patterns</h2>
<table>
<tr><th>Pattern</th><th>Cost</th></tr>
<tr><td>i = 1..n single loop</td><td>O(n)</td></tr>
<tr><td>nested i, j = 1..n</td><td>$O(n^2)$</td></tr>
<tr><td>inner loop j = 1..i (triangular)</td><td>$&#92;sum i = n(n+1)/2 = O(n^2)$</td></tr>
<tr><td>i doubles: i = 1, 2, 4, … n</td><td>$O(&#92;log n)$</td></tr>
<tr><td>loop O(n) containing $O(&#92;log n)$ work</td><td>$O(n&#92;log n)$</td></tr>
</table>
<p>Sequential blocks add (keep the max); nested loops multiply. Best / worst / average cases can differ (insertion sort: O(n) / $O(n^2)$ / $O(n^2)$). <b>Amortised</b> cost averages over a sequence — dynamic-array push is O(1) amortised despite occasional O(n) resizes.</p>
<p><b>Space complexity</b> counts extra memory: merge sort O(n); quicksort $O(&#92;log n)$ stack; recursion depth always consumes stack space.</p>

<h2>Recursion &amp; recurrences</h2>
<p>Every recursive algorithm has a base case + self-call on smaller input. Its cost is a recurrence; three ways to solve:</p>
<ul>
<li><b>Substitution</b> — guess, prove by induction.</li>
<li><b>Recursion tree</b> — sum work per level. Merge sort: $&#92;log n$ levels × cn each = $&#92;Theta(n&#92;log n)$.</li>
<li><b>Master Theorem</b> for $T(n) = a&#92;,T(n/b) + f(n)$, comparing $f(n)$ with $n^{&#92;log_b a}$:</li>
</ul>
<table>
<tr><th>Case</th><th>Condition</th><th>Result</th><th>Example</th></tr>
<tr><td>1</td><td>$f(n)$ polynomially smaller</td><td>$&#92;Theta(n^{&#92;log_b a})$</td><td>$T = 8T(n/2) + n^2 &#92;Rightarrow &#92;Theta(n^3)$</td></tr>
<tr><td>2</td><td>$f(n) = &#92;Theta(n^{&#92;log_b a})$</td><td>$&#92;Theta(n^{&#92;log_b a}&#92;log n)$</td><td>$T = 2T(n/2) + n &#92;Rightarrow &#92;Theta(n&#92;log n)$</td></tr>
<tr><td>3</td><td>$f(n)$ polynomially larger (+ regularity)</td><td>$&#92;Theta(f(n))$</td><td>$T = 2T(n/2) + n^2 &#92;Rightarrow &#92;Theta(n^2)$</td></tr>
</table>
<p>Other staples: binary search $T(n)=T(n/2)+O(1)=&#92;Theta(&#92;log n)$; naive Fibonacci $T(n)=T(n-1)+T(n-2)+O(1) = O(2^n)$ — exponential, the classic motivation for DP; factorial-style $T(n)=T(n-1)+O(1)=&#92;Theta(n)$.</p>
<p><b>Recursion vs iteration:</b> recursion is clearer for self-similar problems (trees, divide-and-conquer) but pays function-call overhead and risks stack overflow; any recursion can be converted to iteration with an explicit stack. <b>Tail recursion</b> can be optimised into a loop. <b>Tower of Hanoi:</b> moves $M(n) = 2M(n-1)+1 = 2^n - 1$.</p>
<blockquote>Exam traps: log base is irrelevant in Big-O; triangular nested loop is still $O(n^2)$; Big-O is an upper bound, not "exact" (that's Θ); naive Fibonacci is exponential; Hanoi is $2^n - 1$ moves; check Master Theorem case 2 first — it's the most common.</blockquote>`,

"dsa-para": `<h2>Three design paradigms</h2>
<p>Examiners ask you to <i>classify</i> algorithms and to know <i>why</i> a paradigm applies. The deciding properties:</p>
<ul>
<li><b>Optimal substructure</b> — optimal solution contains optimal solutions to subproblems (needed by D&amp;C, greedy <i>and</i> DP).</li>
<li><b>Overlapping subproblems</b> — the same subproblem recurs (DP's signature; D&amp;C subproblems are independent).</li>
<li><b>Greedy-choice property</b> — a locally best choice is always safe (greedy's signature).</li>
</ul>

<h2>Divide and conquer</h2>
<p>Divide → conquer recursively → combine. Subproblems are <b>disjoint</b>, so nothing is recomputed. Examples and recurrences:</p>
<table>
<tr><th>Algorithm</th><th>Recurrence</th><th>Time</th></tr>
<tr><td>Binary search</td><td>T(n/2) + O(1)</td><td>$&#92;Theta(&#92;log n)$</td></tr>
<tr><td>Merge sort</td><td>2T(n/2) + O(n)</td><td>$&#92;Theta(n&#92;log n)$</td></tr>
<tr><td>Quick sort (avg)</td><td>2T(n/2) + O(n)</td><td>$&#92;Theta(n&#92;log n)$</td></tr>
<tr><td>Strassen multiply</td><td>7T(n/2) + $O(n^2)$</td><td>$&#92;Theta(n^{2.81})$</td></tr>
</table>

<h2>Greedy</h2>
<p>Commit to the locally optimal choice, never backtrack. Fast and simple — but only correct when the greedy-choice property holds (usually proved by an exchange argument).</p>
<ul>
<li><b>Activity selection</b> — pick the activity finishing earliest, repeat → maximum compatible set.</li>
<li><b>Fractional knapsack</b> — sort by value/weight, take greedily (fractions allowed) → optimal.</li>
<li><b>Huffman coding</b> — repeatedly merge the two least-frequent symbols into one node; yields an optimal prefix code. <i>Mini-example:</i> frequencies A:45 B:13 C:12 D:16 E:9 F:5 → merge F+E(14), then C+B(25), then 14+D(30), 25+30(55), 45+55(100); A gets a 1-bit code, rare symbols longer ones.</li>
<li><b>Dijkstra, Prim, Kruskal</b> — graph greedies (see Graphs).</li>
<li><b>Coin change</b> — greedy works for canonical coin systems (1, 5, 10, 25) but <i>fails</i> in general (coins {1, 3, 4}, amount 6: greedy 4+1+1 = 3 coins; optimal 3+3 = 2) — a classic counterexample question.</li>
</ul>

<h2>Dynamic programming</h2>
<p>For optimal substructure <b>plus overlapping subproblems</b>: solve each subproblem once, store it. <b>Memoisation</b> = top-down recursion + cache; <b>tabulation</b> = bottom-up table fill.</p>
<p><b>Fibonacci:</b> naive recursion is $O(2^n)$; DP stores F(0..n) → O(n).</p>
<p><b>0/1 knapsack:</b> items with weight w and value v, capacity W; you take an item whole or not at all. Recurrence:</p>
$$V[i][w] = &#92;max&#92;big(V[i-1][w],&#92;; v_i + V[i-1][w - w_i]&#92;big)$$
<p><i>Mini-table:</i> items (w,v) = (1,1), (3,4), (4,5), W = 7 → best = 4 + 5 = 9 by taking items 2 and 3; greedy by ratio would also need checking — only DP guarantees it. Complexity O(nW) (pseudo-polynomial).</p>
<p>Other staples: <b>LCS</b> (longest common subsequence, O(mn) table), <b>matrix-chain multiplication</b> (best parenthesisation), <b>Bellman-Ford</b>, <b>Floyd-Warshall</b>, <b>edit distance</b>.</p>

<h2>Greedy vs DP vs D&amp;C</h2>
<table>
<tr><th></th><th>D&amp;C</th><th>Greedy</th><th>DP</th></tr>
<tr><td>Subproblems</td><td>independent</td><td>one per step</td><td>overlapping</td></tr>
<tr><td>Choices</td><td>none (fixed split)</td><td>one, irrevocable</td><td>try all, keep best</td></tr>
<tr><td>Optimality</td><td>n/a</td><td>only with greedy-choice property</td><td>guaranteed when applicable</td></tr>
<tr><td>Signature problem</td><td>merge sort</td><td>fractional knapsack</td><td>0/1 knapsack</td></tr>
</table>
<p><b>Backtracking / branch-and-bound</b> (related paradigms): explore a solution tree, pruning impossible (backtracking — N-queens) or provably suboptimal (B&amp;B — TSP) branches.</p>
<blockquote>Exam traps: fractional knapsack = greedy, 0/1 = DP; coin-change greedy counterexample {1,3,4}; Huffman is greedy and optimal; DP needs overlapping subproblems — merge sort has none, so it's D&amp;C not DP; knapsack DP is O(nW), pseudo-polynomial.</blockquote>`,

"db-model": `<h2>DBMS vs file system</h2>
<p>A <b>DBMS</b> centralises data with controlled redundancy, integrity constraints, concurrent access, security and recovery — fixing the file-system problems of duplication, inconsistency and program-data dependence. The <b>three-schema architecture</b> separates <i>external</i> (user views), <i>conceptual</i> (logical design) and <i>internal</i> (storage) levels, giving <b>logical and physical data independence</b>. Users: DBA, designers, end users; languages: DDL, DML, DCL.</p>

<h2>ER modelling</h2>
<ul>
<li><b>Entity set</b> (rectangle), <b>attribute</b> (oval: simple, composite, multivalued — double oval, derived — dashed), <b>relationship</b> (diamond).</li>
<li><b>Cardinality</b>: 1:1, 1:N, M:N; <b>participation</b>: total (double line) vs partial.</li>
<li><b>Weak entity</b> (double rectangle) — no key of its own; identified through its owner via an identifying relationship; has a <i>partial key</i>.</li>
<li><b>Mapping to tables</b>: strong entity → table; 1:N → foreign key on the N side; <b>M:N → separate junction table</b> whose key is the pair of foreign keys; multivalued attribute → separate table.</li>
</ul>

<h2>Keys</h2>
<table>
<tr><th>Key</th><th>Definition</th></tr>
<tr><td>Super key</td><td>any attribute set that uniquely identifies tuples</td></tr>
<tr><td>Candidate key</td><td>a <i>minimal</i> super key (no removable attribute)</td></tr>
<tr><td>Primary key</td><td>the chosen candidate key — unique + NOT NULL</td></tr>
<tr><td>Alternate key</td><td>candidate keys not chosen</td></tr>
<tr><td>Foreign key</td><td>references a primary key elsewhere → referential integrity</td></tr>
</table>
<p>Integrity rules: <b>entity integrity</b> (no NULL in primary key) and <b>referential integrity</b> (FK matches an existing PK or is NULL).</p>

<h2>Functional dependencies &amp; normalization</h2>
<p>X → Y means X-values determine Y-values. Armstrong's axioms (reflexivity, augmentation, transitivity) derive all implied FDs; the <b>closure</b> X⁺ finds everything X determines — used to test candidate keys.</p>
<p><b>Worked example.</b> Relation R(StudentID, Course, Instructor, InstructorPhone, Grade) with FDs: (StudentID, Course) → Grade; Course → Instructor; Instructor → InstructorPhone.</p>
<ul>
<li><b>1NF</b> — already atomic. Key = (StudentID, Course).</li>
<li><b>2NF</b> — Course → Instructor is a <i>partial</i> dependency (Course is part of the key). Split: ENROL(StudentID, Course, Grade), COURSE(Course, Instructor, InstructorPhone).</li>
<li><b>3NF</b> — in COURSE, Course → Instructor → InstructorPhone is <i>transitive</i>. Split: COURSE(Course, Instructor), INSTRUCTOR(Instructor, InstructorPhone).</li>
<li><b>BCNF</b> — for every nontrivial FD X → Y, X must be a super key. Stricter than 3NF; the gap appears with overlapping candidate keys.</li>
</ul>
<p>Why: unnormalised tables suffer <b>insertion, deletion and update anomalies</b> (can't add a course without a student; deleting the last enrolment loses the instructor's phone; updating a phone in many rows risks inconsistency). <b>4NF</b> removes multivalued dependencies. Lossless-join and dependency preservation are the decomposition quality criteria; occasionally one <b>denormalises</b> for read performance.</p>

<h2>Relational algebra (query foundations)</h2>
<p>σ select (rows), π project (columns), ⋈ natural join, × cartesian product, ∪ ∩ −, ρ rename. SQL is declarative sugar over these.</p>

<h2>SQL essentials</h2>
<pre><code>-- DDL
CREATE TABLE enrol (
  sid INT, course VARCHAR(10), grade CHAR(2),
  PRIMARY KEY (sid, course),
  FOREIGN KEY (course) REFERENCES course(cid)
);

-- DML: top scorers per course with &gt; 1 student
SELECT course, MAX(grade) AS top, COUNT(*) AS n
FROM   enrol
WHERE  grade IS NOT NULL
GROUP BY course
HAVING COUNT(*) &gt; 1
ORDER BY course;

-- join + subquery
SELECT s.name FROM student s
JOIN   enrol e ON e.sid = s.sid
WHERE  e.course IN (SELECT cid FROM course WHERE dept = 'CS');</code></pre>
<ul>
<li><b>WHERE vs HAVING</b> — WHERE filters rows before grouping; HAVING filters groups after aggregation.</li>
<li><b>Joins</b> — INNER (matches only), LEFT/RIGHT OUTER (keep unmatched side with NULLs), FULL OUTER, CROSS, self-join.</li>
<li>Aggregates ignore NULLs; <code>COUNT(*)</code> counts rows, <code>COUNT(col)</code> counts non-NULLs. NULL comparisons need <code>IS NULL</code> — three-valued logic.</li>
<li><b>Views</b> — stored queries; <b>GRANT/REVOKE</b> — DCL security.</li>
</ul>

<h2>Indexing</h2>
<p>An index trades write speed and space for fast lookups. <b>B+ tree</b> (the default): balanced multi-way tree, data in linked leaves → $O(&#92;log n)$ point lookups <i>and</i> efficient range scans. <b>Hash index</b>: O(1) equality only — no ranges. Primary/clustering index orders the file itself; secondary indexes are dense pointers. Index the columns used in WHERE/JOIN; avoid indexing tiny or write-hot tables.</p>
<blockquote>Exam traps: candidate = <i>minimal</i> super key; 2NF kills partial, 3NF kills transitive dependencies, BCNF demands every determinant be a super key; M:N needs a junction table; WHERE ≠ HAVING; B+ tree supports ranges, hash doesn't; NULL ≠ NULL in comparisons.</blockquote>`,

"db-tx": `<h2>Transactions</h2>
<p>A <b>transaction</b> is an atomic unit of work, ending in <b>COMMIT</b> (make permanent) or <b>ROLLBACK</b> (undo). States: active → partially committed → committed, or → failed → aborted.</p>
<table>
<tr><th>ACID</th><th>Meaning</th><th>Enforced by</th></tr>
<tr><td>Atomicity</td><td>all or nothing</td><td>recovery manager (log/undo)</td></tr>
<tr><td>Consistency</td><td>valid state → valid state</td><td>constraints + correct transactions</td></tr>
<tr><td>Isolation</td><td>as if executed alone</td><td>concurrency control</td></tr>
<tr><td>Durability</td><td>committed = permanent</td><td>log + stable storage</td></tr>
</table>

<h2>Why concurrency control — the anomalies</h2>
<p>Interleave T1 (transfer) and T2 (read both accounts) carelessly and you get:</p>
<ul>
<li><b>Lost update</b> — two transactions read the same value, both write; one write vanishes. (T1 reads X=100, T2 reads X=100, T1 writes 110, T2 writes 120 — the +10 is lost.)</li>
<li><b>Dirty read</b> — T2 reads T1's uncommitted write; T1 aborts → T2 used a value that never existed.</li>
<li><b>Unrepeatable read</b> — T1 reads X twice, T2 updates X in between: different answers.</li>
<li><b>Phantom read</b> — a re-run query returns new rows inserted by another transaction.</li>
</ul>
<p>SQL isolation levels trade safety for speed: READ UNCOMMITTED → READ COMMITTED → REPEATABLE READ → SERIALIZABLE (each level removes the next anomaly).</p>

<h2>Serializability</h2>
<p>A schedule is correct if <b>conflict-serializable</b>: equivalent to some serial order by swapping non-conflicting operations (two ops conflict if same data item, different transactions, at least one write). <b>Test:</b> build the <b>precedence graph</b> — edge Ti → Tj if Ti's op conflicts with and precedes Tj's. Acyclic ⇔ conflict-serializable; the topological order gives the equivalent serial schedule.</p>
<p><i>Example:</i> S: R1(X) W2(X) W1(X). Conflicts give 1→2 (R1 before W2) and 2→1 (W2 before W1) — cycle → not serializable.</p>

<h2>Locking &amp; 2PL</h2>
<ul>
<li><b>Shared (S)</b> lock to read — many holders; <b>exclusive (X)</b> lock to write — sole holder. S is compatible with S only.</li>
<li><b>Two-Phase Locking</b> — every transaction has a growing phase (acquire only) then a shrinking phase (release only). Guarantees conflict-serializability.</li>
<li><b>Strict 2PL</b> — hold X-locks until commit → no dirty reads, no cascading rollback; the practical standard.</li>
<li>Lock granularity (row/page/table) and intention locks balance overhead vs concurrency.</li>
</ul>
<h3>Deadlock</h3>
<p>T1 holds A wants B; T2 holds B wants A. Handling: <b>prevention</b> via timestamp schemes — <i>wait-die</i> (older waits, younger dies) and <i>wound-wait</i> (older wounds younger); <b>detection</b> — cycle in the waits-for graph, abort a victim; timeouts. <b>Timestamp ordering</b> and optimistic (validation-based) control are lock-free alternatives; MVCC lets readers see snapshots so reads never block writes.</p>

<h2>Crash recovery</h2>
<p>Buffered pages may be lost (volatile) while committed effects must survive. The <b>log</b> records &lt;Ti, X, old, new&gt; entries; <b>Write-Ahead Logging</b>: the log record reaches disk <i>before</i> the data page.</p>
<ul>
<li><b>Deferred update</b> — write data only after commit → REDO only.</li>
<li><b>Immediate update</b> — may write before commit → UNDO uncommitted + REDO committed.</li>
<li><b>Checkpoint</b> — flush buffers, mark the log; recovery replays only from the last checkpoint.</li>
<li><b>Shadow paging</b> — copy-on-write page table; atomic switch at commit; no log but poor concurrency.</li>
</ul>
<blockquote>Exam traps: precedence-graph cycle = not serializable; 2PL guarantees serializability but <i>not</i> deadlock-freedom; strict 2PL prevents cascading rollback; WAL = log before data; deferred update needs no UNDO; lost update vs dirty read definitions are favourite MCQs.</blockquote>`,

"os-proc": `<h2>OS roles &amp; structure</h2>
<p>The OS is resource manager + extended machine: process, memory, file, I/O and protection management, accessed via <b>system calls</b> (fork, exec, read, write…). A <b>trap</b>/software interrupt switches user mode → kernel mode. Structures: monolithic (Linux), layered, <b>microkernel</b> (minimal kernel, services in user space), modular. <b>Dual mode</b> protects privileged instructions.</p>

<h2>Processes</h2>
<p>A process = program in execution: text, data, heap, stack + CPU context. The <b>PCB</b> stores PID, state, PC, registers, scheduling info, memory info, open files. States: <i>new → ready ⇄ running → terminated</i>, with running → <i>waiting</i> on I/O → ready. A <b>context switch</b> saves one PCB and loads another — pure overhead. <code>fork()</code> clones the caller (returns 0 in child, child-PID in parent); <code>exec()</code> replaces the image; a dead child not yet waited-on is a <b>zombie</b>; a child whose parent died is an <b>orphan</b>.</p>
<p><b>Threads</b> share code, data, heap and open files but own a stack + registers. Benefits: responsiveness, cheap creation/switching, easy sharing. Models: user-level (fast, but one block blocks all), kernel-level, many-to-many.</p>

<h2>CPU scheduling</h2>
<p>The dispatcher picks from the ready queue. <b>Preemptive</b> scheduling can interrupt a running process (RR, SRTF, preemptive priority); non-preemptive waits for it to yield (FCFS, SJF). Criteria: maximise CPU utilisation and throughput; minimise <b>turnaround</b> (finish − arrival), <b>waiting</b> (turnaround − burst), and response time.</p>
<p><b>Worked example.</b> Arrival/burst: P1(0, 8), P2(1, 4), P3(2, 2).</p>
<table>
<tr><th>Policy</th><th>Order (Gantt)</th><th>Avg waiting</th></tr>
<tr><td>FCFS</td><td>P1 0-8, P2 8-12, P3 12-14</td><td>(0 + 7 + 10)/3 = <b>5.67</b></td></tr>
<tr><td>SJF (non-pre.)</td><td>P1 0-8, P3 8-10, P2 10-14</td><td>(0 + 9 + 6)/3 = <b>5.0</b></td></tr>
<tr><td>SRTF (pre.)</td><td>P1 0-1, P2 1-2, P3 2-4, P2 4-7, P1 7-14</td><td>(6 + 2 + 0)/3 = <b>2.67</b></td></tr>
<tr><td>RR (q = 2)</td><td>P1 P2 P3 P1 P2 P1 P1 …</td><td>compute per slice — typical exam ask</td></tr>
</table>
<ul>
<li><b>FCFS</b> — convoy effect: one long job delays everyone.</li>
<li><b>SJF/SRTF</b> — provably minimal average waiting; needs burst prediction (exponential averaging); starves long jobs.</li>
<li><b>RR</b> — quantum q: too large → FCFS; too small → switch overhead dominates.</li>
<li><b>Priority</b> — starvation fixed by <b>aging</b>; <b>multilevel feedback queues</b> demote CPU hogs, favour interactive jobs.</li>
</ul>

<h2>Synchronization</h2>
<p>A <b>race condition</b>: result depends on interleaving (two threads doing <code>count++</code> — load, add, store — can lose an increment). The <b>critical-section problem</b> requires mutual exclusion, progress, bounded waiting. <b>Peterson's algorithm</b> solves it for two processes in software; hardware gives atomic <b>test-and-set</b> / compare-and-swap.</p>
<h3>Semaphores</h3>
<pre><code>wait(S):  while S &lt;= 0 ; S--;     // P — atomic
signal(S): S++;                    // V — atomic

/* producer-consumer, buffer size N */
sem mutex = 1, empty = N, full = 0;
Producer: wait(empty); wait(mutex); add(); signal(mutex); signal(full);
Consumer: wait(full);  wait(mutex); rem(); signal(mutex); signal(empty);</code></pre>
<p>Binary semaphore ≈ <b>mutex</b>; counting semaphores manage N resources. Busy-wait (<b>spinlock</b>) vs blocking implementations. <b>Monitors</b> wrap the discipline in a language construct with condition variables. Classic problems: producer-consumer, <b>readers-writers</b> (readers share, writers exclusive — writer starvation variants), <b>dining philosophers</b> (deadlock if all grab left forks; fix via ordering or limiting to 4).</p>
<h3>Deadlock</h3>
<p>All four Coffman conditions must hold: <b>mutual exclusion, hold-and-wait, no preemption, circular wait</b>.</p>
<ul>
<li><b>Prevention</b> — break one condition (e.g. global lock ordering kills circular wait).</li>
<li><b>Avoidance</b> — <b>Banker's algorithm</b>: grant a request only if the resulting state is <i>safe</i> (some completion order exists given Max/Allocation/Need matrices).</li>
<li><b>Detection</b> — cycle in the resource-allocation graph (with single instances, cycle ⇔ deadlock); recover by aborting/preempting.</li>
</ul>
<blockquote>Exam traps: compute waiting = turnaround − burst; SJF is optimal for average waiting; quantum→∞ turns RR into FCFS; the four deadlock conditions are necessary <i>together</i>; in the producer-consumer code, swapping wait(mutex) before wait(empty) can deadlock; threads share heap but not stacks.</blockquote>`,

"os-mem": `<h2>Background</h2>
<p>CPU-visible <b>logical addresses</b> are translated to physical by the <b>MMU</b>; the simplest scheme is base + limit relocation. Binding can happen at compile, load or run time (run-time binding enables swapping/paging). <b>Swapping</b> moves whole processes to disk under pressure.</p>

<h2>Contiguous allocation</h2>
<p>Fixed partitions waste space inside (<b>internal fragmentation</b>); variable partitions leave scattered holes (<b>external fragmentation</b>). Placement: first fit (fast), best fit (smallest hole — tiny slivers), worst fit. <b>Compaction</b> shuffles memory to merge holes — costly. The <b>50% rule</b>: roughly a third of memory may be lost to external fragmentation.</p>

<h2>Paging</h2>
<p>Divide physical memory into <b>frames</b> and logical memory into equal <b>pages</b> (e.g. 4 KB). Logical address = (page number p, offset d); the <b>page table</b> maps p → frame f; physical = f × pagesize + d.</p>
<p><i>Worked example:</i> 16-bit logical address, 4 KB pages → offset = 12 bits, page number = 4 bits (16 pages). Address 0x2ABC → page 2, offset 0xABC; if page 2 → frame 5, physical = 0x5ABC.</p>
<ul>
<li>Kills external fragmentation; leaves average half-page <b>internal</b> fragmentation per process.</li>
<li>Page table per process; large spaces need <b>multi-level</b> page tables, hashed, or inverted tables.</li>
<li><b>TLB</b> caches translations. Effective access time with TLB: $EAT = h(t_{TLB} + t_m) + (1-h)(t_{TLB} + 2t_m)$. E.g. h = 0.9, TLB 10 ns, memory 100 ns → EAT = 0.9(110) + 0.1(210) = <b>120 ns</b>.</li>
<li>Protection bits (R/W/X, valid) per entry; <b>shared pages</b> let processes share read-only code.</li>
</ul>
<p><b>Segmentation</b> divides by logical unit (code, data, stack) with (segment, offset) addresses and a segment table (base, limit) — matches programmer view, suffers external fragmentation; x86 historically combined segmentation + paging.</p>

<h2>Virtual memory</h2>
<p><b>Demand paging</b> loads a page only on first touch. A reference to an invalid entry traps as a <b>page fault</b>: OS finds the page on disk, picks a victim frame, swaps in, updates tables, restarts the instruction.</p>
<p>Effective access time: $EAT = (1-p)&#92;,t_m + p &#92;cdot t_{fault}$. With $t_m$ = 200 ns and $t_{fault}$ = 8 ms, even p = 1/1000 gives EAT ≈ 8.2 µs — 40× slowdown; fault rates must be tiny.</p>
<h3>Page replacement — worked trace</h3>
<p>Reference string 7 0 1 2 0 3 0 4 2 3 0 3 2, <b>3 frames</b>:</p>
<table>
<tr><th>Policy</th><th>Idea</th><th>Faults</th></tr>
<tr><td>FIFO</td><td>evict oldest arrival</td><td><b>10</b></td></tr>
<tr><td>OPT</td><td>evict the page used farthest in future</td><td><b>7</b> (lower bound)</td></tr>
<tr><td>LRU</td><td>evict least recently used</td><td><b>9</b></td></tr>
</table>
<p><b>Belady's anomaly</b>: FIFO can fault <i>more</i> with more frames (string 1 2 3 4 1 2 5 1 2 3 4 5: 9 faults @3 frames, 10 @4). LRU and OPT are <b>stack algorithms</b> — immune. LRU is approximated in hardware by reference bits / second-chance (clock) algorithm.</p>
<h3>Frame allocation &amp; thrashing</h3>
<p>Global vs local replacement; equal vs proportional allocation. <b>Thrashing</b>: too few frames → constant faulting → CPU idles → scheduler adds more jobs → worse. Fix with the <b>working-set model</b> (keep each process's recently-touched pages resident) or page-fault-frequency control. <b>Copy-on-write</b> makes fork() cheap.</p>

<h2>File systems &amp; disks</h2>
<ul>
<li>Allocation: <b>contiguous</b> (fast, fragments), <b>linked</b> (no fragmentation, bad random access; FAT centralises the links), <b>indexed</b> (inode points to blocks; Unix inodes add single/double/triple indirect blocks for big files).</li>
<li>Free-space: bitmap or free list. Directories: linear list vs hash.</li>
<li><b>Disk scheduling</b> for queue 98 183 37 122 14 124 65 67, head at 53: FCFS = 640 cylinders; <b>SSTF</b> = 236; <b>SCAN</b> (elevator) sweeps to an end; <b>C-SCAN</b> returns without serving — uniform wait; LOOK/C-LOOK reverse at the last request.</li>
</ul>
<blockquote>Exam traps: paging removes external, not internal, fragmentation; offset bits = log2(page size); Belady's anomaly is FIFO-only; OPT is unrealisable but the benchmark; EAT formulas (TLB and page-fault versions) are standard numericals; inode indirect blocks extend max file size.</blockquote>`,

"os-app": `<h2>The OS as a platform</h2>
<p>Applications never touch hardware directly; they call <b>APIs</b> (libc, Win32, POSIX) which wrap <b>system calls</b>. The call traps to kernel mode, the kernel performs the privileged work, and returns. System-call categories: process control (fork, exit), file (open, read), device, information, communication (pipe, socket), protection.</p>
<table>
<tr><th>User mode</th><th>Kernel mode</th></tr>
<tr><td>application code, libraries</td><td>scheduler, drivers, memory manager</td></tr>
<tr><td>restricted instructions</td><td>privileged instructions (I/O, MMU, interrupts)</td></tr>
</table>

<h2>System programs vs application programs</h2>
<ul>
<li><b>System software</b> — serves the machine/other programs: OS, compilers, assemblers, linkers, loaders, shells, utilities, device drivers.</li>
<li><b>Application software</b> — serves the user's task: office suites, browsers, DBMS front-ends, CAD, media tools. Packaged vs custom-built.</li>
<li>The <b>shell</b> (CLI) and GUI are just user-level programs that issue system calls.</li>
</ul>

<h2>From source code to a running process</h2>
<ol>
<li><b>Compiler</b> — source → object module (machine code with unresolved references).</li>
<li><b>Linker</b> — combines object modules + libraries, resolves symbols → executable. <i>Static</i> linking copies libraries in; <i>dynamic</i> linking (DLL/.so) defers to load/run time — smaller binaries, shared in memory, upgradable.</li>
<li><b>Loader</b> — allocates the address space, copies segments, sets up stack and registers, jumps to entry point.</li>
</ol>
<p>Related services: <b>buffering</b> (smooth speed mismatch), <b>spooling</b> (queue whole jobs, e.g. print spooler), <b>caching</b>, <b>interpreters</b> vs compilers, and <b>virtual machines</b>/containers that multiplex whole OS environments.</p>

<h2>Types of systems</h2>
<table>
<tr><th>Type</th><th>Characteristic / example</th></tr>
<tr><td>Batch</td><td>jobs queued offline, no interaction; maximise throughput</td></tr>
<tr><td>Multiprogramming</td><td>keep CPU busy by overlapping jobs' I/O and compute</td></tr>
<tr><td>Time-sharing</td><td>multiprogramming + rapid switching for interactive users</td></tr>
<tr><td>Real-time</td><td>deadlines: hard (flight control) vs soft (media)</td></tr>
<tr><td>Distributed</td><td>networked machines cooperating; transparency goals</td></tr>
<tr><td>Embedded / mobile</td><td>resource-constrained, power-aware</td></tr>
</table>

<h2>Computer applications (survey)</h2>
<p>Scientific/engineering computing, business data processing, education, entertainment, communication, healthcare, e-governance. The OS underpins all of them by multiplexing CPU, memory, storage and I/O safely among competing programs.</p>
<blockquote>Exam traps: compiler → linker → loader order; dynamic linking saves memory via shared libraries; spooling vs buffering distinction; multiprogramming (CPU utilisation) vs time-sharing (response time) motivations; a shell is a user program, not part of the kernel.</blockquote>`,

"net-phy": `<h2>Reference models</h2>
<table>
<tr><th>OSI layer</th><th>Unit</th><th>Job</th><th>Examples</th></tr>
<tr><td>7 Application</td><td>data</td><td>network services to apps</td><td>HTTP, FTP, SMTP, DNS</td></tr>
<tr><td>6 Presentation</td><td>data</td><td>format, encryption, compression</td><td>TLS (partly), JPEG</td></tr>
<tr><td>5 Session</td><td>data</td><td>dialog control, checkpoints</td><td>RPC, NetBIOS</td></tr>
<tr><td>4 Transport</td><td>segment</td><td>end-to-end delivery, ports</td><td>TCP, UDP</td></tr>
<tr><td>3 Network</td><td>packet</td><td>logical addressing, routing</td><td>IP, ICMP, OSPF</td></tr>
<tr><td>2 Data link</td><td>frame</td><td>node-to-node, MAC, error control</td><td>Ethernet, PPP, ARP</td></tr>
<tr><td>1 Physical</td><td>bit</td><td>signals on media</td><td>RS-232, 100BASE-T</td></tr>
</table>
<p>TCP/IP compresses 7-5 into Application and 2-1 into Network Access. <b>Encapsulation</b>: each layer adds its header going down; the receiver strips them going up. OSI separates services/interfaces/protocols cleanly but TCP/IP won in practice.</p>

<h2>Data &amp; signals</h2>
<ul>
<li>Analog vs digital signals; bandwidth (Hz) vs data rate (bps).</li>
<li><b>Nyquist</b> (noiseless): $C = 2B &#92;log_2 L$ bps for L signal levels. B = 3 kHz, L = 4 → 12 kbps.</li>
<li><b>Shannon</b> (noisy): $C = B &#92;log_2(1 + S/N)$. B = 3 kHz, SNR = 1000 (30 dB) → ≈ 30 kbps — the hard ceiling.</li>
<li>Impairments: attenuation, distortion, noise. SNR(dB) = 10 log10(S/N).</li>
<li><b>Line coding</b>: NRZ (baseline wander, clock loss), <b>Manchester</b> (transition mid-bit = self-clocking, used by classic Ethernet, needs 2× bandwidth), differential Manchester.</li>
<li><b>Digital→analog</b>: ASK, FSK, PSK, and QAM (amplitude+phase — modems). <b>Analog→digital</b>: PCM = sample (Nyquist rate ≥ 2 f_max) → quantise → encode.</li>
</ul>

<h2>Transmission media</h2>
<table>
<tr><th>Medium</th><th>Notes</th></tr>
<tr><td>Twisted pair (UTP/STP)</td><td>cheap, Cat5e/6 to 1-10 Gbps over 100 m; twisting cancels crosstalk</td></tr>
<tr><td>Coaxial</td><td>better shielding; cable TV/broadband</td></tr>
<tr><td>Optical fibre</td><td>light in glass; single-mode (long haul) vs multimode; immune to EMI, highest capacity</td></tr>
<tr><td>Radio / microwave / satellite</td><td>unguided; microwave is line-of-sight; satellite high latency (~250 ms GEO)</td></tr>
</table>
<p><b>Multiplexing</b>: FDM (frequency slices), WDM (optical FDM), TDM (time slots — synchronous wastes idle slots, statistical doesn't). <b>Switching</b>: circuit switching (dedicated path, telephone), packet switching (store-and-forward — datagram like IP, or virtual-circuit like MPLS), message switching.</p>

<h2>Topologies, categories &amp; devices</h2>
<ul>
<li>Topologies: bus (one collision domain), star (hub/switch centre — modern LAN), ring, mesh ($n(n-1)/2$ links full mesh), tree, hybrid.</li>
<li>Scope: PAN → LAN → MAN → WAN; Internet = network of networks.</li>
<li>Devices by layer: repeater/hub (L1, regenerate/broadcast), bridge/switch (L2, MAC forwarding — each port its own collision domain), router (L3, joins networks — bounds broadcast domains), gateway (any layer, protocol translation).</li>
</ul>
<blockquote>Exam traps: layer order mnemonics; Shannon vs Nyquist (noise vs levels); Manchester is self-clocking at double bandwidth; a switch separates collision domains, a router separates broadcast domains; sampling at ≥ 2× highest frequency (Nyquist criterion).</blockquote>`,

"net-dll": `<h2>Framing &amp; services</h2>
<p>The DLL packages bits into <b>frames</b> (character count, byte stuffing with flag + escape, or bit stuffing — insert a 0 after five 1s so the 01111110 flag stays unique). Services: unacknowledged/acknowledged connectionless, connection-oriented. Sublayers: <b>LLC</b> (flow/error control) over <b>MAC</b> (channel access).</p>

<h2>Error detection &amp; correction</h2>
<ul>
<li><b>Parity</b> — detects odd numbers of bit errors only. 2-D parity catches more.</li>
<li><b>Checksum</b> — one's-complement sum (used by IP/TCP/UDP).</li>
<li><b>CRC</b> — treat bits as a polynomial, divide by a generator G(x) using XOR; append the remainder. Receiver divides again: nonzero remainder = error. <i>Worked example:</i> data 1101, G = 1011 (degree 3 → append 000): divide 1101000 by 1011 → remainder 001 → transmit 1101001. A CRC with degree-r generator catches all burst errors ≤ r bits.</li>
<li><b>Hamming code</b> — r parity bits protect m data bits if $2^r &#92;ge m + r + 1$ (for m = 4, r = 3 → the (7,4) code). Parity bits sit at positions 1, 2, 4, 8…; the failing parity checks' positions sum to the error position → single-error correction, double-error detection (with extra parity).</li>
</ul>

<h2>Flow control &amp; ARQ</h2>
<ul>
<li><b>Stop-and-wait ARQ</b> — one frame, await ACK; timer + 1-bit sequence numbers handle loss/duplication. Efficiency $= &#92;dfrac{1}{1 + 2a}$ where $a = t_{prop}/t_{frame}$ — terrible on long fat links.</li>
<li><b>Go-Back-N</b> — window of N outstanding frames; on error, retransmit from the lost frame. Receiver window = 1 (discards out-of-order). Sender window ≤ $2^k - 1$ for k-bit sequence numbers.</li>
<li><b>Selective Repeat</b> — receiver buffers out-of-order frames; only the lost one is resent. Both windows ≤ $2^{k-1}$.</li>
</ul>
<p><i>Numerical staple:</i> 1 Mbps link, 20 ms one-way delay, 1000-bit frames → $t_{frame}$ = 1 ms, a = 20; stop-and-wait efficiency = 1/41 ≈ 2.4%; a window ≥ 41 frames fills the pipe (bandwidth-delay product).</p>

<h2>Medium access control</h2>
<table>
<tr><th>Protocol</th><th>Idea</th><th>Max efficiency</th></tr>
<tr><td>Pure ALOHA</td><td>transmit anytime; collision → random backoff</td><td>18.4%</td></tr>
<tr><td>Slotted ALOHA</td><td>transmit only at slot starts</td><td>36.8%</td></tr>
<tr><td>CSMA/CD</td><td>listen first; abort on collision; binary exponential backoff</td><td>classic Ethernet</td></tr>
<tr><td>CSMA/CA</td><td>can't detect collisions on radio → avoid: wait, RTS/CTS</td><td>Wi-Fi 802.11</td></tr>
<tr><td>Token passing</td><td>only the token holder transmits</td><td>token ring, deterministic</td></tr>
</table>
