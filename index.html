<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Entrance · Study Hub</title>

<!-- KaTeX for math/electronics equations -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<!-- HK Grotesque requested; Hanken Grotesk is its freely-loadable open sibling (same designer) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..800;1,400..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME — warm "paper" light mode (default, easy on eyes for
   long reading) + soft warm "night" mode.
   ============================================================ */
:root{
  --font-body:'HK Grotesque','Hanken Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;

  --bg:#f3efe6;
  --bg-tint:#ece7da;
  --surface:#fbf9f3;
  --surface-2:#f6f2e8;
  --sidebar:#efeadf;
  --text:#2c2a25;
  --text-2:#6c675c;
  --text-3:#928c7e;
  --border:#e0d9c8;
  --border-soft:#e9e3d5;
  --shadow:0 1px 2px rgba(60,50,30,.06),0 8px 24px rgba(60,50,30,.05);
  --shadow-sm:0 1px 2px rgba(60,50,30,.07);

  --t1:#2f7d72;  --t1-soft:#dceae6;
  --t2:#4a6a9c;  --t2-soft:#dde4ef;
  --t3:#b06a3a;  --t3-soft:#f1e2d3;
  --t4:#6e7d4a;  --t4-soft:#e6ebd6;

  --done:#3f8e63;
  --wip:#c4912f;

  --radius:12px;
  --radius-sm:8px;
  --measure:68ch;
}
html[data-theme="night"]{
  --bg:#1a1815;
  --bg-tint:#211e1a;
  --surface:#211e1a;
  --surface-2:#26231e;
  --sidebar:#1e1b17;
  --text:#e8e3d6;
  --text-2:#a39c8b;
  --text-3:#7c7666;
  --border:#332f28;
  --border-soft:#2c2922;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.25);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);

  --t1:#5cb3a5;  --t1-soft:#1f322e;
  --t2:#7e9ed4;  --t2-soft:#222a36;
  --t3:#d99560;  --t3-soft:#352519;
  --t4:#a3b771;  --t4-soft:#272d1b;

  --done:#5fb585;
  --wip:#d9ad55;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  font-size:17px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  display:flex;
  min-height:100vh;
}
::selection{background:var(--t1-soft);color:var(--text)}

::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ============================================================ SIDEBAR ============================================================ */
#sidebar{
  width:340px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;transition:margin-left .28s ease;
}
.sb-head{padding:1.4rem 1.4rem 1rem;border-bottom:1px solid var(--border-soft)}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:800;letter-spacing:-.02em;font-size:1.05rem}
.brand .dot{width:11px;height:11px;border-radius:50%;
  background:conic-gradient(from 180deg,var(--t1),var(--t2),var(--t3),var(--t4),var(--t1));flex-shrink:0}
.brand small{display:block;font-weight:500;color:var(--text-2);font-size:.72rem;
  letter-spacing:.04em;text-transform:uppercase;margin-top:.15rem}
.search-wrap{position:relative;margin-top:1rem}
#search{width:100%;padding:.55rem .8rem .55rem 2.1rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);
  font-family:var(--font-body);font-size:.86rem;transition:border-color .15s,box-shadow .15s}
#search:focus{outline:none;border-color:var(--t1);box-shadow:0 0 0 3px var(--t1-soft)}
#search::placeholder{color:var(--text-3)}
.search-wrap svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-3);pointer-events:none}
.overall{margin-top:.95rem;font-size:.74rem;color:var(--text-2);
  display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.meter{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.meter span{display:block;height:100%;width:0;background:var(--t1);border-radius:6px;transition:width .4s ease}

.tree{flex:1;overflow-y:auto;padding:.6rem .6rem 3rem}
.tier{margin-bottom:.35rem;border-radius:var(--radius-sm);overflow:hidden}
.tier-head{display:flex;align-items:center;gap:.55rem;padding:.62rem .7rem;cursor:pointer;
  border-radius:var(--radius-sm);transition:background .12s;user-select:none}
.tier-head:hover{background:var(--surface-2)}
.tier-bar{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.tier-titles{flex:1;min-width:0}
.tier-titles b{font-size:.83rem;font-weight:700;letter-spacing:-.01em;display:block}
.tier-titles em{font-style:normal;font-size:.7rem;color:var(--text-2);display:block;margin-top:.05rem}
.tier-pct{font-size:.7rem;font-weight:600;color:var(--text-2);font-family:var(--font-mono)}
.chev{width:14px;height:14px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
.collapsed .chev{transform:rotate(-90deg)}
.tier-body{padding:.15rem .2rem .4rem .35rem}
.collapsed .tier-body{display:none}

.chapter{margin:.1rem 0}
.chapter-head{display:flex;align-items:center;gap:.45rem;padding:.4rem .55rem;cursor:pointer;
  border-radius:6px;font-size:.8rem;color:var(--text);transition:background .12s;user-select:none}
.chapter-head:hover{background:var(--surface-2)}
.chapter-head .code{font-family:var(--font-mono);font-size:.58rem;color:var(--text-3);
  margin-left:auto;flex-shrink:0;letter-spacing:.02em}
.chapter-head .chev{width:12px;height:12px}
.chapter-name{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chapter-body{padding-left:.55rem;margin-left:.35rem;border-left:1px solid var(--border-soft)}
.chapter.collapsed .chapter-body{display:none}

.topic{display:flex;align-items:center;gap:.5rem;padding:.34rem .55rem;margin:.05rem 0;cursor:pointer;
  border-radius:6px;font-size:.78rem;color:var(--text-2);transition:background .12s,color .12s;line-height:1.35}
.topic:hover{background:var(--surface-2);color:var(--text)}
.topic.active{background:var(--t1-soft);color:var(--text);font-weight:600}
.topic .status{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--text-3);background:transparent}
.topic[data-status="wip"] .status{background:var(--wip);border-color:var(--wip)}
.topic[data-status="done"] .status{background:var(--done);border-color:var(--done)}
.topic-name{flex:1;min-width:0}

/* ============================================================ MAIN ============================================================ */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:1rem;padding:.85rem 1.6rem;
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-soft)}
.menu-btn{display:none}
.crumbs{font-size:.78rem;color:var(--text-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crumbs b{color:var(--text);font-weight:600}
.topbar-actions{display:flex;gap:.5rem;align-items:center}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .7rem;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-family:var(--font-body);
  font-size:.76rem;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn:hover{color:var(--text);border-color:var(--text-3)}
.btn svg{width:14px;height:14px}

.content{flex:1;padding:2.6rem 2.2rem 6rem;max-width:calc(var(--measure) + 4.4rem);margin:0 auto;width:100%}

.welcome h1{font-size:2.1rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
.welcome .lede{color:var(--text-2);font-size:1.02rem;max-width:60ch;margin-bottom:2.2rem}
.tier-cards{display:grid;gap:.9rem}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;
  box-shadow:var(--shadow-sm);display:flex;gap:1rem;align-items:flex-start;cursor:pointer;
  transition:transform .14s,box-shadow .14s,border-color .14s}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--text-3)}
.tcard .badge{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:1.05rem;color:#fff}
.tcard-main{flex:1;min-width:0}
.tcard-main h3{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
.tcard-main p{font-size:.82rem;color:var(--text-2);margin:.2rem 0 .55rem}
.exam-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.exam-tag{font-size:.66rem;font-weight:600;padding:.12rem .45rem;border-radius:20px;background:var(--surface-2);
  color:var(--text-2);border:1px solid var(--border-soft)}
.tcard-pct{text-align:right;flex-shrink:0;min-width:54px}
.tcard-pct b{font-family:var(--font-mono);font-size:1.05rem;font-weight:500;display:block}
.tcard-pct small{font-size:.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.tcard .mini-meter{height:4px;background:var(--border);border-radius:4px;margin-top:.6rem;overflow:hidden}
.tcard .mini-meter span{display:block;height:100%;border-radius:4px;transition:width .4s}

.topic-view .eyebrow{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;font-size:.74rem;color:var(--text-2);margin-bottom:.7rem}
.pill{font-size:.66rem;font-weight:700;padding:.16rem .55rem;border-radius:20px;color:#fff;letter-spacing:.02em}
.ex-pill{font-family:var(--font-mono);font-size:.6rem;font-weight:500;color:var(--text-2);
  border:1px solid var(--border);padding:.08rem .4rem;border-radius:5px;letter-spacing:.03em}
.topic-view h1{font-size:1.85rem;font-weight:800;letter-spacing:-.025em;line-height:1.15;margin-bottom:1.2rem}
.status-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;padding:.7rem 0 1.4rem;margin-bottom:1.6rem;
  border-bottom:1px solid var(--border-soft)}
.status-row .lbl{font-size:.74rem;color:var(--text-2);margin-right:.2rem}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg button{border:none;background:var(--surface);color:var(--text-2);padding:.4rem .75rem;font-family:var(--font-body);
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .12s;border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button:hover{background:var(--surface-2);color:var(--text)}
.seg button.on[data-s="todo"]{background:var(--text-3);color:#fff}
.seg button.on[data-s="wip"]{background:var(--wip);color:#fff}
.seg button.on[data-s="done"]{background:var(--done);color:#fff}

.reading{font-size:1.04rem;line-height:1.78;color:var(--text)}
.reading > *{margin-bottom:1.1rem}
.reading h2{font-size:1.3rem;font-weight:700;letter-spacing:-.01em;margin:2rem 0 .8rem}
.reading h3{font-size:1.08rem;font-weight:700;margin:1.5rem 0 .6rem}
.reading p{max-width:var(--measure)}
.reading ul,.reading ol{padding-left:1.4rem;max-width:var(--measure)}
.reading li{margin-bottom:.4rem}
.reading code{font-family:var(--font-mono);font-size:.86em;background:var(--surface-2);padding:.1rem .35rem;
  border-radius:5px;border:1px solid var(--border-soft)}
.reading pre{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:1rem 1.1rem;overflow-x:auto;font-family:var(--font-mono);font-size:.84rem;line-height:1.6}
.reading pre code{background:none;border:none;padding:0}
.reading blockquote{border-left:3px solid var(--t1);padding:.3rem 0 .3rem 1rem;color:var(--text-2)}
.reading table{border-collapse:collapse;font-size:.9rem;width:100%}
.reading th,.reading td{border:1px solid var(--border);padding:.45rem .7rem;text-align:left}
.reading th{background:var(--surface-2);font-weight:700}

.placeholder{border:1.5px dashed var(--border);border-radius:var(--radius);padding:2.4rem 1.6rem;text-align:center;
  color:var(--text-3);background:repeating-linear-gradient(45deg,transparent,transparent 12px,var(--surface-2) 12px,var(--surface-2) 13px)}
.placeholder svg{width:34px;height:34px;margin-bottom:.7rem;color:var(--text-3)}
.placeholder b{display:block;color:var(--text-2);font-size:.95rem;margin-bottom:.3rem}
.placeholder span{font-size:.82rem}
.placeholder .how{margin-top:1.2rem;font-family:var(--font-mono);font-size:.72rem;color:var(--text-2);
  background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;display:inline-block;text-align:left}

.pager{display:flex;justify-content:space-between;gap:1rem;margin-top:3rem;padding-top:1.6rem;border-top:1px solid var(--border-soft)}
.pager a{flex:1;text-decoration:none;color:var(--text);border:1px solid var(--border);border-radius:var(--radius);
  padding:.8rem 1rem;transition:border-color .14s,transform .14s;background:var(--surface);display:block;min-width:0}
.pager a:hover{border-color:var(--text-3);transform:translateY(-1px)}
.pager a.next{text-align:right}
.pager small{font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;display:block}
.pager b{font-size:.86rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.pager a.disabled{opacity:.4;pointer-events:none}

.overlay{display:none}
@media (max-width:880px){
  #sidebar{position:fixed;z-index:50;box-shadow:var(--shadow)}
  #sidebar.hidden{margin-left:-340px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
  .overlay.show{display:block}
  .menu-btn{display:inline-flex}
  .content{padding:1.8rem 1.2rem 5rem}
  body{font-size:16px}
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-head">
    <div class="brand">
      <span class="dot"></span>
      <div>Study Hub<small>NEC · IOE · CSIT · KU</small></div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search topics…" autocomplete="off">
    </div>
    <div class="overall"><span>Overall progress</span>
      <span id="overallPct" style="font-family:var(--font-mono);font-weight:600;color:var(--text)">0%</span></div>
    <div class="meter"><span id="overallBar"></span></div>
  </div>
  <nav class="tree" id="tree"></nav>
</aside>
<div class="overlay" id="overlay"></div>

<div id="main">
  <div class="topbar">
    <button class="btn menu-btn" id="menuBtn" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="crumbs" id="crumbs">Welcome</div>
    <div class="topbar-actions">
      <button class="btn" id="themeBtn">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span id="themeLabel">Night</span>
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ============================================================
   CURRICULUM DATA   —   TIER -> CHAPTER -> TOPIC
   Each topic has an empty `c` (content) = skeleton.
   `exams` on each chapter lists which exams it serves.

   TO FILL CONTENT LATER, put HTML into a topic's `c`:
       c: `<h2>Heading</h2><p>Body, inline math $E=mc^2$.</p>
           $$\int_0^\infty e^{-x}\,dx = 1$$`
   HTML works directly · math via $...$ and $$...$$ (KaTeX)
   · code via <pre><code>...</code></pre>. Leave c:"" for placeholder.
   ============================================================ */

const CURRICULUM = [
  /* ---------------- TIER 1 ---------------- */
  {
    id:"t1", n:"Tier 1 — CS Core", sub:"The shared core · most chapters span multiple exams",
    color:"var(--t1)", soft:"var(--t1-soft)", exams:["NEC","IOE","CSIT","KU"],
    chapters:[
      { id:"prog", n:"Programming (C / C++ & OOP)", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"prog-c",   n:"Intro to C: tokens, operators, I/O, control, loops, functions, recursion, arrays, strings", c:""},
        {id:"prog-ptr", n:"Pointers, structures & data files in C", c:""},
        {id:"prog-cpp", n:"C++ constructs: classes, objects, access specifiers, constructors/destructors", c:""},
        {id:"prog-enc", n:"OOP concepts: encapsulation & abstraction", c:""},
        {id:"prog-oop", n:"Operator overloading, inheritance & polymorphism", c:""},
        {id:"prog-vfh", n:"Virtual functions & file handling", c:""},
        {id:"prog-gen", n:"Templates, STL & exception handling", c:""},
      ]},
      { id:"dsa", n:"Data Structures & Algorithms", exams:["NEC","CSIT","KU"], topics:[
        {id:"dsa-list", n:"Data structures, lists, linked lists & trees", c:""},
        {id:"dsa-sort", n:"Sorting, searching & graphs", c:""},
        {id:"dsa-cx",   n:"Complexity (Big-O / Ω / Θ), recursion", c:""},
        {id:"dsa-para", n:"Greedy · divide-and-conquer · dynamic programming (conceptual)", c:""},
      ]},
      { id:"db", n:"DBMS", exams:["NEC","CSIT","KU"], topics:[
        {id:"db-model", n:"Data models, ER, normalization (1NF–BCNF) & SQL", c:""},
        {id:"db-tx",    n:"Transactions, ACID, concurrency control & crash recovery", c:""},
      ]},
      { id:"os", n:"Operating Systems", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"os-proc", n:"OS intro & process management (processes, threads, scheduling, synchronization)", c:""},
        {id:"os-mem",  n:"Memory management, virtual memory, file systems & administration", c:""},
        {id:"os-app",  n:"OS & application program concepts; computer applications", c:""},
      ]},
      { id:"net", n:"Computer Networks", exams:["NEC","IOE","CSIT","KU"], topics:[
        {id:"net-phy",  n:"Intro & physical layer (OSI vs TCP/IP, devices, media)", c:""},
        {id:"net-dll",  n:"Data link layer (error/flow control, MAC, Ethernet, ARP)", c:""},
        {id:"net-ip",   n:"Network layer (IP addressing, subnetting, routing, IPv6)", c:""},
        {id:"net-tcp",  n:"Transport layer (TCP/UDP, ports, congestion control)", c:""},
        {id:"net-app",  n:"Application layer (HTTP, DNS, FTP, email, sockets, analyzers)", c:""},
      ]},
      { id:"coa", n:"Computer Org & Digital Logic", exams:["NEC","IOE","CSIT"], topics:[
        {id:"coa-fund", n:"Fundamentals of computer architecture & organization", c:""},
        {id:"coa-dl",   n:"Digital logic: number systems, Boolean algebra, gates, K-map", c:""},
        {id:"coa-comb", n:"Combinational & arithmetic circuits (MUX, decoder, adders)", c:""},
        {id:"coa-seq",  n:"Sequential logic: flip-flops, registers, counters", c:""},
        {id:"coa-mp",   n:"Microprocessor: architecture & assembly programming", c:""},
        {id:"coa-mpsys",n:"Microprocessor system: memory, I/O interface, DMA", c:""},
        {id:"coa-int",  n:"Interrupt operations (ISR, interrupt processing)", c:""},
        {id:"coa-cpu",  n:"Control & CPU: instruction set, addressing, RISC/CISC, pipelining", c:""},
        {id:"coa-mem",  n:"Computer arithmetic & memory system (cache, hierarchy)", c:""},
        {id:"coa-io",   n:"I/O organization & multiprocessor", c:""},
        {id:"coa-emb",  n:"Embedded systems: HW/SW design issues, ASIP", c:""},
        {id:"coa-rtos", n:"Real-time OS & control systems", c:""},
        {id:"coa-vhdl", n:"HDL & IC technology (VHDL)", c:""},
      ]},
      { id:"toc", n:"Theory of Computation", exams:["NEC","IOE","CSIT"], topics:[
        {id:"toc-fa",  n:"Finite automata, FSM, regular expressions, pumping lemma", c:""},
        {id:"toc-cfg", n:"Context-free grammar, parse trees, PDA, CNF/GNF/BNF", c:""},
        {id:"toc-tm",  n:"Turing machines, decidability, complexity, intractability", c:""},
      ]},
      { id:"se", n:"Software Engineering", exams:["NEC","CSIT","KU"], topics:[
        {id:"se-proc",  n:"Software process & requirements (models, SRS, elicitation)", c:""},
        {id:"se-design",n:"Software design (architecture, decomposition, patterns)", c:""},

"prog-c": `
<h2>What C is</h2>
<p>C is a general-purpose, procedural, compiled language. A program is a set of <b>functions</b>; execution begins at <code>main()</code>. Source is compiled to an object file and linked into an executable.</p>
<pre><code>#include &lt;stdio.h&gt;
int main(void) {
    printf("Hello, NEC");   // statement
    return 0;               // exit status
}</code></pre>

<h2>Tokens</h2>
<p>The smallest units the compiler reads — six kinds:</p>
<ul>
<li><b>Keywords</b> — reserved words (<code>int</code>, <code>if</code>, <code>return</code>, <code>while</code>…); 32 in standard C.</li>
<li><b>Identifiers</b> — names for variables/functions; start with a letter or <code>_</code>, case-sensitive.</li>
<li><b>Constants</b> — fixed values (<code>10</code>, <code>3.14</code>, <code>'A'</code>).</li>
<li><b>String literals</b> — <code>"text"</code>, stored with a terminating null character.</li>
<li><b>Operators</b> — <code>+ - * / %</code>, etc.</li>
<li><b>Special symbols</b> — <code>{ } [ ] ( ) ; ,</code></li>
</ul>

<h2>Data types &amp; operators</h2>
<table>
<tr><th>Type</th><th>Typical size</th><th>Use</th></tr>
<tr><td>char</td><td>1 byte</td><td>single character / small int</td></tr>
<tr><td>int</td><td>2–4 bytes</td><td>whole numbers</td></tr>
<tr><td>float / double</td><td>4 / 8 bytes</td><td>real numbers</td></tr>
</table>
<p>Operator families: arithmetic, relational (<code>&lt; &gt; ==</code>), logical (<code>&amp;&amp; || !</code>), bitwise (<code>&amp; | ^ &gt;&gt; &lt;&lt;</code>), assignment, and the ternary <code>?:</code>.</p>

<h2>Formatted I/O</h2>
<p><code>printf</code> and <code>scanf</code> use format specifiers: <code>%d</code> int, <code>%f</code> float, <code>%c</code> char, <code>%s</code> string. <code>scanf</code> needs the address operator for scalars:</p>
<pre><code>int age;
scanf("%d", &amp;age);
printf("Age is %d", age);</code></pre>
<p>Unformatted I/O: <code>getchar/putchar</code>, <code>fgets/puts</code>.</p>

<h2>Control &amp; loops</h2>
<p>Decisions: <code>if / else if / else</code> and <code>switch</code>. Loops: <code>for</code> (count known), <code>while</code> (entry-controlled), <code>do…while</code> (runs at least once). <code>break</code> exits a loop; <code>continue</code> skips to the next iteration.</p>

<h2>Functions &amp; recursion</h2>
<p>A function has a return type, name, parameters and body. C passes arguments <b>by value</b> (a copy). A <b>recursive</b> function calls itself and must have a base case to terminate.</p>
<pre><code>int fact(int n) {
    if (n &lt;= 1) return 1;     // base case
    return n * fact(n - 1);   // recursive step
}</code></pre>

<h2>Arrays &amp; strings</h2>
<p>An array is a contiguous block of same-type elements, indexed from 0: <code>int a[5];</code>, 2-D as <code>int m[3][4];</code>. A <b>string</b> is a <code>char</code> array ending in the null character; <code>&lt;string.h&gt;</code> provides <code>strlen, strcpy, strcmp, strcat</code>.</p>

<blockquote>Exam focus: identify token types, trace loop/recursion output, and remember arrays decay to pointers when passed to functions (next topic).</blockquote>`,

"prog-ptr": `
<h2>Pointers</h2>
<p>A pointer holds the <b>address</b> of another variable. <code>&amp;</code> gives an address; <code>*</code> dereferences (reads the value at an address).</p>
<pre><code>int x = 10;
int *p = &amp;x;     // p points to x
printf("%d", *p); // prints 10</code></pre>

<h2>Pointer arithmetic</h2>
<p>Adding 1 to a pointer advances it by <code>sizeof(type)</code> bytes, not one byte — which is why pointers and arrays are tightly linked. For an array <code>a</code>, the name <code>a</code> is the address of <code>a[0]</code>, and <code>*(a+i)</code> equals <code>a[i]</code>.</p>

<h2>Passing pointers to functions</h2>
<p>Because C is pass-by-value, to let a function modify a caller's variable you pass its address (simulated pass-by-reference). This is also how arrays are passed efficiently.</p>
<pre><code>void inc(int *n) { (*n)++; }
// inc(&amp;x) increments x in the caller</code></pre>

<h2>Structures vs unions</h2>
<table>
<tr><th></th><th>struct</th><th>union</th></tr>
<tr><td>Memory</td><td>sum of all members</td><td>size of largest member (shared)</td></tr>
<tr><td>Members active</td><td>all at once</td><td>one at a time</td></tr>
</table>
<pre><code>struct Point { int x, y; };
struct Point p = {3, 4};
p.x = 5;            // dot for a variable
struct Point *pp = &amp;p;
pp-&gt;y = 6;          // arrow for a pointer</code></pre>
<p>Common patterns: <b>array of structures</b> (a table of records), <b>passing a structure to a function</b> (by value copies it; by pointer is cheaper), and combining <b>structure + pointer</b> for linked structures.</p>

<h2>File handling</h2>
<p>Open with <code>fopen("file","mode")</code> returning a <code>FILE*</code>; always <code>fclose</code>. Modes: <code>r w a</code> (with <code>+</code> for read/write, <code>b</code> for binary).</p>
<ul>
<li>Text I/O: <code>fprintf / fscanf</code>, <code>fgets / fputs</code>.</li>
<li>Binary I/O: <code>fread / fwrite</code>.</li>
</ul>
<h3>Sequential vs random access</h3>
<p><b>Sequential</b> reads/writes front to back. <b>Random</b> access jumps anywhere with <code>fseek(fp, offset, origin)</code>; <code>ftell</code> reports the current position and <code>rewind</code> returns to the start.</p>`,

"prog-cpp": `
<h2>From C to C++</h2>
<p>C++ adds classes, namespaces, references and stronger typing on top of C. A <b>namespace</b> groups names to avoid clashes; <code>std</code> is the standard-library namespace.</p>

<h2>Classes &amp; objects</h2>
<p>A <b>class</b> bundles data (members) and functions (methods) into a type; an <b>object</b> is an instance of it. <b>Access specifiers</b> control visibility:</p>
<ul>
<li><b>private</b> — accessible only inside the class (default for <code>class</code>).</li>
<li><b>public</b> — accessible everywhere.</li>
<li><b>protected</b> — like private, but also visible to derived classes.</li>
</ul>
<pre><code>class Circle {
    double r;                              // private
public:
    Circle(double radius) { r = radius; }  // constructor
    double area() { return 3.14159 * r * r; }
};
Circle c(2.0);
c.area();</code></pre>

<h2>Constructors &amp; destructor</h2>
<p>A <b>constructor</b> runs automatically when an object is created; types: default, parameterized and <b>copy constructor</b> (initialises from another object). A <b>destructor</b> <code>~Class()</code> runs when the object is destroyed — used to release resources.</p>

<h2>Dynamic memory</h2>
<p><code>new</code> allocates on the heap and calls the constructor; <code>delete</code> frees it and calls the destructor. For arrays use <code>new[]</code> / <code>delete[]</code>.</p>
<pre><code>Circle *c = new Circle(1.0);
delete c;</code></pre>

<h2>Other members</h2>
<ul>
<li><b>this pointer</b> — implicit pointer to the current object.</li>
<li><b>static members</b> — one copy shared by all objects; a static function accesses only static data.</li>
<li><b>const member functions</b> — promise not to modify the object; callable on const objects.</li>
<li><b>friend</b> functions/classes — granted access to private members despite being outside the class.</li>
</ul>

<h2>Convenience features</h2>
<p><b>Function overloading</b> (same name, different parameter lists), <b>inline</b> functions (avoid call overhead), <b>default arguments</b>, and <b>pass/return by reference</b> using <code>&amp;</code> to avoid copies.</p>`,

"prog-enc": `
<h2>The four pillars</h2>
<p>Object-oriented programming rests on <b>encapsulation</b>, <b>abstraction</b>, <b>inheritance</b> and <b>polymorphism</b>. This topic covers the first two; the next covers the other two.</p>

<h2>Encapsulation</h2>
<p>Bundling data and the methods that operate on it inside one unit (the class), and restricting direct access to the data. Implemented by making members <b>private</b> and exposing controlled <b>public</b> getters/setters.</p>
<pre><code>class Account {
    double balance;          // hidden
public:
    void deposit(double a) { if (a &gt; 0) balance += a; }
    double getBalance() { return balance; }
};</code></pre>
<p>Benefit: the class enforces its own invariants — outside code cannot set an invalid balance directly.</p>

<h2>Abstraction</h2>
<p>Exposing <b>what</b> an object does while hiding <b>how</b> it does it. A caller of <code>deposit()</code> need not know how the balance is stored. Abstraction is achieved through public interfaces and, more strongly, through abstract classes / pure virtual functions (covered later).</p>

<h2>Encapsulation vs abstraction</h2>
<table>
<tr><th>Encapsulation</th><th>Abstraction</th></tr>
<tr><td>Hides <i>data</i></td><td>Hides <i>implementation / complexity</i></td></tr>
<tr><td>Solved at implementation level</td><td>Solved at design level</td></tr>
<tr><td>Access specifiers</td><td>Interfaces / abstract classes</td></tr>
</table>
<blockquote>Exam tip: the one-line distinction is commonly asked — encapsulation wraps and protects data; abstraction hides unnecessary detail behind a simple interface.</blockquote>`,

<h2>Inheritance</h2>
<p>A <b>derived</b> class reuses and extends a <b>base</b> class. Forms:</p>
<ul>
<li><b>Single</b> — one base.</li>
<li><b>Multiple</b> — several bases.</li>

<p>"Many forms" — one interface, many behaviours.</p>
<table>
<tr><th>Compile-time (static)</th><th>Run-time (dynamic)</th></tr>

<h2>Virtual functions &amp; dynamic binding</h2>
<p>A <b>virtual</b> function lets a base-class pointer call the <i>derived</i> version of a method, decided at run time. This is <b>dynamic (late) binding</b>, implemented through a per-class table of function pointers (the <b>vtable</b>).</p>
<pre><code>class Shape { public: virtual double area(){ return 0; } };
class Square : public Shape {
    double s;

    Square(double x){ s = x; }

<h2>Pure virtual &amp; abstract classes</h2>
<p>A <b>pure virtual</b> function <code>virtual double area() = 0;</code> has no body. A class with at least one of these is <b>abstract</b> and cannot be instantiated — it defines an interface for derived classes.</p>

<p>Templates let you write code once that works for many types — the compiler generates a concrete version per type used.</p>

<pre><code>template &lt;typename T&gt;
T maxOf(T a, T b){ return (a &gt; b) ? a : b; }

<li>An uncaught exception calls <code>terminate()</code>.</li>

"dsa-list": `
<h2>What a data structure is</h2>
<p>A <b>data structure</b> is a way of organising data so the operations you need (insert, delete, search, traverse) are efficient. Choice of structure is the choice of which operations are cheap.</p>
<table>
<tr><th>Structure</th><th>Strength</th><th>Weakness</th></tr>
<tr><td>Array</td><td>O(1) indexed access</td><td>fixed size, O(n) insert/delete</td></tr>
<tr><td>Linked list</td><td>O(1) insert/delete at a known node</td><td>O(n) access, extra pointer memory</td></tr>
<tr><td>Tree</td><td>O(log n) search when balanced</td><td>degrades to O(n) if skewed</td></tr>
</table>

<h2>Linked lists</h2>
<p>A chain of <b>nodes</b>, each holding data and a pointer to the next. Variants:</p>
<ul>
<li><b>Singly linked</b> — one forward pointer.</li>
<li><b>Doubly linked</b> — next and prev pointers; backward traversal possible.</li>
<li><b>Circular</b> — last node points back to the first.</li>
</ul>
<pre><code>struct Node { int data; struct Node *next; };
// insert at head: new-&gt;next = head; head = new;  (O(1))</code></pre>
<p>Stacks and queues are usually built on lists/arrays: a <b>stack</b> is LIFO (push/pop one end); a <b>queue</b> is FIFO (enqueue rear, dequeue front). A <b>circular queue</b> reuses freed front slots.</p>

<h2>Trees</h2>
<p>A hierarchical structure: a <b>root</b>, internal nodes and leaves. Key terms: <i>height</i>, <i>depth</i>, <i>degree</i>. A <b>binary tree</b> has at most two children per node.</p>
<ul>
<li><b>Binary Search Tree (BST)</b> — left subtree &lt; node &lt; right subtree; search/insert is O(h).</li>
<li><b>Balanced trees</b> — AVL (height-balanced, rotations) and Red-Black keep h = O(log n).</li>
<li><b>Heap</b> — complete binary tree with the heap property (max-heap: parent &ge; children).</li>
<li><b>B-tree / B+ tree</b> — multi-way, used for disk indexes (see DBMS).</li>
</ul>
<h3>Tree traversals</h3>
<p>Depth-first: <b>inorder</b> (L, root, R — gives sorted order in a BST), <b>preorder</b> (root, L, R), <b>postorder</b> (L, R, root). Breadth-first: <b>level-order</b> using a queue.</p>
<blockquote>Exam focus: trace traversal output; remember inorder of a BST is sorted; know that array access is O(1) but linked-list access is O(n).</blockquote>
`,
"dsa-sort": `
<h2>Searching</h2>
<ul>
<li><b>Linear search</b> — scan all elements, O(n); works on any list.</li>
<li><b>Binary search</b> — repeatedly halve a <i>sorted</i> array, $O(&#92;log n)$. Requires random access.</li>
</ul>

<h2>Sorting algorithms</h2>
<table>
<tr><th>Algorithm</th><th>Best</th><th>Average</th><th>Worst</th><th>Stable?</th></tr>
<tr><td>Bubble / Insertion</td><td>O(n)</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>yes</td></tr>
<tr><td>Selection</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>$O(n^2)$</td><td>no</td></tr>
<tr><td>Merge sort</td><td>$O(n &#92;log n)$</td><td>$O(n &#92;log n)$</td><td>$O(n &#92;log n)$</td><td>yes</td></tr>
<tr><td>Quick sort</td><td>$O(n &#92;log n)$</td><td>$O(n &#92;log n)$</td><td>$O(n^2)$</td><td>no</td></tr>
<tr><td>Heap sort</td><td>$O(n &#92;log n)$</td><td>$O(n &#92;log n)$</td><td>$O(n &#92;log n)$</td><td>no</td></tr>
</table>
<p><b>Quick sort</b> partitions around a pivot; worst case ($O(n^2)$) is an already-sorted array with poor pivot choice. <b>Merge sort</b> divides, sorts halves, then merges — guaranteed $O(n &#92;log n)$ but needs O(n) extra space. <b>Counting / radix sort</b> beat the comparison lower bound for integer keys.</p>
<blockquote>The comparison-sort lower bound is $&#92;Omega(n &#92;log n)$ — no comparison sort can do better in the worst case.</blockquote>

<h2>Graphs</h2>
<p>A set of <b>vertices</b> V and <b>edges</b> E, written G = (V, E). Directed or undirected; weighted or unweighted. Representations:</p>
<ul>
<li><b>Adjacency matrix</b> — $O(V^2)$ space, O(1) edge lookup.</li>
<li><b>Adjacency list</b> — O(V + E) space, better for sparse graphs.</li>
</ul>
<h3>Traversal &amp; key algorithms</h3>
<ul>
<li><b>BFS</b> — queue-based, shortest path in unweighted graphs, O(V + E).</li>
<li><b>DFS</b> — stack/recursion; used for topological sort and cycle detection.</li>
<li><b>Dijkstra</b> — single-source shortest path, non-negative weights.</li>
<li><b>Minimum spanning tree</b> — Prim (grow one tree) and Kruskal (sort edges, union-find).</li>
</ul>
<blockquote>Exam focus: read off algorithm complexities from a table; pick BFS for unweighted shortest path, Dijkstra for weighted; matrix vs list trade-off.</blockquote>
`,
"dsa-cx": `
<h2>Why complexity matters</h2>
<p>We measure how runtime/memory grows with input size n, ignoring machine-specific constants. This predicts behaviour at scale better than a stopwatch.</p>

<h2>Asymptotic notations</h2>
<table>
<tr><th>Notation</th><th>Meaning</th><th>Bound</th></tr>
<tr><td>$O(f)$ — Big-O</td><td>grows no faster than f</td><td>upper</td></tr>
<tr><td>$&#92;Omega(f)$ — Big-Omega</td><td>grows at least as fast as f</td><td>lower</td></tr>
<tr><td>$&#92;Theta(f)$ — Theta</td><td>grows exactly as f</td><td>tight</td></tr>
</table>
<p>Formally, $f(n) = O(g(n))$ if there exist constants $c, n_0$ with $f(n) &#92;le c&#92;,g(n)$ for all $n &#92;ge n_0$.</p>
<h3>Common growth order (slow to fast)</h3>
<p>$O(1) &#92;lt O(&#92;log n) &#92;lt O(n) &#92;lt O(n &#92;log n) &#92;lt O(n^2) &#92;lt O(n^3) &#92;lt O(2^n) &#92;lt O(n!)$</p>

<h2>Analysing code</h2>
<ul>
<li>Single loop over n → O(n); nested loops → $O(n^2)$.</li>
<li>Halving the problem each step → $O(&#92;log n)$ (binary search).</li>
<li>Drop constants and lower-order terms: $3n^2 + 5n + 7 = O(n^2)$.</li>
</ul>

<h2>Recursion &amp; recurrences</h2>
<p>A recursive function expresses a problem in terms of smaller instances plus a base case. Its cost is a <b>recurrence</b>; e.g. merge sort: $T(n) = 2T(n/2) + O(n)$.</p>
<p>The <b>Master Theorem</b> solves $T(n) = aT(n/b) + f(n)$ by comparing $f(n)$ with $n^{&#92;log_b a}$ — giving $&#92;Theta(n &#92;log n)$ for merge sort.</p>
<blockquote>Exam focus: pick the Big-O of a code snippet, order the growth functions, and identify the recurrence of a divide-and-conquer algorithm.</blockquote>
`,
"dsa-para": `
<h2>Algorithm-design paradigms</h2>
<p>Three general strategies for building efficient algorithms — examiners ask you to <i>classify</i> an algorithm and state when each applies.</p>

<h2>Divide and conquer</h2>
<p>Split the problem into independent sub-problems, solve recursively, combine. Examples: merge sort, quick sort, binary search, Strassen's matrix multiply. Cost analysed by a recurrence (Master Theorem).</p>

<h2>Greedy</h2>
<p>Build a solution by repeatedly taking the <b>locally optimal</b> choice, never reconsidering. Works only when the problem has the <i>greedy-choice property</i> and <i>optimal substructure</i>.</p>
<ul>
<li>Examples: Kruskal &amp; Prim (MST), Dijkstra, Huffman coding, activity selection, fractional knapsack.</li>
<li>Fails on 0/1 knapsack — greedy is not always optimal.</li>
</ul>

<h2>Dynamic programming (DP)</h2>
<p>For problems with <b>overlapping sub-problems</b> and <b>optimal substructure</b>. Solve each sub-problem once and store the result (memoisation top-down, or tabulation bottom-up).</p>
<ul>
<li>Examples: 0/1 knapsack, longest common subsequence, matrix-chain multiplication, Floyd-Warshall, Bellman-Ford, Fibonacci.</li>
<li>Turns exponential brute force into polynomial time by reusing answers.</li>
</ul>

<h2>Greedy vs DP — the key distinction</h2>
<table>
<tr><th>Greedy</th><th>Dynamic programming</th></tr>
<tr><td>One choice, never revisited</td><td>Explores choices, keeps the best</td></tr>
<tr><td>Faster, simpler</td><td>More work, but always optimal when applicable</td></tr>
<tr><td>Fractional knapsack</td><td>0/1 knapsack</td></tr>
</table>
<blockquote>Exam focus: classify a named algorithm into its paradigm; remember fractional knapsack = greedy, 0/1 knapsack = DP; both DP and greedy need optimal substructure, but only DP handles overlapping sub-problems with reconsideration.</blockquote>
`,
"db-model": `
<h2>Data models</h2>
<p>A <b>DBMS</b> manages data with controlled access, integrity and concurrency. The dominant model is <b>relational</b>: data lives in <b>relations</b> (tables) of <b>tuples</b> (rows) and <b>attributes</b> (columns). The three-schema architecture separates the external (views), conceptual (logical), and internal (physical) levels — giving <b>data independence</b>.</p>

<h2>ER model</h2>
<p>Entity-Relationship diagrams model the real world before tables exist.</p>
<ul>
<li><b>Entity</b> — a thing (Student); <b>attribute</b> — a property (name); <b>relationship</b> — an association (enrols).</li>
<li><b>Cardinality</b> — 1:1, 1:N, M:N.</li>
<li>An <b>ER diagram</b> maps to tables: M:N relationships become a separate junction table.</li>
</ul>

<h2>Keys</h2>
<ul>
<li><b>Super key</b> — any attribute set that uniquely identifies a tuple.</li>
<li><b>Candidate key</b> — a minimal super key.</li>
<li><b>Primary key</b> — the chosen candidate key (unique, not null).</li>
<li><b>Foreign key</b> — references a primary key in another table (referential integrity).</li>
</ul>

<h2>Normalization (1NF → BCNF)</h2>
<p>Decomposing tables to remove redundancy and update anomalies, driven by <b>functional dependencies</b> (X → Y).</p>
<table>
<tr><th>Form</th><th>Removes</th></tr>
<tr><td>1NF</td><td>repeating groups — every cell atomic</td></tr>
<tr><td>2NF</td><td>partial dependency on part of a composite key</td></tr>
<tr><td>3NF</td><td>transitive dependency (non-key → non-key)</td></tr>
<tr><td>BCNF</td><td>every determinant must be a candidate key</td></tr>
</table>

<h2>SQL</h2>
<pre><code>SELECT name, AVG(marks)
FROM   student
WHERE  year = 2
GROUP BY name
HAVING AVG(marks) &gt; 60
ORDER BY name;</code></pre>
<p>Sub-languages: <b>DDL</b> (CREATE, ALTER, DROP), <b>DML</b> (SELECT, INSERT, UPDATE, DELETE), <b>DCL</b> (GRANT, REVOKE). Joins: INNER, LEFT/RIGHT/FULL OUTER. <b>Indexing</b> (often a B+ tree) speeds lookups at the cost of slower writes and extra space.</p>
<blockquote>Exam focus: identify the highest normal form of a table; spot the difference between candidate and primary keys; read/predict an SQL query's result.</blockquote>
`,
"db-tx": `
<h2>Transactions</h2>
<p>A <b>transaction</b> is a logical unit of work — a sequence of operations treated as one atomic action. Classic example: a bank transfer (debit + credit must both happen or neither).</p>

<h2>ACID properties</h2>
<table>
<tr><th>Property</th><th>Guarantee</th></tr>
<tr><td><b>Atomicity</b></td><td>all-or-nothing — partial effects are rolled back</td></tr>
<tr><td><b>Consistency</b></td><td>moves the DB from one valid state to another</td></tr>
<tr><td><b>Isolation</b></td><td>concurrent transactions don't interfere</td></tr>
<tr><td><b>Durability</b></td><td>committed changes survive crashes</td></tr>
</table>

<h2>Concurrency problems</h2>
<p>Uncontrolled interleaving causes: <b>lost update</b>, <b>dirty read</b> (reading uncommitted data), <b>unrepeatable read</b>, and <b>phantom read</b>.</p>

<h2>Concurrency control</h2>
<ul>
<li><b>Locking</b> — shared (read) and exclusive (write) locks. <b>Two-Phase Locking (2PL)</b> (growing then shrinking phase) guarantees serializability; strict 2PL avoids cascading aborts.</li>
<li><b>Timestamp ordering</b> — serialise by transaction timestamps.</li>
<li><b>Deadlock</b> — circular lock wait; handled by prevention, avoidance, or detection (wait-for graph) + victim rollback.</li>
</ul>
<p>A schedule is <b>serializable</b> if it is equivalent to some serial order — the correctness criterion for concurrency.</p>

<h2>Crash recovery</h2>
<p>Uses a <b>write-ahead log</b> (WAL): record changes before applying them. On restart, <b>UNDO</b> uncommitted transactions and <b>REDO</b> committed ones. <b>Checkpoints</b> bound how much log must be replayed.</p>
<blockquote>Exam focus: expand ACID; identify which anomaly a scenario shows; know 2PL ensures serializability and WAL underpins recovery.</blockquote>
`,
"os-proc": `
<h2>What an OS does</h2>
<p>The <b>operating system</b> manages hardware and provides services to programs: process, memory, file and I/O management, plus protection. Programs invoke it through <b>system calls</b>. Structures range from monolithic to microkernel.</p>

<h2>Processes &amp; threads</h2>
<p>A <b>process</b> is a program in execution with its own address space, described by a <b>Process Control Block (PCB)</b>. State cycle: <i>new → ready → running → waiting → terminated</i>.</p>
<p>A <b>thread</b> is a lighter unit sharing the process's code and data but with its own stack and registers — cheaper to create and switch than a process.</p>

<h2>CPU scheduling</h2>
<table>
<tr><th>Algorithm</th><th>Idea</th><th>Note</th></tr>
<tr><td>FCFS</td><td>first come, first served</td><td>simple; convoy effect</td></tr>
<tr><td>SJF</td><td>shortest job first</td><td>optimal avg wait; needs burst estimate</td></tr>
<tr><td>Round Robin</td><td>fixed time quantum</td><td>fair, good for time-sharing</td></tr>
<tr><td>Priority</td><td>highest priority first</td><td>risk of starvation → aging</td></tr>
</table>
<p>Metrics: turnaround, waiting and response time; throughput; CPU utilisation. <b>Preemptive</b> schedulers can interrupt a running process; non-preemptive cannot.</p>

<h2>Synchronization</h2>
<p>When threads share data, a <b>race condition</b> can corrupt it. The <b>critical section</b> must be entered by one thread at a time, satisfying mutual exclusion, progress and bounded waiting.</p>
<ul>
<li><b>Semaphore</b> — integer with atomic <code>wait(P)</code> / <code>signal(V)</code>; binary semaphore = mutex.</li>
<li>Classic problems: producer-consumer, readers-writers, dining philosophers.</li>
</ul>
<h3>Deadlock</h3>
<p>Four necessary (Coffman) conditions: mutual exclusion, hold-and-wait, no preemption, circular wait. Strategies: prevention, avoidance (<b>Banker's algorithm</b>), detection &amp; recovery, or ignore (ostrich).</p>
<blockquote>Exam focus: compute average waiting/turnaround time for a scheduling table; list the four deadlock conditions; distinguish process vs thread.</blockquote>
`,
"os-mem": `
<h2>Memory management</h2>
<p>The OS allocates main memory to processes and tracks free space. <b>Contiguous allocation</b> suffers <b>external fragmentation</b>; <b>compaction</b> or non-contiguous schemes fix it.</p>
<ul>
<li><b>Paging</b> — divide memory into fixed <b>frames</b> and process space into <b>pages</b>; a <b>page table</b> maps page → frame. Eliminates external fragmentation (small internal fragmentation remains).</li>
<li><b>Segmentation</b> — variable-size logical units (code, stack, data) — matches program structure.</li>
</ul>

<h2>Virtual memory</h2>
<p>Lets a process run with only part of it in RAM, using disk as backing store via <b>demand paging</b>. Accessing an absent page causes a <b>page fault</b>, which loads it from disk.</p>
<h3>Page-replacement algorithms</h3>
<ul>
<li><b>FIFO</b> — evict oldest; can show <b>Belady's anomaly</b> (more frames → more faults).</li>
<li><b>Optimal</b> — evict the page used farthest in future (theoretical benchmark).</li>
<li><b>LRU</b> — evict least recently used (good approximation of optimal).</li>
</ul>
<p>Excessive paging is <b>thrashing</b> — the CPU spends more time swapping than working; the <b>working-set model</b> mitigates it.</p>
<p>A <b>TLB</b> (translation look-aside buffer) caches recent page-table entries to speed translation.</p>

<h2>File systems</h2>
<p>Files are organised in directories; allocation methods are <b>contiguous</b>, <b>linked</b>, and <b>indexed</b> (e.g. Unix inodes). Free space is tracked by bit vectors or linked lists. Disk scheduling (FCFS, SSTF, SCAN, C-SCAN) orders seek requests to cut head movement.</p>
<blockquote>Exam focus: count page faults for FIFO/LRU given a reference string; define thrashing; know paging removes external (not internal) fragmentation.</blockquote>
`,
"os-app": `
<h2>OS as a platform for applications</h2>
<p>Application programs run on top of OS services; the boundary is the <b>system-call interface</b>. The OS provides an abstraction layer so programs need not address hardware directly.</p>
<ul>
<li><b>Kernel mode vs user mode</b> — privileged instructions run only in kernel mode; a system call traps from user to kernel mode.</li>
<li><b>System programs</b> — file managers, compilers, loaders, shells — sit between users and the kernel.</li>
<li><b>Application programs</b> — solve a user's problem (word processors, browsers, DBMS clients).</li>
</ul>

<h2>From source to running program</h2>
<p>Source → <b>compiler</b> → object code → <b>linker</b> (resolves references, combines modules) → executable → <b>loader</b> (places it in memory, sets up the address space) → process. Dynamic linking defers library binding to load/run time, saving memory.</p>

<h2>Types of OS / computing</h2>
<table>
<tr><th>Type</th><th>Characteristic</th></tr>
<tr><td>Batch</td><td>jobs queued, no interaction</td></tr>
<tr><td>Time-sharing</td><td>many interactive users, rapid switching</td></tr>
<tr><td>Real-time</td><td>strict deadlines (hard/soft)</td></tr>
<tr><td>Distributed</td><td>multiple networked machines as one</td></tr>
</table>

<h2>Computer applications</h2>
<p>Categories examiners list: system software vs application software; productivity, DBMS, multimedia, communication, and engineering/scientific applications. The OS coordinates all of these and arbitrates shared resources fairly and safely.</p>
<blockquote>Exam focus: distinguish system vs application software; order compiler → linker → loader; match an OS type to a usage scenario.</blockquote>
`,
"net-phy": `
<h2>Why layers</h2>
<p>Networks are built as a <b>stack of layers</b>, each providing services to the one above and hiding detail below. Two reference models:</p>
<table>
<tr><th>OSI (7 layers)</th><th>TCP/IP (4 layers)</th></tr>
<tr><td>Application, Presentation, Session</td><td>Application</td></tr>
<tr><td>Transport</td><td>Transport</td></tr>
<tr><td>Network</td><td>Internet</td></tr>
<tr><td>Data Link, Physical</td><td>Network Access (Link)</td></tr>
</table>
<p>Mnemonic for OSI (top→bottom): <i>All People Seem To Need Data Processing</i>. OSI is a conceptual model; TCP/IP is what the Internet actually runs.</p>

<h2>Physical layer</h2>
<p>Transmits raw bits over a medium; concerned with signals, encoding, data rate, and topology — not meaning.</p>
<ul>
<li><b>Transmission media</b> — guided: twisted pair, coaxial, fibre optic; unguided: radio, microwave, infrared.</li>
<li><b>Encoding</b> — NRZ, Manchester; <b>modulation</b> — ASK, FSK, PSK for analog carriers.</li>
<li><b>Multiplexing</b> — FDM (frequency), TDM (time), WDM (wavelength) share one medium.</li>
</ul>

<h2>Network devices &amp; topologies</h2>
<table>
<tr><th>Device</th><th>Layer</th><th>Role</th></tr>
<tr><td>Hub / repeater</td><td>physical</td><td>broadcast / regenerate signal</td></tr>
<tr><td>Switch / bridge</td><td>data link</td><td>forward by MAC address</td></tr>
<tr><td>Router</td><td>network</td><td>forward by IP, between networks</td></tr>
</table>
<p>Topologies: bus, star, ring, mesh, tree, hybrid. Scope: PAN, LAN, MAN, WAN.</p>
<blockquote>Exam focus: order the OSI layers; map a device to its layer; pick the right medium/multiplexing for a scenario.</blockquote>
`,
"net-dll": `
<h2>Data link layer role</h2>
<p>Turns the raw bit pipe into a reliable link between adjacent nodes. Two sublayers: <b>LLC</b> (flow/error control) and <b>MAC</b> (medium access). It groups bits into <b>frames</b>.</p>

<h2>Error control</h2>
<ul>
<li><b>Detection</b> — parity, checksum, and <b>CRC</b> (cyclic redundancy check, polynomial division — the workhorse).</li>
<li><b>Correction</b> — <b>Hamming code</b> adds redundant bits to locate and fix a single-bit error.</li>
</ul>

<h2>Flow control</h2>
<ul>
<li><b>Stop-and-wait</b> — send one frame, await ACK; simple but low utilisation.</li>
<li><b>Sliding window</b> — multiple outstanding frames: <b>Go-Back-N</b> (retransmit from error) and <b>Selective Repeat</b> (retransmit only the lost frame).</li>
</ul>

<h2>Medium Access Control (MAC)</h2>
<p>Decides who transmits on a shared medium.</p>
<ul>
<li><b>ALOHA / Slotted ALOHA</b> — random access, low efficiency.</li>
<li><b>CSMA/CD</b> — sense before send, detect collisions; used by classic <b>Ethernet</b>.</li>
<li><b>CSMA/CA</b> — collision avoidance; used by Wi-Fi (802.11).</li>
</ul>
<p><b>Ethernet</b> frames carry 48-bit (6-byte) <b>MAC addresses</b>. A switch learns MAC-to-port mappings and forwards selectively.</p>

<h2>ARP</h2>
<p><b>Address Resolution Protocol</b> maps a known IP address to its MAC address on the local network by broadcasting a request; the owner replies with its MAC. (RARP/DHCP do the reverse / assign IPs.)</p>
<blockquote>Exam focus: CRC vs Hamming (detect vs correct); compare Go-Back-N and Selective Repeat; state what ARP resolves (IP → MAC) and that MAC is 48 bits.</blockquote>
`,
"net-ip": `
<h2>Network layer role</h2>
<p>Moves <b>packets</b> end-to-end across multiple networks: logical addressing (IP), routing, and fragmentation. It offers a <b>best-effort, connectionless</b> service.</p>

<h2>IPv4 addressing</h2>
<p>A 32-bit address written as four dotted octets, split into <b>network</b> and <b>host</b> parts.</p>
<table>
<tr><th>Class</th><th>Range (first octet)</th><th>Default mask</th></tr>
<tr><td>A</td><td>1–126</td><td>/8</td></tr>
<tr><td>B</td><td>128–191</td><td>/16</td></tr>
<tr><td>C</td><td>192–223</td><td>/24</td></tr>
</table>
<p>Private ranges (RFC 1918): 10.x, 172.16–31.x, 192.168.x — used behind <b>NAT</b>.</p>

<h2>Subnetting</h2>
<p>Borrow host bits to create subnets. With a /26 mask (255.255.255.192) each subnet has $2^6 = 64$ addresses, of which 62 are usable (subtract network + broadcast). Number of hosts $= 2^{(32-&#92;text{prefix})} - 2$.</p>
<p><b>CIDR</b> writes prefix length directly (192.168.1.0/24) and allows route aggregation; <b>VLSM</b> uses different mask lengths per subnet.</p>

<h2>Routing</h2>
<ul>
<li><b>Distance vector</b> (RIP) — share whole routing table with neighbours; Bellman-Ford; counts hops.</li>
<li><b>Link state</b> (OSPF) — each router floods link info, builds a full map, runs Dijkstra.</li>
<li><b>BGP</b> — path-vector protocol routing between autonomous systems (the Internet's backbone).</li>
</ul>

<h2>IPv6</h2>
<p>128-bit addresses (eight 16-bit hex groups), huge address space, no broadcast (uses multicast/anycast), simplified header, built-in IPsec. Transition via dual-stack and tunnelling.</p>
<blockquote>Exam focus: compute usable hosts/subnets from a mask; classify an IP address; RIP vs OSPF (hop count vs link state); IPv4 = 32-bit, IPv6 = 128-bit.</blockquote>
`,
"net-tcp": `
<h2>Transport layer role</h2>
<p>Provides <b>process-to-process</b> delivery using <b>port numbers</b> (a socket = IP + port). Two protocols dominate.</p>

<h2>TCP vs UDP</h2>
<table>
<tr><th></th><th>TCP</th><th>UDP</th></tr>
<tr><td>Connection</td><td>connection-oriented</td><td>connectionless</td></tr>
<tr><td>Reliability</td><td>reliable, ordered, ACKed</td><td>best-effort</td></tr>
<tr><td>Overhead</td><td>higher (20-byte header)</td><td>low (8-byte header)</td></tr>
<tr><td>Use</td><td>web, email, file transfer</td><td>DNS, VoIP, streaming, games</td></tr>
</table>

<h2>TCP connection — three-way handshake</h2>
<pre><code>Client  --SYN--&gt;          Server
Client  &lt;--SYN, ACK--     Server
Client  --ACK--&gt;          Server   (connection established)</code></pre>
<p>Teardown uses FIN/ACK exchanges. Sequence and acknowledgement numbers provide ordering and reliability.</p>

<h2>Flow &amp; congestion control</h2>
<ul>
<li><b>Flow control</b> — the receiver advertises a <b>window size</b> so a fast sender can't overwhelm it (sliding window).</li>
<li><b>Congestion control</b> — protects the <i>network</i>: <b>slow start</b> (exponential growth), <b>congestion avoidance</b> (linear), and reaction to loss (multiplicative decrease — AIMD).</li>
</ul>

<h2>Common ports</h2>
<p>HTTP 80, HTTPS 443, FTP 20/21, SSH 22, SMTP 25, DNS 53, Telnet 23. Ports 0–1023 are well-known.</p>
<blockquote>Exam focus: TCP vs UDP table; describe the three-way handshake; flow control protects the receiver, congestion control protects the network; recall well-known port numbers.</blockquote>
`,
"net-app": `
<h2>Application layer role</h2>
<p>The layer users meet: protocols that applications use to exchange data, built on transport services.</p>

<h2>Key protocols</h2>
<table>
<tr><th>Protocol</th><th>Purpose</th><th>Transport / port</th></tr>
<tr><td>HTTP / HTTPS</td><td>web pages (request/response)</td><td>TCP 80 / 443</td></tr>
<tr><td>DNS</td><td>name → IP resolution</td><td>UDP/TCP 53</td></tr>
<tr><td>FTP</td><td>file transfer (control + data)</td><td>TCP 21 / 20</td></tr>
<tr><td>SMTP / POP3 / IMAP</td><td>send / retrieve email</td><td>TCP 25 / 110 / 143</td></tr>
<tr><td>DHCP</td><td>auto IP assignment</td><td>UDP 67/68</td></tr>
</table>

<h2>DNS</h2>
<p>A distributed hierarchical database: root → top-level domain (.com, .np) → authoritative servers. A resolver queries iteratively/recursively; results are <b>cached</b> with a TTL. Record types: A (IPv4), AAAA (IPv6), MX (mail), CNAME (alias), NS.</p>

<h2>HTTP</h2>
<p>Stateless request/response. Methods: GET, POST, PUT, DELETE. Status codes: 2xx success, 3xx redirect, 4xx client error (404), 5xx server error. Statelessness is patched with cookies/sessions; HTTPS adds TLS encryption.</p>

<h2>Sockets &amp; analyzers</h2>
<p>A <b>socket</b> is the programming endpoint (IP + port) for network I/O — the basis of client-server code. <b>Protocol analyzers</b> (Wireshark, tcpdump) capture and decode packets for debugging and security analysis.</p>
<blockquote>Exam focus: match protocol → port → transport; what DNS resolves and its record types; HTTP methods and status-code classes; what a socket is.</blockquote>
`,
"coa-fund": `
<h2>Architecture vs organization</h2>
<p><b>Computer architecture</b> = attributes visible to a programmer (instruction set, data types, addressing modes). <b>Computer organization</b> = how those are implemented (control signals, interconnections, hardware). Architecture is the "what", organization is the "how".</p>

<h2>Von Neumann model</h2>
<p>A single memory holds both <b>instructions and data</b>, fetched over a shared bus — the basis of the <b>stored-program</b> concept. Components: CPU (ALU + control unit + registers), memory, I/O, connected by the <b>system bus</b> (data, address, control).</p>
<p>The <b>fetch-decode-execute cycle</b>: the PC points to the next instruction; it is fetched into the IR, decoded, then executed; the PC advances.</p>
<blockquote>The <i>Von Neumann bottleneck</i> is the single shared path between CPU and memory; the <b>Harvard architecture</b> uses separate instruction and data memories to avoid it.</blockquote>

<h2>Performance</h2>
<p>CPU time $= &#92;dfrac{&#92;text{instructions} &#92;times &#92;text{CPI}}{&#92;text{clock rate}}$, where CPI = cycles per instruction. Improving performance means cutting instruction count, CPI, or cycle time — often at odds.</p>
<blockquote>Exam focus: distinguish architecture vs organization; list Von Neumann components; state the stored-program idea and the fetch-decode-execute cycle.</blockquote>
`,
"coa-dl": `
<h2>Number systems</h2>
<p>Bases: binary (2), octal (8), decimal (10), hex (16). Conversions are a staple MCQ. Signed integers use <b>two's complement</b>: negate by inverting bits and adding 1; it gives a single zero and simple addition.</p>
<p>Example: $&#92;,(1011)_2 = 8+0+2+1 = (11)_{10}$.</p>

<h2>Boolean algebra</h2>
<p>Variables take 0/1; operators AND ($&#92;cdot$), OR ($+$), NOT ($&#92;,'$). Key laws:</p>
<ul>
<li>Identity: $A + 0 = A$, $A &#92;cdot 1 = A$.</li>
<li>Complement: $A + A' = 1$, $A &#92;cdot A' = 0$.</li>
<li><b>De Morgan</b>: $(A+B)' = A'B'$ and $(AB)' = A'+B'$.</li>
</ul>

<h2>Logic gates</h2>
<table>
<tr><th>Gate</th><th>Output</th></tr>
<tr><td>AND</td><td>1 only if all inputs 1</td></tr>
<tr><td>OR</td><td>1 if any input 1</td></tr>
<tr><td>NOT</td><td>inverts</td></tr>
<tr><td>NAND / NOR</td><td>universal — any circuit from these alone</td></tr>
<tr><td>XOR</td><td>1 if inputs differ</td></tr>
</table>

<h2>K-map simplification</h2>
<p>A <b>Karnaugh map</b> minimises a Boolean function by grouping adjacent 1s (sizes 1, 2, 4, 8…) so only one variable changes between cells (Gray code ordering). Larger groups → fewer literals. Functions are expressed as <b>SOP</b> (sum of products) or <b>POS</b> (product of sums).</p>
<blockquote>Exam focus: base conversions and two's-complement arithmetic; apply De Morgan; NAND/NOR are universal; minimise a 3/4-variable function with a K-map.</blockquote>
`,
"coa-comb": `
<h2>Combinational circuits</h2>
<p>Output depends <b>only</b> on current inputs (no memory). Built from gates; described by a truth table / Boolean expression.</p>

<h2>Arithmetic circuits</h2>
<ul>
<li><b>Half adder</b> — adds two bits: $S = A &#92;oplus B$, $C = A &#92;cdot B$.</li>
<li><b>Full adder</b> — adds two bits plus a carry-in; chained into a <b>ripple-carry adder</b>.</li>
<li><b>Carry look-ahead adder</b> — computes carries in parallel to cut delay.</li>
</ul>

<h2>Data-routing blocks</h2>
<table>
<tr><th>Block</th><th>Function</th></tr>
<tr><td>Multiplexer (MUX)</td><td>selects 1 of $2^n$ inputs using n select lines</td></tr>
<tr><td>Demultiplexer</td><td>routes one input to 1 of $2^n$ outputs</td></tr>
<tr><td>Encoder</td><td>$2^n$ inputs → n-bit code</td></tr>
<tr><td>Decoder</td><td>n-bit code → 1 of $2^n$ outputs</td></tr>
<tr><td>Comparator</td><td>compares two numbers (=, &lt;, &gt;)</td></tr>
</table>
<p>A MUX is functionally complete — any Boolean function can be built from multiplexers.</p>
<blockquote>Exam focus: half vs full adder equations; a $2^n$-to-1 MUX needs n select lines; decoder vs encoder direction; combinational = no memory.</blockquote>
`,
"coa-seq": `
<h2>Sequential circuits</h2>
<p>Output depends on current inputs <b>and</b> past state — they have <b>memory</b>, clocked by a signal. Classified as <b>synchronous</b> (state changes on clock edge) or asynchronous.</p>

<h2>Flip-flops</h2>
<table>
<tr><th>Type</th><th>Behaviour</th></tr>
<tr><td>SR</td><td>set/reset; S=R=1 forbidden</td></tr>
<tr><td>D</td><td>output follows D at the clock edge (data latch)</td></tr>
<tr><td>JK</td><td>like SR but J=K=1 toggles</td></tr>
<tr><td>T</td><td>toggles when T=1</td></tr>
</table>
<p>A <b>latch</b> is level-triggered; a <b>flip-flop</b> is edge-triggered. Each is described by a characteristic table / equation and an excitation table (for design).</p>

<h2>Registers &amp; counters</h2>
<ul>
<li><b>Register</b> — a group of flip-flops storing an n-bit word. <b>Shift registers</b> move bits (SISO, SIPO, PISO, PIPO).</li>
<li><b>Counter</b> — cycles through states. <b>Asynchronous (ripple)</b> counters chain flip-flops (slower); <b>synchronous</b> counters clock all together (faster). A mod-N counter counts 0…N−1.</li>
</ul>
<p>A <b>finite-state machine</b> (Mealy: output depends on state + input; Moore: output depends on state only) models sequential logic — links to Theory of Computation.</p>
<blockquote>Exam focus: JK with J=K=1 toggles; latch (level) vs flip-flop (edge); ripple vs synchronous counter; identify counter modulus from flip-flop count ($2^n$ states).</blockquote>
`,
"coa-mp": `
<h2>Microprocessor architecture</h2>
<p>A microprocessor is a single-chip CPU: ALU, registers, control unit and buses. The classic teaching example is the 8-bit <b>Intel 8085</b>.</p>
<ul>
<li><b>Registers</b> — accumulator (A), general-purpose (B, C, D, E, H, L), flags, stack pointer (SP), program counter (PC).</li>
<li><b>Buses</b> — 8-bit data, 16-bit address (so 64 KB addressable), control.</li>
<li><b>Flags</b> — sign, zero, carry, parity, auxiliary carry — set by ALU results.</li>
</ul>

<h2>Instruction format &amp; addressing modes</h2>
<p>An instruction = opcode + operand(s). Addressing modes specify where operands are:</p>
<ul>
<li><b>Immediate</b> — operand in the instruction (MVI A, 05H).</li>
<li><b>Register</b> — operand in a register (MOV A, B).</li>
<li><b>Direct</b> — operand's memory address given.</li>
<li><b>Register indirect</b> — address held in a register pair (MOV A, M).</li>
</ul>

<h2>Assembly programming basics</h2>
<pre><code>MVI A, 09H   ; load 09 into A
MVI B, 06H   ; load 06 into B
ADD B        ; A = A + B
STA 2000H    ; store A to memory 2000H
HLT          ; halt</code></pre>
<p>Instruction groups: data transfer, arithmetic, logical, branch, stack/I/O/machine control.</p>
<blockquote>Exam focus: 8085 has 8-bit data / 16-bit address bus (64 KB); identify addressing mode of an instruction; trace a short assembly snippet's register/flag effect.</blockquote>
`,
"coa-mpsys": `
<h2>Microprocessor system</h2>
<p>A working system surrounds the CPU with memory and I/O, tied together by the buses.</p>

<h2>Memory interfacing</h2>
<p><b>Address decoding</b> assigns each memory/IO chip a unique address range. With a 16-bit address bus, higher-order lines select the chip and lower lines the location. Memory map planning (which chip occupies which range) is a common design question.</p>

<h2>I/O interfacing</h2>
<table>
<tr><th>Scheme</th><th>Idea</th></tr>
<tr><td>Memory-mapped I/O</td><td>I/O shares the memory address space; same instructions</td></tr>
<tr><td>I/O-mapped (isolated)</td><td>separate I/O space; dedicated IN/OUT instructions</td></tr>
</table>

<h2>Data-transfer modes</h2>
<ul>
<li><b>Programmed I/O</b> — CPU polls the device; simple but wastes CPU cycles.</li>
<li><b>Interrupt-driven I/O</b> — device signals the CPU when ready (next topic).</li>
<li><b>DMA (Direct Memory Access)</b> — a DMA controller transfers data directly between memory and device, freeing the CPU; it requests bus control via cycle stealing or burst mode — best for high-speed bulk transfer.</li>
</ul>
<p>Support chips: <b>8255</b> (programmable peripheral interface), <b>8259</b> (interrupt controller), <b>8257</b> (DMA controller).</p>
<blockquote>Exam focus: memory-mapped vs isolated I/O; when DMA beats programmed/interrupt I/O; role of address decoding.</blockquote>
`,
"coa-int": `
<h2>Interrupts</h2>
<p>An <b>interrupt</b> lets a device or condition asynchronously demand the CPU's attention, avoiding wasteful polling. The CPU finishes the current instruction, saves context, and jumps to an <b>Interrupt Service Routine (ISR)</b>.</p>

<h2>Interrupt classification</h2>
<ul>
<li><b>Hardware vs software</b> — external device vs an instruction (e.g. a system call / RST).</li>
<li><b>Maskable vs non-maskable</b> — can be disabled vs always honoured (e.g. 8085 TRAP is non-maskable).</li>
<li><b>Vectored vs non-vectored</b> — ISR address is fixed/known vs supplied by the device.</li>
</ul>

<h2>Interrupt processing sequence</h2>
<ol>
<li>Device raises interrupt request.</li>
<li>CPU completes current instruction, then acknowledges.</li>
<li>Saves PC (and flags) on the stack — context save.</li>
<li>Loads the ISR address and executes the handler.</li>
<li>Restores context and returns (RET-from-interrupt) to the interrupted program.</li>
</ol>
<p><b>Priority</b> resolves simultaneous interrupts (hardware daisy-chain or a controller like the 8259). Nested interrupts let a higher-priority request preempt a running ISR.</p>
<blockquote>Exam focus: 8085 TRAP = non-maskable, highest priority; interrupt vs polling efficiency; order of the save-context → ISR → restore sequence.</blockquote>
`,
"coa-cpu": `
<h2>Instruction set &amp; CPU control</h2>
<p>The <b>ISA</b> defines instructions, registers, data types and addressing modes — the contract between hardware and software.</p>

<h2>RISC vs CISC</h2>
<table>
<tr><th>RISC</th><th>CISC</th></tr>
<tr><td>Few simple, fixed-length instructions</td><td>Many complex, variable-length instructions</td></tr>
<tr><td>Load/store architecture, many registers</td><td>Memory operands allowed</td></tr>
<tr><td>Pipeline-friendly, 1 instr/cycle goal</td><td>Compact code, microcoded control</td></tr>
<tr><td>ARM, MIPS, RISC-V</td><td>x86</td></tr>
</table>

<h2>Control unit</h2>
<p>Generates the control signals that drive the datapath. Two designs: <b>hardwired</b> (fast, fixed logic) and <b>microprogrammed</b> (flexible, control words stored in control memory).</p>

<h2>Pipelining</h2>
<p>Overlaps instruction stages (Fetch, Decode, Execute, Memory, Write-back) like an assembly line — ideal speedup approaches the number of stages. Limited by <b>hazards</b>:</p>
<ul>
<li><b>Structural</b> — resource conflict.</li>
<li><b>Data</b> — instruction needs a result not yet ready (solved by forwarding / stalls).</li>
<li><b>Control</b> — branches (solved by prediction / delayed branch).</li>
</ul>
<p>Ideal CPI → 1; for n stages and k instructions, time $&#92;approx (k + n - 1)$ cycles.</p>
<blockquote>Exam focus: RISC vs CISC table; hardwired vs microprogrammed control; name the three pipeline hazards and the pipeline stages.</blockquote>
`,
"coa-mem": `
<h2>Computer arithmetic</h2>
<p>Integer add/subtract use two's complement. <b>Booth's algorithm</b> multiplies signed numbers efficiently; division uses restoring/non-restoring methods. <b>Floating point</b> follows IEEE 754: sign, exponent (biased), mantissa — single (32-bit) and double (64-bit).</p>

<h2>Memory hierarchy</h2>
<p>Trade speed against cost/size — fast-small at the top, slow-large at the bottom:</p>
<table>
<tr><th>Level</th><th>Speed</th><th>Size</th></tr>
<tr><td>Registers</td><td>fastest</td><td>bytes</td></tr>
<tr><td>Cache (L1/L2/L3)</td><td>very fast</td><td>KB–MB</td></tr>
<tr><td>Main memory (RAM)</td><td>fast</td><td>GB</td></tr>
<tr><td>Secondary (SSD/HDD)</td><td>slow</td><td>TB</td></tr>
</table>
<p>Works because of <b>locality of reference</b> — temporal (reuse soon) and spatial (nearby addresses).</p>

<h2>Cache</h2>
<ul>
<li><b>Mapping</b> — direct-mapped, fully associative, set-associative.</li>
<li><b>Hit/miss</b> — average access time $= h &#92;cdot t_c + (1-h) &#92;cdot t_m$, where h is hit ratio.</li>
<li><b>Write policy</b> — write-through vs write-back; replacement by LRU/FIFO/random.</li>
</ul>
<blockquote>Exam focus: compute average memory access time from a hit ratio; order the hierarchy by speed/size; explain locality; IEEE 754 fields.</blockquote>
`,
"coa-io": `
<h2>I/O organization</h2>
<p>Connects peripherals to the CPU/memory. Recap of transfer modes: <b>programmed I/O</b> (polling), <b>interrupt-driven</b>, and <b>DMA</b> (controller moves data directly to memory). I/O modules buffer speed mismatches and translate signals.</p>

<h2>Buses &amp; arbitration</h2>
<p>A shared <b>bus</b> needs <b>arbitration</b> when several masters want it: daisy-chaining, polling, or independent request/grant lines. Buses are characterised by width, clock, and protocol (synchronous/asynchronous).</p>

<h2>Multiprocessor systems</h2>
<p>Multiple CPUs for higher throughput/reliability.</p>
<table>
<tr><th>Class</th><th>Coupling</th></tr>
<tr><td>SMP (symmetric)</td><td>shared memory, tightly coupled</td></tr>
<tr><td>Distributed / cluster</td><td>private memory, message passing, loosely coupled</td></tr>
</table>
<p><b>Flynn's taxonomy</b>: SISD, SIMD, MISD, MIMD — by instruction/data stream count. Shared-memory multiprocessors need <b>cache coherence</b> (e.g. MESI protocol) so all CPUs see a consistent value.</p>
<blockquote>Exam focus: Flynn's four classes; tightly vs loosely coupled; why cache coherence is needed; DMA vs programmed I/O.</blockquote>
`,
"coa-emb": `
<h2>Embedded systems</h2>
<p>A computer built into a larger device to do a <b>dedicated</b> task — washing machines, cars, routers, medical devices. Usually resource-constrained (power, memory), often real-time, and not user-reprogrammable.</p>

<h2>Microcontroller vs microprocessor</h2>
<table>
<tr><th>Microcontroller</th><th>Microprocessor</th></tr>
<tr><td>CPU + memory + I/O on one chip</td><td>CPU only; external memory/IO</td></tr>
<tr><td>Embedded, low power</td><td>General-purpose computing</td></tr>
<tr><td>8051, AVR, PIC, ARM Cortex-M</td><td>desktop/server CPUs</td></tr>
</table>

<h2>HW/SW co-design</h2>
<p>Embedded design partitions a function between <b>hardware</b> (fast, fixed) and <b>software</b> (flexible, slower) under constraints of cost, power, performance and time-to-market. Design issues: real-time deadlines, interrupt latency, low-power modes, reliability, and the use of an <b>RTOS</b> (next topic).</p>

<h2>ASIP</h2>
<p>An <b>Application-Specific Instruction-set Processor</b> sits between a general CPU and a fully custom ASIC: a programmable core whose instruction set is tailored to a domain (e.g. DSP), trading flexibility for efficiency.</p>
<blockquote>Exam focus: define embedded system (dedicated function); microcontroller vs microprocessor; the HW/SW trade-off and what an ASIP is.</blockquote>
`,
"coa-rtos": `
<h2>Real-time operating systems</h2>
<p>An <b>RTOS</b> guarantees response within a bounded time — correctness depends on <b>when</b> a result is produced, not just what.</p>
<table>
<tr><th>Hard real-time</th><th>Soft real-time</th></tr>
<tr><td>Missing a deadline = failure</td><td>Missing degrades quality</td></tr>
<tr><td>Pacemaker, airbag, flight control</td><td>Video streaming, VoIP</td></tr>
</table>

<h2>Real-time scheduling</h2>
<ul>
<li><b>Rate-Monotonic (RMS)</b> — static priority; shorter period → higher priority. Schedulable if total utilisation $&#92;le n(2^{1/n}-1)$.</li>
<li><b>Earliest-Deadline-First (EDF)</b> — dynamic priority; the task with the nearest deadline runs first; optimal up to 100% utilisation.</li>
</ul>
<p>RTOS features: deterministic, low and predictable <b>interrupt latency</b>, preemptive priority scheduling, and bounded context-switch time. <b>Priority inversion</b> (a low-priority task blocks a high one) is solved by priority inheritance.</p>

<h2>Control systems link</h2>
<p>Embedded control loops (sense → compute → actuate) often run under an RTOS so the control law executes at a guaranteed period — the basis of digital controllers (PID, feedback).</p>
<blockquote>Exam focus: hard vs soft real-time examples; RMS (static, period-based) vs EDF (dynamic, deadline-based); what priority inversion is and how inheritance fixes it.</blockquote>
`,
"coa-vhdl": `
<h2>Hardware Description Languages</h2>
<p>An <b>HDL</b> describes digital hardware as text, which tools <b>simulate</b> and <b>synthesise</b> into a gate-level circuit. The two main HDLs are <b>VHDL</b> and <b>Verilog</b>. Unlike software, statements describe concurrent hardware, not sequential steps.</p>

<h2>VHDL structure</h2>
<p>A design has an <b>entity</b> (the interface — ports) and an <b>architecture</b> (the behaviour/structure).</p>
<pre><code>entity AND2 is
  port( a, b : in  bit;
        y    : out bit );
end AND2;

architecture rtl of AND2 is
begin
  y &lt;= a and b;        -- concurrent signal assignment
end rtl;</code></pre>

<h2>Modelling styles</h2>
<ul>
<li><b>Dataflow</b> — concurrent signal assignments (Boolean equations).</li>
<li><b>Behavioural</b> — processes with sequential statements (if/case) describing function.</li>
<li><b>Structural</b> — interconnecting component instances (a netlist).</li>
</ul>

<h2>IC technology</h2>
<p>HDL targets are realised on <b>programmable logic</b> — PLA/PAL, <b>CPLD</b>, and <b>FPGA</b> (reconfigurable arrays of logic blocks) — or fixed <b>ASICs</b>. Integration scale: SSI → MSI → LSI → VLSI → ULSI. The flow: HDL → simulate → synthesise → place &amp; route → bitstream/chip.</p>
<blockquote>Exam focus: entity = interface, architecture = behaviour; dataflow vs behavioural vs structural; FPGA (reprogrammable) vs ASIC (fixed); HDL describes concurrent hardware.</blockquote>
`,
"toc-fa": `
<h2>The Chomsky hierarchy</h2>
<p>Languages and the machines that recognise them, from simplest to most powerful:</p>
<table>
<tr><th>Grammar</th><th>Language</th><th>Machine</th></tr>
<tr><td>Type 3</td><td>Regular</td><td>Finite automaton</td></tr>
<tr><td>Type 2</td><td>Context-free</td><td>Pushdown automaton</td></tr>
<tr><td>Type 1</td><td>Context-sensitive</td><td>Linear-bounded automaton</td></tr>
<tr><td>Type 0</td><td>Recursively enumerable</td><td>Turing machine</td></tr>
</table>

<h2>Finite automata</h2>
<p>A <b>finite automaton</b> is a 5-tuple $(Q, &#92;Sigma, &#92;delta, q_0, F)$: states, alphabet, transition function, start state, accepting states. It has no memory beyond its current state.</p>
<ul>
<li><b>DFA</b> — exactly one transition per (state, symbol). Deterministic.</li>
<li><b>NFA</b> — may have several or zero transitions, and $&#92;epsilon$-moves. Easier to design.</li>
</ul>
<p><b>Key theorem:</b> every NFA has an equivalent DFA (subset construction) — they recognise the same class, the <b>regular languages</b>.</p>

<h2>Regular expressions &amp; the pumping lemma</h2>
<p>Regular expressions (built from union $&#92;,|&#92;,$, concatenation, Kleene star $*$) describe exactly the regular languages. The <b>pumping lemma</b> proves a language is <i>not</i> regular: any long enough string can be split $xyz$ with $|xy| &#92;le p$, $|y| &#92;ge 1$, and $xy^iz$ in the language for all $i$ — e.g. $a^nb^n$ fails this and is not regular.</p>
<blockquote>Exam focus: DFA = exactly one transition, NFA may have many/epsilon; NFA and DFA are equally powerful; use the pumping lemma to show $a^nb^n$ is not regular.</blockquote>
`,
"toc-cfg": `
<h2>Context-free grammars</h2>
<p>A <b>CFG</b> is a 4-tuple $(V, T, P, S)$: variables, terminals, productions, start symbol. Productions have a single variable on the left: $A &#92;rightarrow &#92;alpha$. CFGs generate the <b>context-free languages</b> and underpin programming-language syntax.</p>
<pre><code>S -&gt; a S b | epsilon       (generates a^n b^n)</code></pre>

<h2>Parse trees &amp; ambiguity</h2>
<p>A <b>derivation</b> (leftmost/rightmost) builds a string; its <b>parse tree</b> shows the structure. A grammar is <b>ambiguous</b> if some string has two distinct parse trees — undesirable for compilers (e.g. the dangling-else).</p>

<h2>Normal forms</h2>
<ul>
<li><b>CNF (Chomsky)</b> — every production is $A &#92;rightarrow BC$ or $A &#92;rightarrow a$. Used by the CYK parsing algorithm.</li>
<li><b>GNF (Greibach)</b> — every production starts with a terminal: $A &#92;rightarrow a&#92;alpha$.</li>
<li><b>BNF</b> — Backus-Naur Form, the practical notation for writing language grammars.</li>
</ul>

<h2>Pushdown automata</h2>
<p>A <b>PDA</b> is a finite automaton plus a <b>stack</b> — the extra memory needed for nested structure (matching brackets, $a^nb^n$). Non-deterministic PDAs recognise exactly the context-free languages. The stack is what a finite automaton lacks.</p>
<blockquote>Exam focus: PDA = FA + stack; recognise CNF vs GNF form; define ambiguity (two parse trees for one string); CFGs generate context-free languages.</blockquote>
`,
"toc-tm": `
<h2>Turing machines</h2>
<p>A <b>Turing machine</b> adds an infinite read/write <b>tape</b> and a movable head to a finite control — the most powerful standard model. Tuple $(Q, &#92;Sigma, &#92;Gamma, &#92;delta, q_0, B, F)$. The <b>Church-Turing thesis</b> holds that anything effectively computable can be computed by a TM.</p>
<p>It recognises the <b>recursively enumerable</b> languages; languages it also <i>decides</i> (always halts) are <b>recursive (decidable)</b>.</p>

<h2>Decidability</h2>
<ul>
<li><b>Decidable</b> — a TM halts with yes/no on every input (e.g. "is a string in a regular language?").</li>
<li><b>Undecidable</b> — no algorithm can always decide it. The canonical case is the <b>Halting Problem</b>: no program can determine, for every program+input, whether it halts (proved by diagonalisation/contradiction).</li>
</ul>
<p><b>Rice's theorem</b> generalises this: every non-trivial semantic property of a program's behaviour is undecidable.</p>

<h2>Complexity classes</h2>
<table>
<tr><th>Class</th><th>Meaning</th></tr>
<tr><td>P</td><td>solvable in polynomial time</td></tr>
<tr><td>NP</td><td>verifiable in polynomial time</td></tr>
<tr><td>NP-complete</td><td>hardest in NP (SAT, TSP-decision)</td></tr>
</table>
<p><b>Intractable</b> problems have no known polynomial algorithm; whether $P = NP$ is the famous open question. NP-completeness is shown by polynomial-time reduction from a known NP-complete problem.</p>
